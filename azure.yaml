# azd (Azure Developer CLI) configuration for FDAI.
#
# Provides the turnkey `azd up` path over the existing Terraform under
# `infra/` (docs/roadmap/deployment/deploy-and-onboard.md). azd drives Terraform as its
# infrastructure provider; the CSP-neutral seams stay defined in HCL.
#
# Scope: `azd provision` runs the Terraform apply of the minimum-set
# inventory; `azd deploy` / `azd up` builds the app image from the Dockerfile
# and deploys it to the Container App tagged `azd-service-name: core` in
# `infra/modules/compute/container-apps/main.tf`.
#
# Environment values (subscription id, tenant id, resource group, region) are
# supplied at run time by the azd environment / env vars, never committed -
# the repo stays customer-agnostic
# (.github/instructions/generic-scope.instructions.md).

name: fdai
metadata:
  template: fdai@0.1.0

infra:
  provider: terraform
  path: infra

services:
  # Targets the Container App resource tagged `azd-service-name: core` in
  # infra/. `azd deploy` builds the Dockerfile image and updates the app;
  # `azd provision` is unaffected (a service block only drives deploy).
  core:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile

