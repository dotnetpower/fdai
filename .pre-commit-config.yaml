# Pre-commit hooks - fulfil the promise in
# .github/instructions/generic-scope.instructions.md § Enforcement that
# "the same checks that CI runs" also run locally before a push.
#
# Install once:
#   make hooks-install
# This repository uses core.hooksPath=.githooks, whose tracked pre-commit hook
# delegates here. pre-commit ships in the `dev` extra; no extra pip install is
# needed.
#
# Run explicitly against everything:
#   uv run pre-commit run --all-files
#
# The hooks mirror the CI jobs in .github/workflows/ci.yml. New CI gates
# should land here in the same PR so a contributor sees the same failure
# locally that CI would surface.

repos:
  # 1. Ruff - fast Python lint + format check. `ruff format --check`
  #    replaces black; `ruff` replaces isort + flake8-* stack per
  #    pyproject.toml [tool.ruff].
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # 2. Baseline hygiene - trailing whitespace, missing newline at EOF,
  #    large-file guard, merge-conflict marker guard.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # 3. Repo-specific gates - the five scripts wired into CI as separate
  #    jobs. Kept as `system` hooks so the exact CI script runs (no
  #    shim). `pass_filenames: false` because each script walks the
  #    tracked file set itself.
  - repo: local
    hooks:
      - id: resign-integrity
        name: resign-if-surface-staged.sh (auto re-sign manifest, upstream signer only)
        entry: bash scripts/resign-if-surface-staged.sh
        language: system
        pass_filenames: false
        # No-op unless the upstream private key is present AND a framework-
        # surface file is staged. Runs before check-integrity so the fresh
        # signature is what gets verified. Forks never have the key -> no-op.
        files: ^(src/fdai/(core/|composition\.py|composition/|shared/providers/|shared/contracts/|agents/)|rule-catalog/schema/|\.github/instructions/)
      - id: check-punctuation
        name: check-punctuation.sh
        entry: bash scripts/check-punctuation.sh
        language: system
        pass_filenames: false
      - id: check-guids
        name: check-guids.sh
        entry: bash scripts/check-guids.sh
        language: system
        pass_filenames: false
      - id: check-translations
        name: check-translations.sh
        entry: bash scripts/check-translations.sh
        language: system
        pass_filenames: false
      - id: check-core-imports
        name: check-core-imports.sh
        entry: bash scripts/check-core-imports.sh
        language: system
        pass_filenames: false
      - id: check-integrity
        name: check-integrity.sh (framework-surface signature, offline)
        entry: bash scripts/check-integrity.sh
        language: system
        pass_filenames: false
        # Only run when a framework-surface path (or the manifest itself)
        # changes - the offline signature + content check is unnecessary on
        # commits that touch nothing under the surface. Fork mode hard-fails
        # on a surface edit; upstream is advisory (re-sign before release).
        files: ^(src/fdai/(core/|composition\.py|composition/|shared/providers/|shared/contracts/|agents/)|rule-catalog/schema/|\.github/instructions/|security/integrity/)
