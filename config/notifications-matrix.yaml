# AIOpsPilot notification routing matrix.
#
# Loaded at composition time by
# `src/aiopspilot/core/notifications/matrix.py::load_matrix_from_yaml`.
# Category ↔ channel binding is authoritative here; adding, replacing, or
# reordering channels is a config change, never a code change.
#
# Trust tiers (a1..a4) mirror the design contract in
# `docs/roadmap/channels-and-notifications.md § 3`. The router refuses to
# send an a1 message on a channel that does not declare a1 (§4). Trust
# level is preserved on fallback — an a1 primary MUST NOT fall through
# to an a2-only channel; validation happens at composition wiring time.
#
# `on_all_fail: hil_escalate` is the default: when every configured
# channel fails, the message queues into the HIL sink instead of being
# silently dropped (per the "fail toward safety" principle).
#
# Placeholder channel-ids follow the shape `<vendor>-<purpose>-<env>`.
# A per-customer fork replaces every channel-id with its real one via a
# fork-side override file; upstream never carries a tenant-identifying
# value (see .github/instructions/generic-scope.instructions.md).

matrix:
  version: 1

  # Category the router falls back to when a message carries a name the
  # matrix does not know. `hil_approval` is the safest default — an
  # unknown category will page a human rather than get discarded.
  default_route: hil_approval

  routes:
    # A1 — HIL approval (bidirectional, highest auth).
    hil_approval:
      trust_tier: a1_hil_approval
      primary: teams-hil-prd
      fallback:
        - teams-hil-standby
        - slack-hil-prd
      on_all_fail: hil_escalate

    # A2 — operational alerts (send-only, low auth).
    operational_alert:
      trust_tier: a2_operational_alert
      primary: teams-ops-prd
      fallback:
        - pagerduty-primary
        - email-oncall
        - webhook-observability
      on_all_fail: hil_escalate

    # Adapter-health / kill-switch state broadcasts share the ops lane.
    adapter_health:
      trust_tier: a2_operational_alert
      primary: teams-ops-prd
      fallback:
        - pagerduty-primary
      on_all_fail: hil_escalate

    kill_switch_state:
      trust_tier: a2_operational_alert
      primary: teams-ops-prd
      fallback:
        - pagerduty-primary
        - email-oncall
      on_all_fail: hil_escalate

    # A3 — chat command responses (bidirectional, medium auth). The
    # router does not gate role checks — those are per-command (§3.1
    # of the design doc).
    chat_command_response:
      trust_tier: a3_chat_command
      primary: teams-hil-prd
      fallback:
        - slack-hil-prd
      on_all_fail: hil_escalate

    # A4 — digests (send-only, low auth). Seven canonical digests
    # ship in the design doc; each maps to its own route so a fork
    # can retarget without editing code.
    digest_shadow_accuracy_daily:
      trust_tier: a4_digest
      primary: teams-hil-prd
      fallback:
        - email-governance
      on_all_fail: hil_escalate

    digest_enforce_promotion_candidates_weekly:
      trust_tier: a4_digest
      primary: teams-hil-prd
      fallback:
        - email-governance
      on_all_fail: hil_escalate

    digest_override_retrospective_weekly:
      trust_tier: a4_digest
      primary: teams-hil-prd
      fallback:
        - email-governance
      on_all_fail: hil_escalate

    digest_governance_pr_aging_weekly:
      trust_tier: a4_digest
      primary: teams-hil-prd
      fallback:
        - email-governance
      on_all_fail: hil_escalate

    digest_exemption_expiry_lookahead_weekly:
      trust_tier: a4_digest
      primary: teams-hil-prd
      fallback:
        - email-governance
      on_all_fail: hil_escalate

    digest_kpi_and_cost_monthly:
      trust_tier: a4_digest
      primary: email-governance
      fallback:
        - teams-hil-prd
      on_all_fail: hil_escalate

    digest_break_glass_usage_summary:
      trust_tier: a4_digest
      primary: teams-break-glass
      fallback:
        - sms-oncall
        - email-governance
      on_all_fail: hil_escalate
