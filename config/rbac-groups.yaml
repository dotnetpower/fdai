# RBAC group mapping — Entra ID security groups to human user roles.
#
# Upstream ships **placeholder** objectIds (all-zero UUIDs). A per-customer
# fork MUST replace every `<slot>` value with its tenant's real Entra
# security-group objectId before deploying. Missing or blank slots cause
# a fail-fast startup error (see
# `src/aiopspilot/core/rbac/resolver.py::GroupMapping.from_config`).
#
# Env-var overrides (any one slot may be overridden without editing YAML):
#
#     AIOPSPILOT_RBAC_READERS_GROUP_ID
#     AIOPSPILOT_RBAC_CONTRIBUTORS_GROUP_ID
#     AIOPSPILOT_RBAC_APPROVERS_GROUP_ID
#     AIOPSPILOT_RBAC_OWNERS_GROUP_ID
#     AIOPSPILOT_RBAC_BREAK_GLASS_GROUP_ID
#
# Design authority: docs/roadmap/user-rbac-and-identity.md § 4.2 Security
# Groups (slots). Placeholder policy: generic-scope.instructions.md
# (all-zero UUID substitute).

rbac:
  entra:
    # Informational — the API layer validates the token issuer separately;
    # this value is a cross-check, not the source of truth.
    tenant_id: "00000000-0000-0000-0000-000000000000"
    groups:
      # `aw-readers`     — view console: KPI dashboard, audit log, shadow.
      readers: "00000000-0000-0000-0000-000000000000"
      # `aw-contributors` — Reader + author draft governance PRs.
      contributors: "00000000-0000-0000-0000-000000000000"
      # `aw-approvers`   — Reader + review/approve governance PRs + runtime HIL.
      approvers: "00000000-0000-0000-0000-000000000000"
      # `aw-owners`      — Approver + kill-switch + membership + infra IaC.
      owners: "00000000-0000-0000-0000-000000000000"
      # `aw-break-glass` — emergency scoped access, hardware-MFA only,
      # NEVER auto-activated by claims. Elevation requires an
      # operator-recorded incident id + timebox
      # (see RoleResolver.activate_break_glass).
      break_glass: "00000000-0000-0000-0000-000000000000"
