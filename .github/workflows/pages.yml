name: Deploy docs site to GitHub Pages

# Manual-only until GitHub Pages is enabled in Settings → Pages on this
# repository. The `actions/configure-pages@v5` `enablement: true` mode
# requires an integration with admin scope that the default GITHUB_TOKEN
# does not carry - so an auto-`push:` trigger keeps failing with
# `Resource not accessible by integration` on repos where a maintainer
# has not yet flipped the Pages switch. Trigger this workflow manually
# from the Actions tab after enabling Pages once; it then runs to
# completion. To restore the auto-`push:` trigger, uncomment the block
# below AFTER Pages is enabled on the repo (Settings → Pages →
# `Deploy from GitHub Actions`).
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "site/**"
  #     - "docs/**"
  #     - "README.md"
  #     - ".github/workflows/pages.yml"
  workflow_dispatch:

# GitHub Pages OIDC deploy needs pages + id-token; contents:read for checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# Never race two deploys on the same environment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Astro Starlight)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Configure Pages
        # `enablement: true` would try to turn Pages on via the REST API
        # the first time this runs against a repo that has never had
        # Pages configured. That call needs an integration with admin
        # scope; the default GITHUB_TOKEN gets HTTP 403 "Resource not
        # accessible by integration" instead. `enablement: false` is
        # the correct posture: Pages MUST be enabled once by a
        # maintainer in Settings → Pages before this workflow runs.
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Build site
        working-directory: site
        env:
          # Passed through to astro.config.mjs so a fork can override without
          # editing config. Defaults target dotnetpower/fdai.
          SITE_URL: ${{ steps.pages.outputs.origin || 'https://dotnetpower.github.io' }}
          BASE_PATH: ${{ steps.pages.outputs.base_path || '/fdai' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
