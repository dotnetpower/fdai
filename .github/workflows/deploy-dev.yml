name: deploy-dev

# Deploys the dev environment from a self-hosted runner inside the ops VNet.
# On a policy-locked ("private-everything") tenant this is the ONLY host with
# line-of-sight to the app's private endpoints (Key Vault, state storage), so
# the deploy cannot run on a GitHub-hosted runner or an operator laptop.
#
# Prerequisites (see infra/bootstrap/README.md):
#   - `infra/bootstrap` applied: ops VNet + state storage + registered runner
#     with labels [self-hosted, fdai-deploy] and a system-assigned MI holding
#     Contributor on the app RG + Storage Blob Data Contributor on the state SA.
#   - Repo variables (Settings > Secrets and variables > Actions > Variables):
#       ARM_SUBSCRIPTION_ID, AZURE_REGION, AZURE_REGION_SHORT, AZURE_TENANT_ID,
#       OPS_RESOURCE_GROUP_NAME, OPS_VNET_ID, OPS_VNET_NAME, STATE_STORAGE_ACCOUNT,
#       DEPLOY_PREFLIGHT_INPUT_JSON (non-secret complete live-probe profile),
#       ENTRA_CONSOLE_SPA_CLIENT_ID (required when deploy_console=true),
#       RESOLVED_CAPABILITIES_JSON, READ_API_AUDIENCE, RBAC_*_GROUP_ID,
#       INGESTION_CORS_ALLOW_ORIGINS, CLAMAV_IMAGE,
#       SCHEDULER_TICK_CRON_EXPRESSION, ANALYZER_TICK_CRON_EXPRESSION,
#       ANALYZER_TARGETS_JSON, ANALYZER_WINDOW_SECONDS, ANALYZER_BUDGET_SECONDS,
#       DEV_OPERATIONS_GATEWAY_PRIVATE_PROBES_JSON (optional server-owned probe map),
#       ENABLE_EMAIL_NOTIFICATIONS, NOTIFICATION_EMAIL_RECIPIENTS_JSON
#       (required when deploy_document_ingestion=true; prod images use digests)
#   - Repo secrets:
#       POSTGRES_ADMIN_LOGIN, POSTGRES_ADMIN_PASSWORD,
#       CHATOPS_WEBHOOK_URL, CHATOPS_WEBHOOK_SECRET
#   - Production workflow inputs:
#       digest-pinned image, alert email, monthly budget, budget-alert email JSON.
#
# Default run is plan-only (shadow). Set the `apply` input to true to enforce.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment."
        type: choice
        options: [dev, staging, prod]
        default: dev
      apply:
        description: "Apply the plan (true) or plan-only (false, default)."
        type: boolean
        default: false
      request_id:
        description: "Optional fdaictl plan request id."
        type: string
        required: false
      context_digest:
        description: "Optional SHA-256 digest of the fdaictl deployment context."
        type: string
        required: false
      commit_sha:
        description: "Optional exact commit requested by fdaictl."
        type: string
        required: false
      plan_id:
        description: "Protected plan id required for exact apply."
        type: string
        required: false
      plan_digest:
        description: "Protected plan SHA-256 digest required for exact apply."
        type: string
        required: false
      deploy_console:
        description: "Provision the operator console Static Web App (enable_console)."
        type: boolean
        default: false
      deploy_read_api:
        description: "Provision the console read-API Container App + migration job (enable_read_api)."
        type: boolean
        default: false
      deploy_dev_operations_gateway:
        description: "Provision the dev-only private-resource operations Function gateway."
        type: boolean
        default: false
      deploy_document_ingestion:
        description: "Provision ADLS Gen2 HNS storage and the document-ingestion gateway."
        type: boolean
        default: false
      production_core_image:
        description: "Prod-only signed image reference pinned by sha256 digest."
        type: string
        required: false
      production_alert_email:
        description: "Prod-only Azure Monitor alert destination."
        type: string
        required: false
      production_monthly_budget:
        description: "Prod-only positive monthly budget amount."
        type: string
        required: false
      production_budget_alert_emails_json:
        description: "Prod-only JSON string list of budget alert emails."
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: [self-hosted, fdai-deploy]
    environment: ${{ inputs.apply && inputs.environment || 'plan-only' }}
    defaults:
      run:
        working-directory: infra
    env:
      # AAD auth for both the azurerm provider and the state backend blob,
      # using the runner's system-assigned managed identity (az login below).
      ARM_USE_AZUREAD: "true"
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      # tfvars-equivalent inputs (non-secret via Variables, secret via Secrets).
      TF_VAR_env: ${{ inputs.environment }}
      TF_VAR_region: ${{ vars.AZURE_REGION }}
      TF_VAR_region_short: ${{ vars.AZURE_REGION_SHORT }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
      TF_VAR_enable_private_networking: "true"
      TF_VAR_enable_private_postgres: ${{ inputs.environment == 'prod' }}
      TF_VAR_enable_console: ${{ inputs.deploy_console }}
      TF_VAR_enable_read_api: ${{ inputs.deploy_read_api }}
      TF_VAR_enable_dev_operations_gateway: ${{ inputs.environment == 'dev' && inputs.deploy_dev_operations_gateway }}
      TF_VAR_dev_operations_gateway_private_probes_json: "${{ vars.DEV_OPERATIONS_GATEWAY_PRIVATE_PROBES_JSON || '{}' }}"
      TF_VAR_enable_document_ingestion: ${{ inputs.deploy_document_ingestion }}
      TF_VAR_enable_llm: ${{ inputs.deploy_document_ingestion || vars.ENABLE_LLM == 'true' }}
      TF_VAR_resolved_capabilities: "${{ vars.RESOLVED_CAPABILITIES_JSON }}"
      TF_VAR_core_image: ${{ vars.CORE_IMAGE || vars.READ_API_IMAGE }}
      # Read-API image + Entra/RBAC ids (tenant-specific; via repo Variables,
      # never committed). Empty when deploy_read_api is false.
      TF_VAR_read_api_image: ${{ vars.READ_API_IMAGE }}
      TF_VAR_read_api_resolved_models_path: ${{ vars.READ_API_RESOLVED_MODELS_PATH }}
      TF_VAR_read_api_audience: ${{ vars.READ_API_AUDIENCE }}
      TF_VAR_rbac_readers_group_id: ${{ vars.RBAC_READERS_GROUP_ID }}
      TF_VAR_rbac_contributors_group_id: ${{ vars.RBAC_CONTRIBUTORS_GROUP_ID }}
      TF_VAR_rbac_approvers_group_id: ${{ vars.RBAC_APPROVERS_GROUP_ID }}
      TF_VAR_rbac_owners_group_id: ${{ vars.RBAC_OWNERS_GROUP_ID }}
      TF_VAR_rbac_break_glass_group_id: ${{ vars.RBAC_BREAK_GLASS_GROUP_ID }}
      TF_VAR_read_api_cors_allow_origins: ${{ vars.READ_API_CORS_ALLOW_ORIGINS }}
      TF_VAR_ingestion_image: ${{ vars.INGESTION_IMAGE }}
      TF_VAR_clamav_image: ${{ vars.CLAMAV_IMAGE || 'clamav/clamav:stable' }}
      TF_VAR_ingestion_cors_allow_origins: ${{ vars.INGESTION_CORS_ALLOW_ORIGINS }}
      TF_VAR_ingestion_embedding_capability: ${{ vars.INGESTION_EMBEDDING_CAPABILITY || 't1.embedding' }}
      TF_VAR_scheduler_tick_cron_expression: ${{ vars.SCHEDULER_TICK_CRON_EXPRESSION }}
      TF_VAR_analyzer_tick_cron_expression: ${{ vars.ANALYZER_TICK_CRON_EXPRESSION }}
      TF_VAR_analyzer_targets_json: ${{ vars.ANALYZER_TARGETS_JSON }}
      TF_VAR_analyzer_window_seconds: ${{ vars.ANALYZER_WINDOW_SECONDS }}
      TF_VAR_analyzer_budget_seconds: ${{ vars.ANALYZER_BUDGET_SECONDS }}
      TF_VAR_enable_email_notifications: ${{ vars.ENABLE_EMAIL_NOTIFICATIONS == 'true' }}
      TF_VAR_notification_email_recipients: "${{ vars.NOTIFICATION_EMAIL_RECIPIENTS_JSON || '[]' }}"
      TF_VAR_import_existing_email_notifications: ${{ inputs.environment == 'dev' && vars.IMPORT_EXISTING_EMAIL_NOTIFICATIONS == 'true' }}
      TF_VAR_runner_vnet_id: ${{ vars.OPS_VNET_ID }}
      TF_VAR_runner_vnet_name: ${{ vars.OPS_VNET_NAME }}
      TF_VAR_ops_resource_group_name: ${{ vars.OPS_RESOURCE_GROUP_NAME }}
      PREFLIGHT_EGRESS_HOSTS_JSON: ${{ vars.PREFLIGHT_EGRESS_HOSTS_JSON || '["api.github.com","management.azure.com","login.microsoftonline.com","registry.terraform.io","pypi.org","files.pythonhosted.org"]' }}
      DEPLOY_PREFLIGHT_INPUT_JSON: ${{ vars.DEPLOY_PREFLIGHT_INPUT_JSON }}
      TF_VAR_postgres_admin_login: ${{ secrets.POSTGRES_ADMIN_LOGIN }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_enable_chatops_hil: ${{ secrets.CHATOPS_WEBHOOK_URL != '' && secrets.CHATOPS_WEBHOOK_SECRET != '' }}
      TF_VAR_chatops_webhook_url: ${{ secrets.CHATOPS_WEBHOOK_URL }}
      TF_VAR_chatops_webhook_secret: ${{ secrets.CHATOPS_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate remote plan request
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        env:
          PLAN_REQUEST_ID: ${{ inputs.request_id }}
          PLAN_CONTEXT_DIGEST: ${{ inputs.context_digest }}
          PLAN_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$PLAN_REQUEST_ID" =~ ^plan-[0-9a-f]{24}$ ]]; then
            echo "request_id must be a bounded fdaictl plan id." >&2
            exit 1
          fi
          if [[ ! "$PLAN_CONTEXT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "context_digest must be a lowercase SHA-256 digest." >&2
            exit 1
          fi
          if [[ ! "$PLAN_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a lowercase git SHA." >&2
            exit 1
          fi
          if [[ "$PLAN_COMMIT_SHA" != "$GITHUB_SHA" ]]; then
            echo "requested commit does not match the workflow checkout." >&2
            exit 1
          fi

      - name: Validate exact apply request
        if: ${{ inputs.apply }}
        env:
          APPLY_REQUEST_ID: ${{ inputs.request_id }}
          APPLY_CONTEXT_DIGEST: ${{ inputs.context_digest }}
          APPLY_COMMIT_SHA: ${{ inputs.commit_sha }}
          APPLY_PLAN_ID: ${{ inputs.plan_id }}
          APPLY_PLAN_DIGEST: ${{ inputs.plan_digest }}
        run: |
          set -euo pipefail
          if [[ ! "$APPLY_REQUEST_ID" =~ ^apply-[0-9a-f]{24}$ ]]; then
            echo "apply request_id must be a bounded fdaictl id." >&2
            exit 1
          fi
          if [[ ! "$APPLY_CONTEXT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "apply context_digest must be a lowercase SHA-256 digest." >&2
            exit 1
          fi
          if [[ ! "$APPLY_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "apply commit_sha must be a lowercase git SHA." >&2
            exit 1
          fi
          if [[ "$APPLY_COMMIT_SHA" != "$GITHUB_SHA" ]]; then
            echo "requested apply commit does not match the workflow checkout." >&2
            exit 1
          fi
          if [[ ! "$APPLY_PLAN_ID" =~ ^plan-[1-9][0-9]*-[1-9][0-9]*$ ]]; then
            echo "plan_id is invalid." >&2
            exit 1
          fi
          if [[ ! "$APPLY_PLAN_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "plan_digest must be a lowercase SHA-256 digest." >&2
            exit 1
          fi

      - name: Install readiness gate dependency
        if: inputs.environment == 'prod'
        run: python3 -m pip install --quiet pyyaml
        working-directory: ${{ github.workspace }}

      - name: Verify production architecture-review evidence
        if: inputs.environment == 'prod'
        run: python3 scripts/governance/check-arb-readiness.py --require-production-ready
        working-directory: ${{ github.workspace }}

      - name: Bind production Terraform inputs
        if: inputs.environment == 'prod'
        env:
          PROD_CORE_IMAGE: ${{ inputs.production_core_image }}
          PROD_ALERT_EMAIL: ${{ inputs.production_alert_email }}
          PROD_MONTHLY_BUDGET_AMOUNT: ${{ inputs.production_monthly_budget }}
          PROD_BUDGET_ALERT_EMAILS_JSON: ${{ inputs.production_budget_alert_emails_json }}
        run: |
          if [[ ! "$PROD_CORE_IMAGE" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "PROD_CORE_IMAGE must be digest-pinned." >&2
            exit 1
          fi
          if [[ -z "$PROD_ALERT_EMAIL" ]]; then
            echo "production_alert_email is required." >&2
            exit 1
          fi
          if [[ ! "$PROD_MONTHLY_BUDGET_AMOUNT" =~ ^[1-9][0-9]*([.][0-9]+)?$ ]]; then
            echo "PROD_MONTHLY_BUDGET_AMOUNT must be positive." >&2
            exit 1
          fi
          python3 -c 'import json, os; value=json.loads(os.environ["PROD_BUDGET_ALERT_EMAILS_JSON"]); assert isinstance(value, list) and value and all(isinstance(item, str) and item for item in value)'
          {
            echo "TF_VAR_core_image=$PROD_CORE_IMAGE"
            echo "TF_VAR_enable_resource_locks=true"
            echo "TF_VAR_kv_purge_protection_enabled=true"
            echo "TF_VAR_kv_soft_delete_retention_days=90"
            echo "TF_VAR_postgres_backup_retention_days=35"
            echo "TF_VAR_postgres_geo_redundant_backup=true"
                        echo "TF_VAR_postgres_high_availability_mode=ZoneRedundant"
            echo "TF_VAR_acr_sku=Premium"
            echo "TF_VAR_enable_monitoring=true"
            echo "TF_VAR_alert_email=$PROD_ALERT_EMAIL"
            echo "TF_VAR_monthly_budget_amount=$PROD_MONTHLY_BUDGET_AMOUNT"
            echo "TF_VAR_budget_alert_emails=$PROD_BUDGET_ALERT_EMAILS_JSON"
          } >> "$GITHUB_ENV"

      - name: Azure login (runner managed identity)
        run: az login --identity --allow-no-subscriptions

      - name: Ensure protected storage containers
        # Created data-plane from the runner (inside the VNet, over the blob
        # private endpoint) since the account is private + key-auth is
        # policy-forbidden. Idempotent.
        run: |
          az storage container create \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --name tfstate --auth-mode login --public-access off --only-show-errors \
            --output none
          az storage container create \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --name deployment-plans --auth-mode login --public-access off --only-show-errors \
            --output none

      - name: Activate remote state backend
        run: cp backend.azurerm.tf.example backend.tf

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.OPS_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=fdai-${{ inputs.environment }}.tfstate"

      - name: Adopt existing Azure resources
        run: |
          set -euo pipefail
          rg="rg-fdai-${TF_VAR_env}-${TF_VAR_region_short}"
          namespace="evhns-fdai-${TF_VAR_env}-${TF_VAR_region_short}"

          import_if_missing() {
            local address="$1"
            local resource_id="$2"
            [ -z "$resource_id" ] && return 0
            if terraform state show "$address" >/dev/null 2>&1; then
              return 0
            fi
            echo "adopting $address"
            terraform import -input=false "$address" "$resource_id"
          }

          resource_id() {
            az resource show --resource-group "$rg" --name "$1" \
              --resource-type "$2" --query id -o tsv 2>/dev/null || true
          }

          import_if_missing 'azurerm_application_insights.core' \
            "$(resource_id "appi-fdai-${TF_VAR_env}-${TF_VAR_region_short}" 'Microsoft.Insights/components')"
          import_if_missing 'module.inventory_identity.azurerm_user_assigned_identity.primary' \
            "$(az identity show --resource-group "$rg" --name "id-fdai-${TF_VAR_env}-${TF_VAR_region_short}-inventory" --query id -o tsv 2>/dev/null || true)"
          import_if_missing 'module.compute.azurerm_container_app_job.inventory[0]' \
            "$(az containerapp job show --resource-group "$rg" --name "ca-fdai-${TF_VAR_env}-${TF_VAR_region_short}-core-inventory" --query id -o tsv 2>/dev/null || true)"
          import_if_missing 'module.compute.azurerm_container_app_job.scheduler_tick[0]' \
            "$(az containerapp job show --resource-group "$rg" --name "ca-fdai-${TF_VAR_env}-${TF_VAR_region_short}-core-scheduler" --query id -o tsv 2>/dev/null || true)"
          import_if_missing 'module.compute.azurerm_container_app_job.analyzer_tick[0]' \
            "$(az containerapp job show --resource-group "$rg" --name "ca-fdai-${TF_VAR_env}-${TF_VAR_region_short}-core-analyzer" --query id -o tsv 2>/dev/null || true)"

          inventory_principal="$(az identity show --resource-group "$rg" --name "id-fdai-${TF_VAR_env}-${TF_VAR_region_short}-inventory" --query principalId -o tsv 2>/dev/null || true)"
          subscription_scope="/subscriptions/${ARM_SUBSCRIPTION_ID}"
          acr_scope="$(az acr show --resource-group "$rg" --name "crfdai${TF_VAR_env}${TF_VAR_region_short}" --query id -o tsv 2>/dev/null || true)"
          eventhubs_scope="$(az eventhubs eventhub show --resource-group "$rg" --namespace-name "$namespace" --name aw.change.events --query id -o tsv 2>/dev/null || true)"

          role_assignment_id() {
            local scope="$1"
            local role="$2"
            az role assignment list --scope "$scope" --assignee "$inventory_principal" \
              --query "[?roleDefinitionName=='$role'].id | [0]" -o tsv 2>/dev/null || true
          }

          import_if_missing 'azurerm_role_assignment.inventory_reader' \
            "$(role_assignment_id "$subscription_scope" 'Reader')"
          import_if_missing 'azurerm_role_assignment.inventory_acr_pull' \
            "$(role_assignment_id "$acr_scope" 'AcrPull')"
          import_if_missing 'azurerm_role_assignment.inventory_eventhubs_sender' \
            "$(role_assignment_id "$eventhubs_scope" 'Azure Event Hubs Data Sender')"

          if [ "${TF_VAR_enable_llm}" = "true" ]; then
            import_if_missing 'module.llm_azure_openai[0].azurerm_cognitive_account.primary' \
              "$(az cognitiveservices account show --resource-group "$rg" --name "oai-fdai-${TF_VAR_env}-${TF_VAR_region_short}" --query id -o tsv 2>/dev/null || true)"
          fi

          for topic in aw.pantheon.objects; do
            id="$(az eventhubs eventhub show --resource-group "$rg" --namespace-name "$namespace" --name "$topic" --query id -o tsv 2>/dev/null || true)"
            import_if_missing "module.event_bus.azurerm_eventhub.topic[\"$topic\"]" "$id"
          done
          for topic in aw.pantheon.objects; do
            name="$topic.dlq"
            id="$(az eventhubs eventhub show --resource-group "$rg" --namespace-name "$namespace" --name "$name" --query id -o tsv 2>/dev/null || true)"
            import_if_missing "module.event_bus.azurerm_eventhub.dlq[\"$topic\"]" "$id"
          done
          for topic in aw.hil.decisions aw.pipeline.stages; do
            id="$(az eventhubs eventhub show --resource-group "$rg" --namespace-name "$namespace" --name "$topic" --query id -o tsv 2>/dev/null || true)"
            import_if_missing "module.event_bus.azurerm_eventhub.auxiliary[\"$topic\"]" "$id"
          done

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Run runner egress preflight
        run: |
          set -euo pipefail
          printf '%s\n' "$PREFLIGHT_EGRESS_HOSTS_JSON" > runner-egress-hosts.json
          python3 ../scripts/deployment/azure/check-runner-egress.py runner-egress-hosts.json \
            --output runner-egress-evidence.json --timeout-seconds 5

      - name: Terraform plan
        if: ${{ !inputs.apply }}
        run: terraform plan -input=false -lock-timeout=300s -out=dev.plan

      - name: Install pinned uv for live preflight
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true
          prune-cache: false

      - name: Install locked FDAI CLI
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        working-directory: ${{ github.workspace }}
        run: uv sync --locked

      - name: Run complete Azure live preflight
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        env:
          PREFLIGHT_ENVIRONMENT: ${{ inputs.environment }}
          PREFLIGHT_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
          PREFLIGHT_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          PREFLIGHT_REGION: ${{ vars.AZURE_REGION }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_PREFLIGHT_INPUT_JSON" ]; then
          echo "DEPLOY_PREFLIGHT_INPUT_JSON is required for protected plans." >&2
          exit 1
          fi
          printf '%s' "$DEPLOY_PREFLIGHT_INPUT_JSON" > runner-live-preflight-input.json
          created_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          export CREATED_AT="$created_at"
          python3 - <<'PY'
          import json
          import os

          required = {
            "identity_rbac",
            "policy_guardrail",
            "quota_capacity",
            "secret_config",
          }
          with open("runner-live-preflight-input.json", encoding="utf-8") as stream:
            profile = json.load(stream)
          live = profile.get("azure_live")
          if not isinstance(live, dict) or set(live.get("required_categories", ())) != required:
            raise SystemExit("runner preflight profile must require all Azure live categories")
          profile["mode"] = "enforce"
          profile["generated_at"] = os.environ["CREATED_AT"]
          profile["scope"] = "resource-group-equivalent:deployment"
          with open("runner-live-preflight-input.json", "w", encoding="utf-8") as stream:
            json.dump(profile, stream, sort_keys=True, separators=(",", ":"))
            stream.write("\n")
          environment = {
            "schema_version": "fdai.deployment.environment.v1",
            "environment": os.environ["PREFLIGHT_ENVIRONMENT"],
            "azure": {
              "subscription_id": os.environ["PREFLIGHT_SUBSCRIPTION_ID"],
              "tenant_id": os.environ["PREFLIGHT_TENANT_ID"],
              "region": os.environ["PREFLIGHT_REGION"],
            },
            "execution_target": "remote-runner",
            "autonomy_mode_default": "shadow",
          }
          with open("runner-environment.json", "w", encoding="utf-8") as stream:
            json.dump(environment, stream, sort_keys=True, separators=(",", ":"))
            stream.write("\n")
          PY
          terraform show -json dev.plan > dev.plan.json
          trap 'rm -f dev.plan.json runner-live-preflight-input.json runner-environment.json' EXIT
          ../.venv/bin/fdaictl deploy preflight \
          --input runner-live-preflight-input.json \
          --terraform-plan dev.plan.json \
          --environment-config runner-environment.json \
          --output json > azure-preflight-evidence.json
          python3 - <<'PY'
          import json

          required = {
            "identity_rbac",
            "policy_guardrail",
            "quota_capacity",
            "secret_config",
          }
          with open("azure-preflight-evidence.json", encoding="utf-8") as stream:
            payload = json.load(stream)
          report = payload.get("report")
          if not isinstance(report, dict):
            raise SystemExit("Azure live preflight report is missing")
          checks = report.get("checks")
          if not isinstance(checks, list):
            raise SystemExit("Azure live preflight check coverage is missing")
          categories = {
            check.get("category") for check in checks if isinstance(check, dict)
          }
          if not required.issubset(categories):
            raise SystemExit("Azure live preflight did not execute every required category")
          if report.get("verdict") != "clear" or report.get("blocks_deploy") is not False:
            raise SystemExit("Azure live preflight did not produce a clear report")
          PY

      - name: Cleanup expired protected plans
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        run: |
          set -euo pipefail
          az storage blob list \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans --auth-mode login \
            --num-results 1001 --only-show-errors --output json > plan-blobs.json
          python3 ../scripts/deployment/azure/cleanup-deployment-plans.py plan-blobs.json > expired-plan-blobs.txt
          deleted=0
          while IFS= read -r blob_name; do
            [ -z "$blob_name" ] && continue
            az storage blob delete \
              --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
              --container-name deployment-plans --name "$blob_name" \
              --auth-mode login --only-show-errors --output none
            deleted=$((deleted + 1))
          done < expired-plan-blobs.txt
          echo "Expired protected plan blobs deleted: $deleted" >> "$GITHUB_STEP_SUMMARY"

      - name: Store protected plan artifact
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        env:
          PLAN_REQUEST_ID: ${{ inputs.request_id }}
          PLAN_CONTEXT_DIGEST: ${{ inputs.context_digest }}
          PLAN_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          plan_id="plan-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          plan_digest="$(sha256sum dev.plan | cut -d' ' -f1)"
          preflight_evidence_digest="$(sha256sum runner-egress-evidence.json | cut -d' ' -f1)"
          azure_preflight_evidence_digest="$(sha256sum azure-preflight-evidence.json | cut -d' ' -f1)"
          created_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          expires_at="$(date -u -d '+1 hour' '+%Y-%m-%dT%H:%M:%SZ')"
          export PLAN_ID="$plan_id" PLAN_DIGEST="$plan_digest" \
            PREFLIGHT_EVIDENCE_DIGEST="$preflight_evidence_digest" CREATED_AT="$created_at" \
            AZURE_PREFLIGHT_EVIDENCE_DIGEST="$azure_preflight_evidence_digest" \
            EXPIRES_AT="$expires_at"
          python3 - <<'PY'
          import json
          import os

          metadata = {
              "schema_version": "fdai.deployment-plan.v1",
              "plan_id": os.environ["PLAN_ID"],
              "plan_digest": os.environ["PLAN_DIGEST"],
              "context_digest": os.environ["PLAN_CONTEXT_DIGEST"],
              "preflight_evidence_digest": os.environ["PREFLIGHT_EVIDENCE_DIGEST"],
                "azure_preflight_evidence_digest": os.environ[
                  "AZURE_PREFLIGHT_EVIDENCE_DIGEST"
                ],
              "preflight_blocks": False,
              "commit_sha": os.environ["PLAN_COMMIT_SHA"],
              "request_id": os.environ["PLAN_REQUEST_ID"],
              "created_at": os.environ["CREATED_AT"],
              "expires_at": os.environ["EXPIRES_AT"],
              "status": "ready",
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("plan-metadata.json", "w", encoding="utf-8") as stream:
              json.dump(metadata, stream, sort_keys=True, separators=(",", ":"))
              stream.write("\n")
          PY
          blob_prefix="${TF_VAR_env}/${plan_id}"
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/terraform.plan" \
            --file dev.plan --auth-mode login --overwrite false --only-show-errors \
            --output none
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/metadata.json" \
            --file plan-metadata.json --auth-mode login --overwrite false --only-show-errors \
            --content-type application/json --output none
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/preflight-evidence.json" \
            --file runner-egress-evidence.json --auth-mode login --overwrite false \
            --only-show-errors --content-type application/json --output none
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/azure-preflight-evidence.json" \
            --file azure-preflight-evidence.json --auth-mode login --overwrite false \
            --only-show-errors --content-type application/json --output none
          {
            echo "Plan id: \`$plan_id\`"
            echo "Plan digest: \`$plan_digest\`"
            echo "Expires at: \`$expires_at\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish sanitized plan metadata
        if: ${{ !inputs.apply && inputs.request_id != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: infra/plan-metadata.json
          if-no-files-found: error
          retention-days: 1

      - name: Restore and verify exact protected plan
        if: ${{ inputs.apply }}
        env:
          APPLY_CONTEXT_DIGEST: ${{ inputs.context_digest }}
          APPLY_COMMIT_SHA: ${{ inputs.commit_sha }}
          APPLY_PLAN_ID: ${{ inputs.plan_id }}
          APPLY_PLAN_DIGEST: ${{ inputs.plan_digest }}
        run: |
          set -euo pipefail
          blob_prefix="${TF_VAR_env}/${APPLY_PLAN_ID}"
          az storage blob download \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/terraform.plan" --file dev.plan \
            --auth-mode login --overwrite --only-show-errors --output none
          az storage blob download \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/metadata.json" --file plan-metadata.json \
            --auth-mode login --overwrite --only-show-errors --output none
          az storage blob download \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/preflight-evidence.json" \
            --file plan-preflight-evidence.json \
            --auth-mode login --overwrite --only-show-errors --output none
          az storage blob download \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${blob_prefix}/azure-preflight-evidence.json" \
            --file plan-azure-preflight-evidence.json \
            --auth-mode login --overwrite --only-show-errors --output none
          python3 ../scripts/deployment/azure/verify-deployment-plan.py \
            --plan dev.plan --metadata plan-metadata.json \
            --preflight-evidence plan-preflight-evidence.json \
            --azure-preflight-evidence plan-azure-preflight-evidence.json \
            --plan-id "$APPLY_PLAN_ID" --plan-digest "$APPLY_PLAN_DIGEST" \
            --context-digest "$APPLY_CONTEXT_DIGEST" --commit-sha "$APPLY_COMMIT_SHA"

      - name: Claim exact plan apply
        if: ${{ inputs.apply }}
        env:
          APPLY_PLAN_ID: ${{ inputs.plan_id }}
          APPLY_PLAN_DIGEST: ${{ inputs.plan_digest }}
          APPLY_CONTEXT_DIGEST: ${{ inputs.context_digest }}
        run: |
          set -euo pipefail
          claimed_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          export CLAIMED_AT="$claimed_at" APPLY_PLAN_ID APPLY_PLAN_DIGEST \
            APPLY_CONTEXT_DIGEST
          python3 - <<'PY'
          import json
          import os

          claim = {
              "schema_version": "fdai.deployment-apply-claim.v1",
              "plan_id": os.environ["APPLY_PLAN_ID"],
              "plan_digest": os.environ["APPLY_PLAN_DIGEST"],
              "context_digest": os.environ["APPLY_CONTEXT_DIGEST"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "claimed_at": os.environ["CLAIMED_AT"],
          }
          with open("apply-claim.json", "w", encoding="utf-8") as stream:
              json.dump(claim, stream, sort_keys=True, separators=(",", ":"))
              stream.write("\n")
          PY
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${TF_VAR_env}/${APPLY_PLAN_ID}/apply-claim.json" \
            --file apply-claim.json --auth-mode login --overwrite false \
            --only-show-errors --content-type application/json --output none

      - name: Publish sanitized apply claim
        if: ${{ inputs.apply }}
        uses: actions/upload-artifact@v4
        with:
          name: deployment-apply-claim-${{ inputs.plan_id }}
          path: infra/apply-claim.json
          if-no-files-found: error
          retention-days: 1

      - name: Terraform apply
        if: ${{ inputs.apply }}
        run: terraform apply -input=false -lock-timeout=300s dev.plan

      - name: Verify Terraform convergence
        if: ${{ inputs.apply }}
        run: |
          set +e
          terraform plan -input=false -lock-timeout=300s -detailed-exitcode \
            -out=post-apply.plan
          plan_exit=$?
          set -e
          rm -f post-apply.plan
          if [ "$plan_exit" -eq 1 ]; then
            echo "post-apply Terraform convergence check failed." >&2
            exit 1
          fi
          if [ "$plan_exit" -eq 2 ]; then
            echo "post-apply Terraform state is not converged." >&2
            exit 1
          fi

      - name: Synchronize console Entra redirect URI
        if: ${{ inputs.apply && inputs.deploy_console }}
        env:
          EXPECTED_AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ENTRA_CONSOLE_SPA_CLIENT_ID: ${{ vars.ENTRA_CONSOLE_SPA_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$EXPECTED_AZURE_TENANT_ID" ]]; then
            echo "AZURE_TENANT_ID is required when deploy_console=true." >&2
            exit 1
          fi
          if [[ -z "$ENTRA_CONSOLE_SPA_CLIENT_ID" ]]; then
            echo "ENTRA_CONSOLE_SPA_CLIENT_ID is required when deploy_console=true." >&2
            exit 1
          fi
          hostname="$(terraform output -raw console_default_hostname)"
          if [[ -z "$hostname" ]]; then
            echo "console_default_hostname is empty after console deployment." >&2
            exit 1
          fi
          python3 ../scripts/deployment/azure/sync-entra-spa-redirect.py \
            --tenant-id "$EXPECTED_AZURE_TENANT_ID" \
            --spa-client-id "$ENTRA_CONSOLE_SPA_CLIENT_ID" \
            --origin "https://$hostname"

      - name: Run schema migration
        if: ${{ inputs.apply && (inputs.deploy_read_api || inputs.deploy_document_ingestion) }}
        run: |
          set -euo pipefail
          rg="$(terraform output -raw resource_group_name)"
          jobs=()
          if [ "${{ inputs.deploy_read_api }}" = "true" ]; then
            jobs+=("$(terraform output -raw read_api_migrate_job_name)")
          fi
          if [ "${{ inputs.deploy_document_ingestion }}" = "true" ]; then
            jobs+=("$(terraform output -raw ingestion_migrate_job_name)")
          fi
          for job in "${jobs[@]}"; do
            [ -z "$job" ] && continue
            echo "starting migration job $job in $rg..."
            az containerapp job start --name "$job" --resource-group "$rg" >/dev/null
            completed=false
            for _ in $(seq 1 30); do
              exec_name="$(az containerapp job execution list --name "$job" --resource-group "$rg" \
                --query "sort_by([], &properties.startTime)[-1].name" -o tsv 2>/dev/null || true)"
              status="$(az containerapp job execution show --name "$job" --resource-group "$rg" \
                --job-execution-name "$exec_name" --query "properties.status" -o tsv 2>/dev/null || echo Running)"
              echo "$job migration status: $status"
              if [ "$status" = "Succeeded" ]; then completed=true; break; fi
              [ "$status" = "Failed" ] && { echo "$job migration failed"; exit 1; }
              sleep 12
            done
            [ "$completed" = "true" ] || { echo "$job migration did not complete in time"; exit 1; }
          done

      - name: Verify deployed health endpoints
        if: ${{ inputs.apply && (inputs.deploy_read_api || inputs.deploy_document_ingestion) }}
        run: |
          set -euo pipefail
          targets=()
          if [ "${{ inputs.deploy_read_api }}" = "true" ]; then
            targets+=("https://$(terraform output -raw read_api_fqdn)/healthz")
          fi
          if [ "${{ inputs.deploy_document_ingestion }}" = "true" ]; then
            targets+=("https://$(terraform output -raw ingestion_gateway_fqdn)/healthz")
          fi
          for target in "${targets[@]}"; do
            payload="$(curl --fail --silent --show-error --retry 12 --retry-delay 5 \
              --retry-all-errors --connect-timeout 5 --max-time 10 "$target")"
            printf '%s' "$payload" | python3 -c \
              'import json, sys; value=json.load(sys.stdin); assert value == {"status": "ok"}'
          done

      - name: Run canary publisher smoke
        if: ${{ inputs.apply }}
        run: |
          set -euo pipefail
          rg="$(terraform output -raw resource_group_name)"
          job="$(terraform output -raw canary_job_name)"
          if [ -z "$job" ]; then
            echo "canary job is disabled; deployment verification cannot continue" >&2
            exit 1
          fi
          az containerapp job start --name "$job" --resource-group "$rg" >/dev/null
          completed=false
          for _ in $(seq 1 20); do
            exec_name="$(az containerapp job execution list --name "$job" --resource-group "$rg" \
              --query "sort_by([], &properties.startTime)[-1].name" -o tsv 2>/dev/null || true)"
            status="$(az containerapp job execution show --name "$job" --resource-group "$rg" \
              --job-execution-name "$exec_name" --query "properties.status" -o tsv 2>/dev/null || echo Running)"
            echo "$job canary publisher status: $status"
            if [ "$status" = "Succeeded" ]; then completed=true; break; fi
            [ "$status" = "Failed" ] && { echo "$job canary publisher failed"; exit 1; }
            sleep 6
          done
          [ "$completed" = "true" ] || { echo "$job canary publisher did not complete in time"; exit 1; }

      - name: Record exact plan apply receipt
        if: ${{ inputs.apply && success() }}
        env:
          APPLY_PLAN_ID: ${{ inputs.plan_id }}
          APPLY_PLAN_DIGEST: ${{ inputs.plan_digest }}
        run: |
          set -euo pipefail
          applied_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          export APPLIED_AT="$applied_at" APPLY_PLAN_ID APPLY_PLAN_DIGEST
          python3 - <<'PY'
          import json
          import os

          receipt = {
              "schema_version": "fdai.deployment-apply-receipt.v1",
              "plan_id": os.environ["APPLY_PLAN_ID"],
              "plan_digest": os.environ["APPLY_PLAN_DIGEST"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "applied_at": os.environ["APPLIED_AT"],
              "status": "applied",
          }
          with open("apply-receipt.json", "w", encoding="utf-8") as stream:
              json.dump(receipt, stream, sort_keys=True, separators=(",", ":"))
              stream.write("\n")
          PY
          az storage blob upload \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --container-name deployment-plans \
            --name "${TF_VAR_env}/${APPLY_PLAN_ID}/apply-receipt.json" \
            --file apply-receipt.json --auth-mode login --overwrite false \
            --only-show-errors --content-type application/json --output none
          echo "Applied protected plan: \`$APPLY_PLAN_ID\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish sanitized apply receipt
        if: ${{ inputs.apply && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: deployment-apply-receipt-${{ inputs.plan_id }}
          path: infra/apply-receipt.json
          if-no-files-found: error
          retention-days: 1

      - name: Publish console API endpoints
        if: ${{ inputs.apply && inputs.deploy_console }}
        run: |
          read_api="$(terraform output -raw read_api_fqdn)"
          ingestion="$(terraform output -raw ingestion_gateway_fqdn)"
          {
            echo "VITE_READ_API_BASE_URL=${read_api:+https://$read_api}"
            echo "VITE_INGESTION_API_BASE_URL=${ingestion:+https://$ingestion}"
          } >> "$GITHUB_STEP_SUMMARY"
