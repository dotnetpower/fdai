name: deploy-dev

# Deploys the dev environment from a self-hosted runner inside the ops VNet.
# On a policy-locked ("private-everything") tenant this is the ONLY host with
# line-of-sight to the app's private endpoints (Key Vault, state storage), so
# the deploy cannot run on a GitHub-hosted runner or an operator laptop.
#
# Prerequisites (see infra/bootstrap/README.md):
#   - `infra/bootstrap` applied: ops VNet + state storage + registered runner
#     with labels [self-hosted, fdai-deploy] and a system-assigned MI holding
#     Contributor on the app RG + Storage Blob Data Contributor on the state SA.
#   - Repo variables (Settings > Secrets and variables > Actions > Variables):
#       ARM_SUBSCRIPTION_ID, AZURE_REGION, AZURE_REGION_SHORT, AZURE_TENANT_ID,
#       OPS_RESOURCE_GROUP_NAME, OPS_VNET_ID, OPS_VNET_NAME, STATE_STORAGE_ACCOUNT
#   - Repo secrets:
#       POSTGRES_ADMIN_LOGIN, POSTGRES_ADMIN_PASSWORD
#   - Production workflow inputs:
#       digest-pinned image, alert email, monthly budget, budget-alert email JSON.
#
# Default run is plan-only (shadow). Set the `apply` input to true to enforce.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment."
        type: choice
        options: [dev, staging, prod]
        default: dev
      apply:
        description: "Apply the plan (true) or plan-only (false, default)."
        type: boolean
        default: false
      production_core_image:
        description: "Prod-only signed image reference pinned by sha256 digest."
        type: string
        required: false
      production_alert_email:
        description: "Prod-only Azure Monitor alert destination."
        type: string
        required: false
      production_monthly_budget:
        description: "Prod-only positive monthly budget amount."
        type: string
        required: false
      production_budget_alert_emails_json:
        description: "Prod-only JSON string list of budget alert emails."
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: [self-hosted, fdai-deploy]
    defaults:
      run:
        working-directory: infra
    env:
      # AAD auth for both the azurerm provider and the state backend blob,
      # using the runner's system-assigned managed identity (az login below).
      ARM_USE_AZUREAD: "true"
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      # tfvars-equivalent inputs (non-secret via Variables, secret via Secrets).
      TF_VAR_env: ${{ inputs.environment }}
      TF_VAR_region: ${{ vars.AZURE_REGION }}
      TF_VAR_region_short: ${{ vars.AZURE_REGION_SHORT }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
      TF_VAR_enable_private_networking: "true"
      TF_VAR_enable_private_postgres: ${{ inputs.environment == 'prod' }}
      TF_VAR_runner_vnet_id: ${{ vars.OPS_VNET_ID }}
      TF_VAR_runner_vnet_name: ${{ vars.OPS_VNET_NAME }}
      TF_VAR_ops_resource_group_name: ${{ vars.OPS_RESOURCE_GROUP_NAME }}
      TF_VAR_postgres_admin_login: ${{ secrets.POSTGRES_ADMIN_LOGIN }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install readiness gate dependency
        if: inputs.environment == 'prod'
        run: python3 -m pip install --quiet pyyaml
        working-directory: ${{ github.workspace }}

      - name: Verify production architecture-review evidence
        if: inputs.environment == 'prod'
        run: python3 scripts/check-arb-readiness.py --require-production-ready
        working-directory: ${{ github.workspace }}

      - name: Bind production Terraform inputs
        if: inputs.environment == 'prod'
        env:
          PROD_CORE_IMAGE: ${{ inputs.production_core_image }}
          PROD_ALERT_EMAIL: ${{ inputs.production_alert_email }}
          PROD_MONTHLY_BUDGET_AMOUNT: ${{ inputs.production_monthly_budget }}
          PROD_BUDGET_ALERT_EMAILS_JSON: ${{ inputs.production_budget_alert_emails_json }}
        run: |
          if [[ ! "$PROD_CORE_IMAGE" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "PROD_CORE_IMAGE must be digest-pinned." >&2
            exit 1
          fi
          if [[ -z "$PROD_ALERT_EMAIL" ]]; then
            echo "production_alert_email is required." >&2
            exit 1
          fi
          if [[ ! "$PROD_MONTHLY_BUDGET_AMOUNT" =~ ^[1-9][0-9]*([.][0-9]+)?$ ]]; then
            echo "PROD_MONTHLY_BUDGET_AMOUNT must be positive." >&2
            exit 1
          fi
          python3 -c 'import json, os; value=json.loads(os.environ["PROD_BUDGET_ALERT_EMAILS_JSON"]); assert isinstance(value, list) and value and all(isinstance(item, str) and item for item in value)'
          {
            echo "TF_VAR_core_image=$PROD_CORE_IMAGE"
            echo "TF_VAR_enable_resource_locks=true"
            echo "TF_VAR_kv_purge_protection_enabled=true"
            echo "TF_VAR_kv_soft_delete_retention_days=90"
            echo "TF_VAR_postgres_backup_retention_days=35"
            echo "TF_VAR_postgres_geo_redundant_backup=true"
            echo "TF_VAR_acr_sku=Premium"
            echo "TF_VAR_enable_monitoring=true"
            echo "TF_VAR_alert_email=$PROD_ALERT_EMAIL"
            echo "TF_VAR_monthly_budget_amount=$PROD_MONTHLY_BUDGET_AMOUNT"
            echo "TF_VAR_budget_alert_emails=$PROD_BUDGET_ALERT_EMAILS_JSON"
          } >> "$GITHUB_ENV"

      - name: Azure login (runner managed identity)
        run: az login --identity --allow-no-subscriptions

      - name: Ensure state container
        # Created data-plane from the runner (inside the VNet, over the blob
        # private endpoint) since the account is private + key-auth is
        # policy-forbidden. Idempotent.
        run: |
          az storage container create \
            --account-name "${{ vars.STATE_STORAGE_ACCOUNT }}" \
            --name tfstate --auth-mode login --only-show-errors

      - name: Activate remote state backend
        run: cp backend.azurerm.tf.example backend.tf

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.OPS_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=fdai-${{ inputs.environment }}.tfstate"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=300s -out=dev.plan

      - name: Terraform apply
        if: ${{ inputs.apply }}
        run: terraform apply -input=false -lock-timeout=300s dev.plan
