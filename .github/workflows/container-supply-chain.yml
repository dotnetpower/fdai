name: container-supply-chain

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "rule-catalog/**"
      - "policies/**"
      - ".github/workflows/container-supply-chain.yml"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "rule-catalog/**"
      - "policies/**"
      - ".github/workflows/container-supply-chain.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-scan-attest:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for verification
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin trivy
          trivy --version

      - name: Scan image for high and critical vulnerabilities
        run: >-
          trivy image --exit-code 1 --severity HIGH,CRITICAL
          "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Generate CycloneDX SBOM
        run: >-
          trivy image --format cyclonedx --output sbom.cdx.json
          "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v4
        with:
          name: fdai-sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push verified image and capture digest
        if: github.event_name != 'pull_request'
        id: push
        run: |
          image="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "$image"
          digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid pushed image digest: $digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
