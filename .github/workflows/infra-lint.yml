name: infra-lint

# Fast, credential-free static checks on the terraform under infra/. Runs on
# GitHub-hosted runners (no Azure access needed) for every PR that touches
# infra, so misformatted / invalid / insecure IaC is caught before it reaches
# the self-hosted deploy runner. Complements deploy-dev.yml (which needs the
# VNet runner for a real plan/apply).

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [infra, infra/bootstrap]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          quiet: true
          soft_fail: true
          framework: terraform
