name: infra-lint

# Fast, credential-free static checks on the terraform under infra/. Runs on
# GitHub-hosted runners (no Azure access needed) for every PR that touches
# infra, so misformatted / invalid / insecure IaC is caught before it reaches
# the self-hosted deploy runner. Complements deploy-dev.yml (which needs the
# VNet runner for a real plan/apply).

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [infra, infra/bootstrap]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          # Match the version the deploy runner uses. An older pin (e.g. 1.9.x)
          # is stricter about dynamic-block for_each tuples than the terraform
          # that actually deploys, producing false validate failures on modules
          # that deploy cleanly.
          terraform_version: "latest"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install scanners via their stable CLIs rather than floating marketplace
      # action tags. HIGH / CRITICAL findings block the infrastructure PR.
      #
      # Trivy's installer is pinned to a released tag (NOT `main`) - piping
      # HEAD-of-main to sudo sh is a supply-chain vector even for a
      # short-lived CI runner. Checkov pins the pypi version for the same
      # reason.
      - name: Install scanners
        env:
          TRIVY_VERSION: "0.72.0"
          CHECKOV_VERSION: "3.2.256"
        run: |
          # Pinned release binary (not `main` piped to sudo sh - supply chain).
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin trivy
          pipx install "checkov==${CHECKOV_VERSION}"

      - name: Trivy (terraform misconfig)
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL infra

      - name: Checkov
        run: >-
          checkov -d infra --quiet --compact --framework terraform
          --baseline infra/.checkov.baseline

