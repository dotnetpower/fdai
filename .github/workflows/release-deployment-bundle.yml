name: release-deployment-bundle

on:
  workflow_dispatch:
    inputs:
      bundle_version:
        description: "Semantic version for the deployment bundle."
        type: string
        required: true
      release_channel:
        description: "Signed release channel carried by the bundle manifest."
        type: choice
        options: [stable, beta, development]
        default: development
      min_cli_version:
        description: "Minimum compatible fdaictl version."
        type: string
        default: "0.0.0"
      max_cli_version:
        description: "Optional maximum compatible fdaictl version."
        type: string
        required: false
      publish_release:
        description: "Create a GitHub Release after reproducibility and verification pass."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deployment-bundle-${{ inputs.bundle_version }}
  cancel-in-progress: false

jobs:
  verify:
    name: clean checkout, live database, and package verification
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fdai
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: fdai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fdai -d fdai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      FDAI_DATABASE_URL: postgresql+psycopg://fdai:ci@localhost:5432/fdai
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Confirm clean checkout
        run: test -z "$(git status --porcelain)"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install locked project and console
        run: |
          uv sync --extra dev --frozen
          npm --prefix console ci --no-audit --no-fund

      - name: Install pinned OPA
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static"
          echo "dfd5081fc6f930dfeaf2a225e31e616fc227dc0c7b43019b73d6f8fb8a1de1aa  /tmp/opa" \
            | sha256sum -c -
          chmod +x /tmp/opa
          sudo mv /tmp/opa /usr/local/bin/opa

      - name: Upgrade disposable database
        run: uv run alembic upgrade head

      - name: Run full repository verification
        run: uv run bash scripts/verify.sh --full

      - name: Run productization and isolated wheel verification
        run: bash scripts/deployment/release/verify-productization.sh

      - name: Confirm verification did not rewrite tracked source
        run: git diff --exit-code

  dependency-audit:
    name: dependency vulnerability audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: .

  bundle:
    runs-on: ubuntu-24.04
    needs: [verify, dependency-audit]
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Install locked project
        run: uv sync --frozen

      - name: Build twice and verify reproducibility
        env:
          BUNDLE_VERSION: ${{ inputs.bundle_version }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          MIN_CLI_VERSION: ${{ inputs.min_cli_version }}
          MAX_CLI_VERSION: ${{ inputs.max_cli_version }}
          BUNDLE_SIGNING_KEY_PEM: ${{ secrets.FDAI_BUNDLE_SIGNING_KEY_PEM }}
        run: |
          set -euo pipefail
          umask 077
          signing_key="$(mktemp)"
          trap 'rm -f "$signing_key"' EXIT
          printf '%s' "$BUNDLE_SIGNING_KEY_PEM" > "$signing_key"
          if [ ! -s "$signing_key" ]; then
            echo "FDAI_BUNDLE_SIGNING_KEY_PEM is required." >&2
            exit 1
          fi
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          mkdir -p release-artifacts first second
          build_bundle() {
            local output_root="$1"
            local archive="$2"
            local public_key="$3"
            args=(
              --source "$GITHUB_WORKSPACE"
              --destination "$output_root"
              --archive "$archive"
              --private-key "$signing_key"
              --public-key-output "$public_key"
              --bundle-version "$BUNDLE_VERSION"
              --release-channel "$RELEASE_CHANNEL"
              --min-cli-version "$MIN_CLI_VERSION"
            )
            if [ -n "$MAX_CLI_VERSION" ]; then
              args+=(--max-cli-version "$MAX_CLI_VERSION")
            fi
            uv run python scripts/deployment/release/build-deployment-bundle.py "${args[@]}"
          }
          build_bundle first/bundle first/bundle.tar.gz first/bundle-public.pem
          build_bundle second/bundle second/bundle.tar.gz second/bundle-public.pem
          diff -qr first/bundle second/bundle
          cmp first/bundle.tar.gz second/bundle.tar.gz
          cmp first/bundle-public.pem second/bundle-public.pem
          uv run fdaictl bundle verify \
            --bundle first/bundle --public-key first/bundle-public.pem --output json
          cp first/bundle.tar.gz \
            "release-artifacts/fdai-deployment-bundle-${BUNDLE_VERSION}.tar.gz"
          cp first/bundle-public.pem \
            "release-artifacts/fdai-deployment-bundle-${BUNDLE_VERSION}.public.pem"
          cp first/bundle/manifest.json \
            "release-artifacts/fdai-deployment-bundle-${BUNDLE_VERSION}.manifest.json"
          cp first/bundle/manifest.json.sig \
            "release-artifacts/fdai-deployment-bundle-${BUNDLE_VERSION}.manifest.json.sig"
          sha256sum release-artifacts/* > release-artifacts/SHA256SUMS

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fdai-deployment-bundle-${{ inputs.bundle_version }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_VERSION: ${{ inputs.bundle_version }}
        run: |
          set -euo pipefail
          gh release create "deployment-bundle-${BUNDLE_VERSION}" \
            release-artifacts/* \
            --target "$GITHUB_SHA" \
            --title "FDAI deployment bundle ${BUNDLE_VERSION}" \
            --notes "Reproducibly built, Ed25519-signed FDAI deployment bundle."
