name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (typical PR workflow).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privileged default; individual jobs elevate only when required.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint • mypy • pytest (with coverage)
    runs-on: ubuntu-24.04
    env:
      FDAI_DATABASE_URL: postgresql://fdai:devonly@127.0.0.1:5432/fdai
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fdai
          POSTGRES_PASSWORD: devonly
          POSTGRES_DB: fdai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fdai -d fdai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.13)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra pdf-report --frozen

      - name: Materialize resolved model manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          RESOLVED_MODELS_JSON: ${{ vars.RESOLVED_MODELS_JSON }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("RESOLVED_MODELS_JSON", "").strip()
          if not raw:
              if os.environ["EVENT_NAME"] != "pull_request":
                  raise SystemExit("RESOLVED_MODELS_JSON repository variable is required")
              payload = {
                  "schema_version": "1.0.0",
                  "capabilities": [],
                  "mixed_model_mode": "hil-only",
              }
          else:
              payload = json.loads(raw)
              if not isinstance(payload, dict):
                  raise SystemExit("RESOLVED_MODELS_JSON must contain a JSON object")
              capabilities = payload.get("capabilities")
              if not isinstance(capabilities, list):
                  raise SystemExit("RESOLVED_MODELS_JSON.capabilities must be an array")
          Path("resolved-models.json").write_text(
            json.dumps(payload, indent=2, sort_keys=True) + "\n",
            encoding="utf-8",
          )
          PY

      - name: Install OPA (Rego runner)
        # T0's OpaRegoEvaluator shells out to `opa eval`. Local dev may
        # not have OPA installed (tests skip gracefully); CI installs a
        # pinned version so the merge gate exercises the subprocess path.
        # Checksum pinned to defend against a mid-flight artifact swap.
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static"
          echo "dfd5081fc6f930dfeaf2a225e31e616fc227dc0c7b43019b73d6f8fb8a1de1aa  /tmp/opa" \
            | sha256sum -c -
          chmod +x /tmp/opa
          sudo mv /tmp/opa /usr/local/bin/opa
          opa version

      - name: ruff format --check
        run: uv run ruff format --check src tests

      - name: ruff check
        run: uv run ruff check src tests

      - name: mypy --strict
        run: uv run mypy

      - name: pytest + coverage
        # The documented safety core is the complete event-to-audit hot path.
        # Combined line/branch coverage stays above 90%; individual low files
        # remain visible in the term-missing report for focused hardening.
        run: >
          uv run pytest -q
          --cov=src/fdai/core/event_ingest
          --cov=src/fdai/core/trust_router
          --cov=src/fdai/core/tiers/t0_deterministic
          --cov=src/fdai/core/tiers/t1_lightweight
          --cov=src/fdai/core/tiers/t2_reasoning
          --cov=src/fdai/core/quality_gate
          --cov=src/fdai/core/risk_gate
          --cov=src/fdai/core/hil_resume
          --cov=src/fdai/core/executor
          --cov=src/fdai/core/audit
          --cov=src/fdai/core/control_loop
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  operator-surfaces:
    name: console and CLI tests • typecheck • build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            console/package-lock.json
            cli/package-lock.json

      - name: Install locked console dependencies
        run: npm --prefix console ci --no-audit --no-fund

      - name: Test and build console
        run: npm --prefix console test && npm --prefix console run build

      - name: Install locked CLI dependencies
        run: npm --prefix cli ci --no-audit --no-fund

      - name: Test and typecheck CLI
        run: npm --prefix cli test && npm --prefix cli run typecheck

  translations:
    name: docs/**/*.md ↔ -ko.md pair check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-translations.sh
        run: bash scripts/quality/localization/check-translations.sh

  catalog-parity:
    name: L2 message-catalog parity (ko keys subset of en)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-catalog-parity.sh
        run: bash scripts/quality/localization/check-catalog-parity.sh

  punctuation:
    name: ASCII punctuation (no em-dash / smart-quotes / nbsp)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-punctuation.sh
        run: bash scripts/quality/repository/check-punctuation.sh

  guids:
    name: No customer/personal GUIDs (generic-scope guard)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-guids.sh
        run: bash scripts/quality/repository/check-guids.sh

  architecture-review:
    name: architecture-review readiness contract
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Validate architecture-review manifest
        run: python3 scripts/governance/check-arb-readiness.py

  stewardship:
    name: agent stewardship handover-map guard
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: check-stewardship.sh
        run: bash scripts/governance/check-stewardship.sh

  chaos-scenarios:
    name: chaos-scenarios catalog + symptom-index guard
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime deps for the loader
        run: python3 -m pip install --quiet pyyaml jsonschema

      - name: Install the package (editable) for module imports
        run: python3 -m pip install --quiet -e .

      - name: check-chaos-scenarios.sh
        run: bash scripts/catalog/check-chaos-scenarios.sh

  core-imports:
    name: core/ module-boundary guard (no cloud SDK, no HTTP client)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-core-imports.sh
        run: bash scripts/quality/architecture/check-core-imports.sh

  agents-imports:
    name: agents/ module-boundary guard (no cloud SDK, no HTTP client, no delivery/)
    # Mirror of `core-imports`, applied to src/fdai/agents/. Agents are
    # policy / decision code (pantheon); a transport import in an agent
    # collapses the delivery boundary the same way a core violation
    # collapses the CSP boundary. Tracker #14, issue #22.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-agents-imports.sh
        run: bash scripts/quality/architecture/check-agents-imports.sh

  file-loc:
    name: file LOC guard (warn > 400, fail > 800 in enforce mode)
    # Existing >400 LOC files remain visible warnings; any file above 800
    # blocks the change. Current tree has no >800 LOC Python file.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-file-loc.sh
        env:
          FILE_LOC_MODE: enforce
        run: bash scripts/quality/architecture/check-file-loc.sh

  subsystem-fanout:
    name: core/ subsystem fan-out guard (warn >= 8, fail >= 15 in enforce mode)
    # Prevents a second control_loop.py (1,725 LOC / 30+ subsystem imports)
    # from emerging. The current tree passes enforce mode with one allowlist.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-subsystem-fanout.sh
        env:
          SUBSYSTEM_FANOUT_MODE: enforce
        run: bash scripts/quality/architecture/check-subsystem-fanout.sh

  doc-links:
    name: broken markdown link guard (symlink-aware)
    # 41 doc links pointed at pre-refactor Python paths after G-1..G-7
    # landed. This gate catches the class of drift so refactors that
    # rename or move a source file can never silently orphan a doc
    # link. Tracker #14, follow-up sweep.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: check-doc-links.sh
        run: bash scripts/quality/repository/check-doc-links.sh

  protected-paths:
    name: framework-surface guard (advisory upstream, block in fork)
    # Runs on PRs (base..head range) and on direct pushes to a protected
    # branch (before..after range), because this repo is trunk-based - a
    # fork that bypasses the local pre-push hook must still be caught here.
    # Upstream mode emits ::warning:: annotations and passes; a fork clone
    # (committed `.fdai-fork` marker, or FDAI_FORK=1) turns it into a blocker.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the diff range resolves.
          fetch-depth: 0

      - name: check-protected-paths.sh
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            base_sha="$(git rev-parse "origin/${{ github.base_ref }}")"
            range="${base_sha}...HEAD"
          else
            before="${{ github.event.before }}"
            # All-zeros = branch just created / no prior tip; nothing to diff.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              echo "protected-paths: no prior commit to diff against - skipping."
              exit 0
            fi
            range="${before}...${{ github.sha }}"
          fi
          echo "protected-paths: diffing range '$range'"
          bash scripts/integrity/check-protected-paths.sh "$range"

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit in a PR.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pip-audit against pyproject.toml
        # The action's `inputs` must be a project directory (which contains
        # pyproject.toml), not the file itself - passing `pyproject.toml`
        # sends pip-audit into requirements-file mode and it chokes on the
        # first `[project]` table. Repo root has our only pyproject.toml.
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: .

  exemption-check:
    name: Exemption artifact validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.13)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Validate every rule-catalog/exemptions/*.json
        # No-op when the directory is empty (fresh clone).
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(rule-catalog/exemptions/*.json)
          if (( ${#files[@]} == 0 )); then
            echo "No exemption artifacts to validate."
            exit 0
          fi
          uv run python -m fdai.rule_catalog.schema.exemption_cli "${files[@]}"

  governance-transitions:
    name: Governance effect-transition gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the base ref resolves for the before/after diff.
          fetch-depth: 0

      - name: Set up uv (Python 3.13)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Reject disallowed governance effect transitions
        # Compares the governance catalog at the base ref against the working
        # tree. No-op until rule-catalog/governance/ is populated (a missing
        # root at either snapshot loads as an empty catalog).
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            base="origin/${{ github.base_ref }}"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              echo "governance-transitions: no prior commit to diff against - skipping."
              exit 0
            fi
            base="$before"
          fi
          echo "governance-transitions: base ref '$base'"
          uv run python scripts/governance/check-governance-transitions.py --base "$base"

  freeze-scenarios:
    name: Frozen scenario-set immutability (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff against the base ref.
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Detect modifications / deletions in frozen versions
        run: |
          set -euo pipefail
          base_sha=$(git rev-parse origin/${{ github.base_ref }})
          # Only *.json files under versioned scenario folders count as frozen.
          # Adding a new version directory (or new files in the current unfrozen
          # tip) is allowed; edits and deletes are not.
          changed=$(git diff --name-only --diff-filter=MDR "$base_sha...HEAD" \
                    -- 'tests/scenarios/v*/*.json' || true)
          if [[ -n "$changed" ]]; then
            echo "Frozen scenario files modified or deleted:"
            printf '  - %s\n' $changed
            echo ""
            echo "Frozen versions are immutable - create a new version directory instead."
            exit 1
          fi
          echo "No frozen scenario files were modified."

  db-migrations:
    name: Alembic migrations against pgvector
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fdai
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: fdai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fdai -d fdai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      FDAI_DATABASE_URL: postgresql+psycopg://fdai:ci@localhost:5432/fdai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.13)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run alembic upgrade head
        run: uv run alembic upgrade head

      - name: Run integration test suite
        run: uv run pytest -q -m integration tests/persistence/test_migrations_integration.py

  terraform-validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt (recursive check)
        run: terraform fmt -check -recursive

      - name: terraform init (no backend - offline validate)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate
