<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet - Agent roster - FDAI Console</title>
  <link rel="stylesheet" href="assets/calm-slate.css?v=page-context-v3" />
  <script src="assets/calm-slate.js?v=page-context-v3" defer></script>
  <style>
    /* Fleet roster: exception-first live status for the fixed pantheon. */
    .fl-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
    .fl-title-copy { min-width: 0; }
    .fl-source { display: flex; align-items: center; flex: 0 0 auto; margin-top: 5px; color: var(--cs-text-soft); font-size: 12.5px; white-space: nowrap; }
    .fl-source strong { color: var(--cs-text); }

    .fl-summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); margin: 14px 0 12px; overflow: hidden; border: 1px solid var(--cs-hairline); border-radius: 8px; background: var(--cs-card); }
    .fl-summary button { min-width: 0; padding: 11px 13px; border: 0; border-right: 1px solid var(--cs-hairline); background: transparent; color: inherit; text-align: left; font: inherit; cursor: pointer; }
    .fl-summary button:last-child { border-right: 0; }
    .fl-summary button:hover, .fl-summary button[aria-pressed="true"] { background: transparent; box-shadow: inset 0 -2px 0 currentColor; }
    .fl-summary-label { display: block; color: var(--cs-text-soft); font-size: 11.5px; font-weight: 650; text-transform: uppercase; }
    .fl-live-tag { display: inline-flex; align-items: center; gap: 4px; margin-left: 5px; font-size: 9px; font-weight: 650; letter-spacing: .03em; }
    .fl-summary-value { display: inline-block; margin-top: 3px; font-size: 25px; font-weight: 650; line-height: 1; }
    .fl-summary-note { display: block; overflow: hidden; margin-top: 5px; color: var(--cs-text-soft); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .fl-summary button.is-attention .fl-summary-value { color: inherit; }

    .fl-context { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; color: var(--cs-text-soft); font-size: 12.5px; }
    .fl-context strong { color: var(--cs-text); font-weight: 600; }
    .fl-context-meta { flex: 0 0 auto; }

    .fl-filterbar { margin-bottom: 14px; border-radius: 8px; }
    .fl-filterbar .cs-chipset { gap: 12px; padding: 0; border-radius: 0; background: transparent; }
    .fl-filterbar .cs-chipset .cs-chip,
    .fl-filterbar .cs-chipset .cs-chip:hover,
    .fl-filterbar .cs-chipset .cs-chip.cs-active { padding: 3px 0; border-bottom: 1px solid transparent; border-radius: 0; background: transparent; box-shadow: none; color: inherit; }
    .fl-filterbar .cs-chipset .cs-chip.cs-active { border-bottom-color: currentColor; font-weight: 650; }
    .fl-results { margin-left: auto; color: var(--cs-text-soft); font-size: 12.5px; white-space: nowrap; }
    .fl-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); align-items: start; gap: 10px; }
    .fl-card { display: flex; min-width: 0; flex-direction: column; padding: 12px; border: 1px solid var(--cs-hairline); border-radius: 8px; background: var(--cs-card); box-shadow: 0 2px 8px rgba(46,54,64,.04); }
    .fl-card.is-attention { border-left: 3px solid var(--cs-terracotta); padding-left: 10px; }
    .fl-card-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .fl-avatar { display: grid; width: 32px; height: 32px; flex: 0 0 auto; place-items: center; border: 1px solid var(--cs-hairline); border-radius: 7px; background: var(--cs-shade); }
    .fl-avatar img { width: 20px; height: 20px; object-fit: contain; }
    .fl-identity { min-width: 0; flex: 1; }
    .fl-name { overflow: hidden; margin: 0; font-size: 13.5px; font-weight: 650; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }
    .fl-role { overflow: hidden; margin: 1px 0 0; color: var(--cs-text-soft); font-size: 11.5px; text-overflow: ellipsis; white-space: nowrap; }
    .fl-badges { display: flex; align-items: center; justify-content: flex-end; gap: 4px; flex-wrap: wrap; }
    .fl-state, .fl-mode, .fl-alert { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 999px; font-size: 9.5px; font-weight: 650; line-height: 1.4; text-transform: uppercase; white-space: nowrap; }
    .fl-state::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .fl-state.is-engaged { color: var(--cs-steel); background: rgba(68,104,142,.11); }
    .fl-state.is-watching { color: var(--cs-teal); background: rgba(79,132,126,.11); }
    .fl-state.is-idle { color: var(--cs-text-soft); background: var(--cs-shade); }
    .fl-state.is-unobserved { color: var(--cs-dusty-red); background: rgba(172,90,90,.11); }
    .fl-mode { color: var(--cs-plum); background: rgba(123,108,156,.12); }
    .fl-alert { color: var(--cs-terracotta); background: rgba(188,116,73,.12); }
    .fl-state.is-watching::before { animation: fl-watch-pulse 1.5s ease-out infinite; }

    .fl-live { display: inline-flex; align-items: center; gap: 5px; margin-left: 7px; color: var(--cs-text-soft); font-size: 10.5px; font-weight: 500; text-transform: none; }
    .fl-live-pulse { display: inline-block; width: 6px; height: 6px; flex: 0 0 auto; border-radius: 50%; background: currentColor; animation: fl-live-pulse 1.4s ease-out infinite; }

    @keyframes fl-watch-pulse {
      0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
      70% { box-shadow: 0 0 0 4px transparent; opacity: .65; }
      100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
    }
    @keyframes fl-live-pulse {
      0% { box-shadow: 0 0 0 0 rgba(107,113,120,.32); opacity: 1; }
      70% { box-shadow: 0 0 0 4px rgba(107,113,120,0); opacity: .6; }
      100% { box-shadow: 0 0 0 0 rgba(107,113,120,0); opacity: 1; }
    }

    .fl-work { min-height: 43px; margin-top: 9px; }
    .fl-work-label { display: block; color: var(--cs-text-soft); font-size: 10.5px; font-weight: 650; text-transform: uppercase; }
    .fl-work strong { display: block; margin-top: 1px; font-size: 12.5px; font-weight: 550; line-height: 1.3; }
    .fl-metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 7px; padding-top: 8px; border-top: 1px solid var(--cs-hairline); }
    .fl-metric { min-width: 0; }
    .fl-metric span { display: block; overflow: hidden; color: var(--cs-text-soft); font-size: 10.5px; text-overflow: ellipsis; text-transform: uppercase; white-space: nowrap; }
    .fl-metric strong { display: block; overflow: hidden; margin-top: 1px; font-size: 12.5px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }

    .fl-card-foot { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 8px; }
    .fl-details { position: relative; flex: 1; }
    .fl-details[open] { flex: 0 0 100%; }
    .fl-details summary { width: max-content; color: var(--cs-steel); font-size: 12.5px; cursor: pointer; list-style: none; }
    .fl-details summary::-webkit-details-marker { display: none; }
    .fl-details summary::after { content: " +"; }
    .fl-details[open] summary::after { content: " -"; }
    .fl-detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px 12px; margin: 9px 0 0; padding: 10px; border-radius: 6px; background: var(--cs-shade); }
    .fl-detail-grid div { min-width: 0; }
    .fl-detail-grid dt { color: var(--cs-text-soft); font-size: 10.5px; text-transform: uppercase; }
    .fl-detail-grid dd { overflow-wrap: anywhere; margin: 1px 0 0; font-size: 12px; font-weight: 550; }
    .fl-actions { display: flex; gap: 6px; }
    .fl-actions .cs-btn { min-height: 28px; padding: 4px 8px; font-size: 11.5px; }
    .fl-empty { grid-column: 1 / -1; padding: 36px; border: 1px dashed var(--cs-hairline); border-radius: 8px; color: var(--cs-text-soft); text-align: center; }

    @media (max-width: 1100px) {
      .fl-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .fl-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .cs-page { padding-top: 20px; }
      .fl-title-row, .fl-context { align-items: flex-start; flex-direction: column; gap: 8px; }
      .fl-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .fl-summary button:nth-child(2) { border-right: 0; }
      .fl-summary button:nth-child(-n+2) { border-bottom: 1px solid var(--cs-hairline); }
      .fl-results { width: 100%; margin-left: 0; }
    }
    @media (max-width: 480px) {
      .cs-page { padding-top: 10px; }
      .fl-summary button { padding: 10px 12px; }
      .fl-summary-value { font-size: 22px; }
      .fl-summary-note, .fl-context-meta { display: none; }
      .fl-filterbar { padding: 10px; }
      .fl-card-head { align-items: flex-start; }
      .fl-badges { max-width: 118px; }
      .fl-card-foot { align-items: flex-start; flex-direction: column; }
      .fl-actions { width: 100%; }
      .fl-actions .cs-btn { flex: 1; justify-content: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      .fl-state.is-watching::before,
      .fl-live-pulse { animation: none; }
    }
  </style>
</head>
<body>
  <main class="cs-container cs-page">
    <div class="cs-subnav" aria-label="Agent views">
      <a href="agents.html" class="cs-active" aria-current="page">Fleet</a>
      <a href="agents-constellation.html">Org</a>
      <a href="agent-activity.html">Activity</a>
    </div>

    <header class="cs-page-header">
      <div class="fl-title-row">
        <div class="fl-title-copy">
          <h1>Fleet</h1>
          <p class="cs-lead">Current work, fixed ownership, and attention across the 15-agent fleet.</p>
        </div>
        <div class="fl-source" aria-label="Runtime data is current">
          <span class="fl-live-pulse" aria-hidden="true"></span>
          <span><strong>Live stream</strong> - <span id="streamAge">signal now</span></span>
        </div>
      </div>
    </header>

    <section class="fl-summary" aria-label="Fleet summary">
      <button type="button" data-summary-state="engaged" aria-pressed="false">
        <span class="fl-summary-label">Engaged</span>
        <span class="fl-summary-value">3</span>
        <span class="fl-summary-note">handling work now</span>
      </button>
      <button type="button" data-summary-state="watching" aria-pressed="false">
        <span class="fl-summary-label">Watching <span class="fl-live-tag"><span class="fl-live-pulse" aria-hidden="true"></span> Live</span></span>
        <span class="fl-summary-value">8</span>
        <span class="fl-summary-note"><span id="watchSignalCount">24</span> signals in the last minute</span>
      </button>
      <button type="button" data-summary-state="idle" aria-pressed="false">
        <span class="fl-summary-label">Idle</span>
        <span class="fl-summary-value">4</span>
        <span class="fl-summary-note">ready to wake</span>
      </button>
      <button type="button" class="is-attention" data-summary-state="attention" aria-pressed="false">
        <span class="fl-summary-label">Attention</span>
        <span class="fl-summary-value">1</span>
        <span class="fl-summary-note">Vidar recovery probe</span>
      </button>
    </section>

    <div class="fl-context">
      <span><strong>Idle is healthy.</strong> Agents wake on subscribed topics. Fixed ownership and boundaries are in Details.</span>
      <span class="fl-context-meta">15 bindings - 15 observed</span>
    </div>

    <div class="cs-filterbar fl-filterbar" aria-label="Fleet filters">
      <span class="cs-fb-label">Layer</span>
      <div class="cs-chipset" data-filter-group="layer">
        <button type="button" class="cs-chip cs-active" data-filter="all" aria-pressed="true">All</button>
        <button type="button" class="cs-chip" data-filter="governance" aria-pressed="false">Governance</button>
        <button type="button" class="cs-chip" data-filter="pipeline" aria-pressed="false">Pipeline</button>
        <button type="button" class="cs-chip" data-filter="domain" aria-pressed="false">Domain</button>
      </div>
      <span class="cs-fb-label">State</span>
      <div class="cs-chipset" data-filter-group="state">
        <button type="button" class="cs-chip cs-active" data-filter="all" aria-pressed="true">All</button>
        <button type="button" class="cs-chip" data-filter="engaged" aria-pressed="false">Engaged</button>
        <button type="button" class="cs-chip" data-filter="watching" aria-pressed="false">Watching</button>
        <button type="button" class="cs-chip" data-filter="idle" aria-pressed="false">Idle</button>
      </div>
      <label class="cs-fb-search">
        <input id="fleetSearch" type="search" placeholder="Filter by agent or role" autocomplete="off" />
      </label>
      <span id="fleetResults" class="fl-results" role="status" aria-live="polite">15 agents</span>
    </div>

    <section id="fleetGrid" class="fl-grid" aria-label="Agent fleet"></section>
  </main>

  <script>
    (function () {
      "use strict";

      var iconRoot = "../../console/public/agent-icons/";
      var agents = [
        { name: "Vidar", role: "Recovery - Pipeline", layer: "pipeline", state: "engaged", attention: "Recovering", work: "DR probe validating rollback readiness", metrics: [["Last success", "4m ago"], ["Rollbacks (24h)", "2"]], details: [["Owns", "Rollback"], ["Boundary", "Hard dependency"], ["Reports to", "Thor"], ["Binding", "event-bus subscriber"], ["Authority", "Recover / rollback"], ["State since", "6m ago"]] },
        { name: "Forseti", role: "Judge - Pipeline", layer: "pipeline", state: "engaged", work: "Cross-checking a change verdict", metrics: [["Auto share (1h)", "82%"], ["Abstain (1h)", "7%"]], details: [["Owns", "Verdict, RCA, SecurityEvent, ArbitrationRequest"], ["Boundary", "T2 abstain only"], ["Reports to", "Odin"], ["Binding", "decision subscriber"], ["Authority", "Judge / abstain"], ["State since", "3m ago"]] },
        { name: "Thor", role: "Responder - Pipeline", layer: "pipeline", state: "engaged", work: "Dispatching verified remediation", metrics: [["Executes (1h)", "47"], ["Failures (1h)", "0"]], details: [["Owns", "ActionRun, ActionAttempt"], ["Boundary", "Sole executor"], ["Reports to", "Odin"], ["Binding", "approved-action subscriber"], ["Authority", "Execute approved actions"], ["State since", "28s ago"]] },
        { name: "Var", role: "Approver - Pipeline", layer: "pipeline", state: "watching", work: "Monitoring the human approval queue", metrics: [["Pending", "3"], ["Decisions (1h)", "7"]], details: [["Owns", "Approval"], ["Boundary", "Independent approver"], ["Reports to", "Thor"], ["Binding", "approval subscriber"], ["Authority", "Approve / reject"], ["State since", "12m ago"]] },
        { name: "Huginn", role: "Event Collector - Pipeline", layer: "pipeline", state: "watching", work: "Collecting raw ingress events", metrics: [["Events (1h)", "1,842"], ["Ingest lag", "< 1s"]], details: [["Owns", "Event"], ["Boundary", "Deterministic ingress"], ["Reports to", "Forseti"], ["Binding", "raw ingress subscriber"], ["Authority", "Observe / normalize"], ["State since", "1h 12m"]] },
        { name: "Heimdall", role: "Observer - Pipeline", layer: "pipeline", state: "watching", work: "Scanning for drift and anomalies", metrics: [["Anomalies (1h)", "7"], ["Drifts (1h)", "2"]], details: [["Owns", "Anomaly, Drift, Forecast, ForecastOutcome"], ["Boundary", "Deterministic-first"], ["Reports to", "Forseti"], ["Binding", "event-bus subscriber"], ["Authority", "Observe / advise"], ["State since", "48m ago"]] },
        { name: "Bragi", role: "Narrator - Pipeline", layer: "pipeline", state: "watching", work: "Answering grounded operator questions", metrics: [["Conversations (1h)", "21"], ["Median latency", "420ms"]], details: [["Owns", "Conversation, Turn, UserPreference"], ["Boundary", "Translator only"], ["Reports to", "Thor"], ["Binding", "conversation port"], ["Authority", "Narrate / translate"], ["State since", "24m ago"]] },
        { name: "Saga", role: "Auditor - Governance", layer: "governance", state: "watching", work: "Appending immutable audit records", metrics: [["Entries (1h)", "2,014"], ["Issues opened", "3"]], details: [["Owns", "AuditEntry, Issue"], ["Boundary", "Hard dependency"], ["Reports to", "Odin"], ["Binding", "audit subscriber"], ["Authority", "Record / attest"], ["State since", "2h 08m"]] },
        { name: "Muninn", role: "Memory - Governance", layer: "governance", state: "watching", work: "Refreshing the evidence index", metrics: [["Snapshots", "52"], ["Recall @ 5", "0.91"]], details: [["Owns", "StateSnapshot, ContextIndex"], ["Boundary", "Read / retrieve"], ["Reports to", "Odin"], ["Binding", "evidence subscriber"], ["Authority", "Index / retrieve"], ["State since", "18m ago"]] },
        { name: "Njord", role: "Cost specialist - Domain", layer: "domain", state: "watching", work: "Monitoring cost anomalies", metrics: [["Anomalies (24h)", "3"], ["Budget headroom", "18%"]], details: [["Owns", "CostAnomaly, Budget"], ["Boundary", "Advisory only"], ["Reports to", "Forseti"], ["Binding", "cost-signal subscriber"], ["Authority", "Observe / advise"], ["State since", "36m ago"]] },
        { name: "Loki", role: "Chaos specialist - Domain", layer: "domain", state: "watching", mode: "Shadow", work: "Observing a scheduled resilience experiment", metrics: [["Experiments (30d)", "6"], ["Resilience score", "0.83"]], details: [["Owns", "ChaosExperiment, ResilienceScore"], ["Boundary", "Human approval to execute"], ["Reports to", "Forseti"], ["Binding", "scenario subscriber"], ["Authority", "Propose only"], ["State since", "11m ago"]] },
        { name: "Odin", role: "Master Planner - Governance", layer: "governance", state: "idle", work: "Waiting for arbitration work", metrics: [["Decisions (1h)", "2"], ["Last decision", "17m ago"]], details: [["Owns", "ArbitrationDecision"], ["Boundary", "Top of tree"], ["Reports to", "-"], ["Binding", "event-bus subscriber"], ["Authority", "Plan / coordinate"], ["State since", "17m ago"]] },
        { name: "Mimir", role: "Rule Steward - Governance", layer: "governance", state: "idle", work: "Waiting for catalog changes", metrics: [["Rules loaded", "287"], ["Candidates", "12"]], details: [["Owns", "Rule, Policy"], ["Boundary", "Proposes catalog changes"], ["Reports to", "Odin"], ["Binding", "catalog subscriber"], ["Authority", "Propose rules"], ["State since", "41m ago"]] },
        { name: "Norns", role: "Learner - Governance", layer: "governance", state: "idle", mode: "Shadow", work: "Evaluating candidate patterns off path", metrics: [["Patterns (7d)", "39"], ["Accepted", "1"]], details: [["Owns", "RuleCandidate, PatternObservation"], ["Boundary", "Off-path learning"], ["Reports to", "Odin"], ["Binding", "outcome subscriber"], ["Authority", "Propose only"], ["State since", "1h 05m"]] },
        { name: "Freyr", role: "Capacity specialist - Domain", layer: "domain", state: "idle", work: "Waiting for capacity signals", metrics: [["Sizing recs (7d)", "11"], ["Confidence", "0.86"]], details: [["Owns", "CapacityForecast, SizingRecommendation"], ["Boundary", "Advisory only"], ["Reports to", "Forseti"], ["Binding", "capacity subscriber"], ["Authority", "Observe / advise"], ["State since", "29m ago"]] }
      ];

      var filters = { layer: "all", state: "all", query: "", attention: false };
      var grid = document.getElementById("fleetGrid");
      var resultStatus = document.getElementById("fleetResults");

      function agentCard(agent) {
        var slug = agent.name.toLowerCase();
        var badges = '<span class="fl-state is-' + agent.state + '">' + agent.state + "</span>";
        if (agent.mode) badges += '<span class="fl-mode">' + agent.mode + "</span>";
        if (agent.attention) badges += '<span class="fl-alert">' + agent.attention + "</span>";
        var metrics = agent.metrics.map(function (metric) {
          return '<div class="fl-metric"><span>' + metric[0] + "</span><strong>" + metric[1] + "</strong></div>";
        }).join("");
        var details = agent.details.map(function (detail) {
          return "<div><dt>" + detail[0] + "</dt><dd>" + detail[1] + "</dd></div>";
        }).join("");
        var search = (agent.name + " " + agent.role + " " + agent.work).toLowerCase();

        return '<article class="fl-card' + (agent.attention ? " is-attention" : "") + '" data-layer="' + agent.layer + '" data-state="' + agent.state + '" data-attention="' + Boolean(agent.attention) + '" data-search="' + search + '">' +
          '<div class="fl-card-head"><span class="fl-avatar"><img src="' + iconRoot + slug + '.svg" alt="" /></span>' +
          '<div class="fl-identity"><h2 class="fl-name">' + agent.name + '</h2><p class="fl-role">' + agent.role + "</p></div>" +
          '<div class="fl-badges">' + badges + "</div></div>" +
          '<div class="fl-work"><span class="fl-work-label">Current work' + (agent.state === "watching" ? '<span class="fl-live"><span class="fl-live-pulse" aria-hidden="true"></span><span data-live-age="' + slug + '">signal now</span></span>' : "") + '</span><strong>' + agent.work + "</strong></div>" +
          '<div class="fl-metrics">' + metrics + "</div>" +
          '<div class="fl-card-foot"><details class="fl-details"><summary>Details</summary><dl class="fl-detail-grid">' + details + "</dl></details>" +
          '<div class="fl-actions"><a class="cs-btn" href="agent-activity.html?agent=' + slug + '">Activity</a><a class="cs-btn" href="deck.html?agent=' + slug + '">Ask</a></div></div></article>';
      }

      function render() {
        var visible = agents.filter(function (agent) {
          if (filters.attention && !agent.attention) return false;
          if (!filters.attention && filters.state !== "all" && agent.state !== filters.state) return false;
          if (filters.layer !== "all" && agent.layer !== filters.layer) return false;
          return (agent.name + " " + agent.role + " " + agent.work).toLowerCase().includes(filters.query);
        });
        grid.innerHTML = visible.length ? visible.map(agentCard).join("") : '<p class="fl-empty">No agents match these filters.</p>';
        resultStatus.textContent = visible.length + (visible.length === 1 ? " agent" : " agents");
      }

      document.querySelectorAll("[data-filter-group]").forEach(function (group) {
        group.addEventListener("click", function (event) {
          var button = event.target.closest("button[data-filter]");
          if (!button) return;
          var key = group.getAttribute("data-filter-group");
          filters[key] = button.getAttribute("data-filter");
          group.querySelectorAll("button[data-filter]").forEach(function (candidate) {
            var active = candidate === button;
            candidate.classList.toggle("cs-active", active);
            candidate.setAttribute("aria-pressed", String(active));
          });
          if (key === "state") {
            filters.attention = false;
            document.querySelectorAll("[data-summary-state]").forEach(function (summary) { summary.setAttribute("aria-pressed", "false"); });
          }
          render();
        });
      });

      document.querySelectorAll("[data-summary-state]").forEach(function (button) {
        button.addEventListener("click", function () {
          var selected = button.getAttribute("aria-pressed") !== "true";
          document.querySelectorAll("[data-summary-state]").forEach(function (summary) { summary.setAttribute("aria-pressed", "false"); });
          button.setAttribute("aria-pressed", String(selected));
          var state = button.getAttribute("data-summary-state");
          filters.state = selected && state !== "attention" ? state : "all";
          filters.attention = selected && state === "attention";
          document.querySelectorAll('[data-filter-group="state"] button[data-filter]').forEach(function (chip) {
            var active = !selected && chip.getAttribute("data-filter") === "all";
            chip.classList.toggle("cs-active", active);
            chip.setAttribute("aria-pressed", String(active));
          });
          render();
        });
      });

      document.getElementById("fleetSearch").addEventListener("input", function (event) {
        filters.query = event.target.value.trim().toLowerCase();
        render();
      });

      render();
      var streamAge = 0;
      var signalCount = 24;
      var huginn = agents.find(function (agent) { return agent.name === "Huginn"; });
      window.setInterval(function () {
        streamAge += 1;
        document.getElementById("streamAge").textContent = streamAge === 1 ? "1s since last signal" : streamAge + "s since last signal";
        document.querySelectorAll("[data-live-age]").forEach(function (element, index) {
          var age = (streamAge + index) % 4;
          element.textContent = age === 0 ? "signal now" : age + "s ago";
        });
      }, 1000);

      window.setInterval(function () {
        streamAge = 0;
        signalCount += 1;
        document.getElementById("streamAge").textContent = "signal now";
        document.getElementById("watchSignalCount").textContent = String(signalCount);
        huginn.metrics[0][1] = (Number(huginn.metrics[0][1].replace(",", "")) + 1).toLocaleString("en-US");
        var eventMetric = document.querySelector('[data-search*="huginn"] .fl-metric strong');
        if (eventMetric) eventMetric.textContent = huginn.metrics[0][1];
      }, 5000);
    }());
  </script>
</body>
</html>
