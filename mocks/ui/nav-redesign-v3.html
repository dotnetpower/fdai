<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FDAI Console - Full Mock Navigation</title>
<style>
:root{color-scheme:light;--bg:#f7f7f8;--elev:#fff;--fg:#1c1e24;--muted:#575d69;--accent:#2b7fe0;--accent2:#1a63b8;--border:#dcdfe6;--rail:56px;--side:244px;--head:49px;font:14px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--fg)}button{font:inherit}.demo{height:100%;display:grid;grid-template-rows:auto 1fr}.demo-note{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid #c8d9ec;background:#edf5fd;color:#315c86;font-size:12px}.demo-note b{color:#214b74}.demo-note .try{margin-left:auto}.shell{display:grid;grid-template-rows:var(--head) 1fr;min-height:0}.topbar{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--elev);z-index:10}.topbar h1{font-size:14px;margin:0}.principal{margin-left:auto;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px}.body{display:grid;grid-template-columns:var(--rail) var(--side) minmax(0,1fr);min-height:0;transition:grid-template-columns .16s ease}.body.side-closed{grid-template-columns:var(--rail) 0 minmax(0,1fr)}
.brand-lockup{display:inline-flex;align-items:center;gap:8px;min-width:0;color:var(--fg);text-decoration:none}.brand-lockup:hover{color:var(--fg)}.brand-logo{display:block;width:26px;height:26px;object-fit:contain;flex:0 0 auto}.brand-wordmark{font-size:13px;font-weight:760;letter-spacing:.055em}.brand-separator{width:1px;height:16px;margin-left:2px;background:var(--border)}.brand-product{color:var(--muted);font-size:12px;font-weight:560}
/* existing activity rail */
.rail{min-height:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--elev);z-index:4}.rail-list{list-style:none;margin:0;padding:12px 0;display:flex;flex-direction:column;gap:4px}.rail-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:8px}.rail-item{position:relative;padding:0 8px}.rail-btn{position:relative;width:100%;min-height:60px;padding:8px 4px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}.rail-btn:hover{background:var(--bg);color:var(--fg)}.rail-btn.active{background:var(--bg);border-color:var(--border);color:var(--accent2)}.rail-btn.active:before{content:"";position:absolute;left:-7px;top:13px;bottom:13px;width:3px;border-radius:2px;background:var(--accent)}.rail-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.rail-btn span{font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}.rail-btn .badge{position:absolute;right:5px;top:5px;min-width:16px;height:16px;border-radius:8px;background:#c66a45;color:#fff;font-size:9px;display:grid;place-items:center}
.rail-item{padding:0 6px}.rail-btn{min-height:44px;padding:6px}.rail-btn span{display:none}.rail-btn.active:before{left:-5px;top:8px;bottom:8px}.rail-btn .badge{right:1px;top:1px}
.rail-bottom{border-top:0;padding-bottom:8px}
/* explorer sidebar */
.explorer{min-width:0;overflow:hidden;border-right:1px solid var(--border);background:#fbfbfc;display:flex;flex-direction:column}.explorer-inner{width:var(--side);height:100%;display:flex;flex-direction:column}.ex-head{position:relative;height:62px;display:flex;align-items:center;gap:8px;padding:0 10px 0 14px;border-bottom:1px solid var(--border)}.ex-title{min-width:0;flex:1}.ex-title strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.ex-title small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:10px;margin-top:2px}.icon-btn{width:28px;height:28px;border:0;border-radius:5px;background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer}.icon-btn:hover{background:#eceef1;color:var(--fg)}.icon-btn.active{color:var(--accent2);background:#e6f0fb}.more-menu{position:absolute;right:10px;top:45px;z-index:10;width:176px;padding:4px;border:1px solid var(--border);border-radius:7px;background:#fff;box-shadow:0 10px 26px rgba(25,35,48,.18)}.more-menu[hidden]{display:none}.more-menu button{width:100%;border:0;border-radius:4px;background:transparent;padding:7px 9px;color:#343d48;text-align:left;font-size:11px;cursor:pointer}.more-menu button:hover{background:#eef0f3}.more-menu button+button{border-top:1px solid #eceef1}.ex-scroll{overflow:auto;padding:6px 0 12px}.section{border-bottom:1px solid #e8eaee}.section:last-child{border:0}.section-head{width:100%;height:31px;border:0;background:transparent;display:flex;align-items:center;gap:6px;padding:0 12px;color:#4f5864;text-align:left;font-size:10px;font-weight:750;text-transform:uppercase;letter-spacing:.04em}.section-head .chev{font-size:9px}.section-head .section-action{margin-left:auto;color:#7d8792;font-size:9px;text-transform:none;font-weight:600}.menu{list-style:none;margin:0;padding:0 6px 7px}.menu-row{display:grid;grid-template-columns:22px minmax(0,1fr) auto;align-items:center;min-height:34px;border-radius:5px;color:#353d47;cursor:pointer;padding:0 5px}.menu-row:hover{background:#eef0f3}.menu-row.active{background:#e6f0fb;color:#174f89}.menu-row .mi{color:#717c88;text-align:center;font-size:13px}.menu-row .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.menu-row.active .label{font-weight:650}.row-actions{display:flex;align-items:center}.row-actions button{width:23px;height:23px;border:0;background:transparent;color:#7a8490;border-radius:4px;cursor:pointer;padding:0}.row-actions button:hover{background:#dfe3e8;color:#303943}.row-actions button.pinned{color:#b27724}.hidden-row{opacity:.55}.hidden-row .mi{color:#9aa2ab}.custom-hint{margin:7px 10px 4px;padding:8px 9px;border:1px solid #cad9e9;border-radius:6px;background:#f0f6fc;color:#46657f;font-size:10px}.edit-only{display:none}.explorer.editing .edit-only{display:block}.favorite-section.empty{display:none}.explorer.editing .favorite-section.empty{display:block}.explorer.editing .ex-head{background:#f5f8fb}.custom-tools{display:none;padding:7px 10px;border-top:1px solid var(--border);background:#f6f7f9;gap:6px}.custom-tools.on{display:flex}.small-btn{border:1px solid var(--border);border-radius:5px;background:#fff;color:#485361;padding:5px 8px;font-size:10px;cursor:pointer}.small-btn:hover{border-color:#aeb6c0}.small-btn.primary{margin-left:auto;background:var(--accent);border-color:var(--accent);color:#fff}
/* Quiet rows by default; editing adds only the controls needed to customize. */
.menu-row{position:relative;grid-template-columns:minmax(0,1fr) auto;padding:0 8px 0 12px}
.explorer.editing .menu-row{grid-template-columns:20px minmax(0,1fr) auto;padding-left:4px}
.drag-handle{width:20px;height:26px;border:0;border-radius:4px;background:transparent;color:#8a949f;cursor:grab;padding:0;font-size:13px;line-height:1;touch-action:none}
.drag-handle:hover,.drag-handle:focus-visible{background:#e7eaee;color:#4c5865;outline:none}
.drag-handle:active{cursor:grabbing}
.menu-row.dragging{opacity:.42;background:#eaf2fb}
.menu-row.drop-before:before,.menu-row.drop-after:after{content:"";position:absolute;left:5px;right:5px;height:2px;border-radius:2px;background:var(--accent);z-index:2}
.menu-row.drop-before:before{top:-1px}.menu-row.drop-after:after{bottom:-1px}
.row-actions button:disabled{cursor:not-allowed;opacity:.25;background:transparent}
.hidden-row{opacity:.58}.hidden-row .label{text-decoration:none}
.custom-hint{margin:0 12px 5px;padding:0;border:0;background:transparent;color:#7b8590;font-size:9px}
/* content, close to current console */
.main{min-width:0;overflow:auto;padding:24px}.page-head{display:flex;align-items:end;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px}.page-head h2{margin:0 0 2px;font-size:20px}.page-head p{margin:0;color:var(--muted);font-size:12px}.view-tools{display:flex;gap:6px}.view-tools button{border:1px solid var(--border);border-radius:6px;background:#fff;padding:6px 9px;color:var(--muted);font-size:10px}.view-tools #reopen{display:none}.posture{margin:12px 0 42px;padding:22px 24px;border:1px solid var(--border);border-radius:12px;background:#fff;box-shadow:0 8px 24px rgba(30,40,55,.04)}.eyebrow{font-size:10px;font-weight:750;text-transform:uppercase;color:var(--muted)}.posture h3{margin:8px 0 5px;font-size:20px}.posture .signal{margin-left:8px;padding:3px 8px;border-radius:12px;background:#f8e9e2;color:#a35f43;font-size:10px}.posture a{color:var(--accent2)}.meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--muted)}.section-title{display:flex;align-items:center;gap:12px;margin:0 0 18px}.section-title .num{width:34px;height:34px;border-radius:7px;background:#435569;color:#fff;display:grid;place-items:center;font-size:16px}.section-title h3{margin:0;font-size:18px}.section-title p{margin:2px 0 0;color:var(--muted);font-size:11px}.cards{display:grid;grid-template-columns:repeat(3,minmax(190px,1fr));gap:18px}.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px;min-height:152px;box-shadow:0 4px 14px rgba(30,40,55,.04)}.card small{color:var(--muted)}.card b{display:block;font-size:30px;font-weight:500;margin:5px 0}.card .source{font-size:10px;text-transform:uppercase;color:var(--muted)}.card .base{margin-top:8px;font-size:10px;color:var(--muted)}.card .gain{color:#4c7d55;font-weight:700;margin-left:5px}
.main.preview-main{padding:0;overflow:hidden;background:#fbfaf9}.mock-frame{display:block;width:100%;height:100%;border:0;background:#fbfaf9}
/* compact */
@media(max-width:480px){.brand-separator,.brand-product{display:none}}
@media(max-width:800px){:root{--rail:52px;--side:220px}.demo-note .try{display:none}.body{grid-template-columns:var(--rail) 0 minmax(0,1fr)}.body:not(.side-closed){grid-template-columns:var(--rail) minmax(0,1fr)}.body:not(.side-closed) .main{display:none}.rail-item{padding-inline:5px}.rail-btn{min-height:44px}.rail-btn span{display:none}.cards{grid-template-columns:1fr}.main{padding:16px}.view-tools #reopen{display:inline-flex}}
</style>
</head>
<body>
<div class="demo">
  <div class="demo-note"><b>v3 · 26개 기존 화면 보존</b><span>전체 현황 / 운영 / 에이전트 / 거버넌스 / 감사·증적으로 재구성. Labs는 dev 영역으로 분리.</span><span class="try">거버넌스 → ••• → 메뉴 편집을 눌러봐</span></div>
  <div class="shell">
    <header class="topbar"><a class="brand-lockup" href="#dashboard.html" aria-label="FDAI Console home"><img class="brand-logo" src="assets/fdai-cloud-aperture.svg" alt="" /><span class="brand-wordmark">FDAI</span><span class="brand-separator" aria-hidden="true"></span><span class="brand-product">Console</span></a><div class="principal"><span>dev mode</span><span>◐</span></div></header>
    <div class="body" id="body">
      <nav class="rail" aria-label="Primary navigation">
        <ul class="rail-list" id="rail"></ul>
        <ul class="rail-list rail-bottom" id="railBottom"></ul>
      </nav>
      <aside class="explorer" aria-label="Navigation explorer"><div class="explorer-inner">
        <header class="ex-head"><div class="ex-title"><strong id="groupTitle">전체 현황</strong><small id="groupHint">핵심 지표와 전체 요약</small></div><button class="icon-btn" id="more" title="더 보기" aria-label="더 보기">•••</button><div class="more-menu" id="moreMenu" hidden><button id="startCustomize">메뉴 편집</button><button id="hideNavigation">탐색 숨기기 <span style="float:right;color:#89929d">Ctrl+B</span></button><button id="resetMenu">메뉴 초기화</button></div></header>
        <div class="ex-scroll"><section class="section"><button class="section-head"><span class="chev">⌄</span><span id="sectionName">전체 현황</span><span class="section-action" id="groupMode">메뉴</span></button><div class="custom-hint edit-only">핸들을 드래그해 순서를 변경해. 숨긴 메뉴도 검색으로 접근할 수 있어.</div><ul class="menu" id="groupMenu"></ul></section><section class="section edit-only" id="hiddenSection"><button class="section-head"><span class="chev">⌄</span>숨김 <span class="section-action" id="hiddenCount"></span></button><ul class="menu" id="hiddenMenu"></ul></section></div>
        <div class="custom-tools" id="customTools"><button class="small-btn" id="reset">초기화</button><button class="small-btn primary" id="done">완료</button></div>
      </div></aside>
      <main class="main preview-main"><iframe class="mock-frame" id="previewFrame" src="dashboard.html" title="FDAI UI mock preview"></iframe></main>
    </div>
  </div>
</div>
<script>
const groups=[
 {id:'overview',label:'전체 현황',hint:'핵심 지표와 전체 요약',icon:'chart',items:[['dashboard','전체 현황','dashboard.html','컨트롤 플레인 상태와 핵심 지표'],['llm-cost','LLM 비용','llm-cost.html','모델 사용량과 비용']]},
 {id:'operations',label:'운영',hint:'실시간 운영과 오퍼레이터 대응',icon:'bolt',badge:'3',items:[['live','실시간','live.html','현재 컨트롤 플레인 상태'],['incidents','인시던트','incidents.html','활성 및 최근 인시던트'],['hil','승인','hil.html','승인 대기 항목'],['provision','프로비저닝','provision.html','환경 준비 상태'],['deck','Command deck','deck.html','대화형 오퍼레이터 화면']]},
 {id:'agents',label:'에이전트',hint:'에이전트 조직과 실행 상태',icon:'agents',items:[['agents','Fleet roster','agents.html','에이전트 런타임 상태'],['agents-constellation','Constellation','agents-constellation.html','에이전트 토폴로지'],['pantheon','Pantheon','pantheon.html','에이전트 역할과 경계'],['agent-activity','에이전트 활동','agent-activity.html','에이전트 판단과 handoff']]},
 {id:'governance',label:'거버넌스',hint:'판단 기준과 안전 통제',icon:'shield',items:[['promotion','승격','promotion.html','Shadow에서 enforce로의 준비 상태'],['blast-radius','Blast radius','blast-radius.html','영향 및 의존성 범위'],['rules','규칙','rules.html','규칙 카탈로그와 출처'],['actions','액션 온톨로지','actions.html','ActionType 레지스트리'],['ontology','온톨로지','ontology.html','객체, 링크, 액션'],['workflow-builder','워크플로 빌더','workflow-builder.html','워크플로 구성']]},
 {id:'evidence',label:'감사·증적',hint:'감사, 분석, 근거와 보고서',icon:'history',items:[['audit','감사 로그','audit.html','Append-only 액션 이력'],['rca','RCA','rca.html','근본 원인 분석'],['rule-trace','규칙 추적','rule-trace.html','규칙 평가 provenance'],['report','주간 보고서','report.html','정기 운영 보고서'],['rca-report','RCA 보고서','rca-report.html','인시던트 증적 보고서'],['deck-sources','Deck 출처','deck-sources.html','Grounding 및 retrieval 출처']]},
 {id:'labs',label:'Labs',hint:'개발 전용 UI 실험',icon:'labs',placement:'bottom',items:[['components','컴포넌트','components.html','Calm Slate 컴포넌트 갤러리'],['agent-icons','에이전트 아이콘','agent-icons.html','에이전트 아이콘 초안'],['hcard-variants','HIL 카드 변형','hcard-variants.html','승인 카드 디자인 실험']]}
];
const defaults={hidden:[],orders:{}};
let prefs=loadPrefs(),activeGroup='overview',activePage='dashboard',custom=false;
function loadPrefs(){try{const stored=JSON.parse(localStorage.getItem('fdai:nav-demo')||'{}');return {hidden:Array.isArray(stored.hidden)?stored.hidden:[],orders:stored.orders&&typeof stored.orders==='object'?stored.orders:{}}}catch{return structuredClone(defaults)}}
function save(){localStorage.setItem('fdai:nav-demo',JSON.stringify(prefs))}
function svg(kind){const p={chart:'<path d="M4 21V3M4 21h17M7 12h3v7H7zm5-4h3v11h-3zm5 6h3v5h-3z"/>',bolt:'<path d="M13 2L3 14h8v8l10-12h-8z"/>',agents:'<circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2"/><path d="M3 20c0-4 3-7 6-7s6 3 6 7M14 15c3 0 5 2 5 5"/>',history:'<path d="M12 4a8 8 0 11-7.4 11.5M4 4v5h5M12 8v4l3 2"/>',shield:'<path d="M12 3L4 6v6c0 5 4 8.5 8 9.5 4-1 8-4.5 8-9.5V6zM9 12l2 2 4-4"/>',labs:'<path d="M9 3h6M10 3v6l-5 9a2 2 0 002 3h10a2 2 0 002-3l-5-9V3M8 15h8"/>'};return `<svg viewBox="0 0 24 24">${p[kind]}</svg>`}
function allItems(){return groups.flatMap(g=>g.items.map(i=>({...{id:i[0],label:i[1],page:i[2],sub:i[3]},group:g.id})))}
function itemById(id){return allItems().find(i=>i.id===id)}
function ordered(group){const base=[...group.items];const order=prefs.orders?.[group.id]||[];return base.sort((a,b)=>{const ai=order.indexOf(a[0]),bi=order.indexOf(b[0]);return (ai<0?999:ai)-(bi<0?999:bi)})}
function railButton(g){const closed=document.getElementById('body').classList.contains('side-closed'),active=g.id===activeGroup,hint=active&&!closed?`${g.label} · 탐색 숨기기`:g.label;return `<li class="rail-item"><button class="rail-btn ${active?'active':''}" data-group="${g.id}" title="${hint}" aria-label="${hint}">${svg(g.icon)}<span>${g.label}</span>${g.badge?`<i class="badge" aria-hidden="true">${g.badge}</i>`:''}</button></li>`}
function renderRail(){document.getElementById('rail').innerHTML=groups.filter(g=>g.placement!=='bottom').map(railButton).join('');document.getElementById('railBottom').innerHTML=groups.filter(g=>g.placement==='bottom').map(railButton).join('')+`<li class="rail-item"><button class="rail-btn" title="설정" aria-label="설정"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 15l2 1-2 4-2-1a8 8 0 01-3 2v2h-4v-2a8 8 0 01-3-2l-2 1-2-4 2-1a8 8 0 010-4L3 10l2-4 2 1a8 8 0 013-2V3h4v2a8 8 0 013 2l2-1 2 4-2 1a8 8 0 010 4z"/></svg><span>설정</span></button></li>`;document.querySelectorAll('[data-group]').forEach(b=>b.onclick=()=>{if(activeGroup===b.dataset.group&&!document.getElementById('body').classList.contains('side-closed')){toggleSide();renderRail()}else{activeGroup=b.dataset.group;document.getElementById('body').classList.remove('side-closed');render()}})}
function dragHandle(item){return `<button type="button" class="drag-handle" data-drag-id="${item.id}" aria-label="${item.label} 순서 변경" title="드래그해 순서 변경 · Alt+↑/↓">⠿</button>`}
function row(item){const canHide=item.id!==activePage;return `<li class="menu-row ${item.id===activePage?'active':''}" data-page="${item.id}" data-drop-id="${item.id}">${custom?dragHandle(item):''}<span class="label">${item.label}</span>${custom?`<span class="row-actions"><button data-hide="${item.id}" aria-label="${item.label} 숨기기" title="${canHide?'메뉴 숨기기':'이 메뉴를 숨기려면 다른 메뉴를 먼저 열어야 해'}" ${canHide?'':'disabled'}>⊘</button></span>`:''}</li>`}
function hiddenRow(item){return `<li class="menu-row hidden-row"><span></span><span class="label">${item.label}</span><span class="row-actions"><button data-restore="${item.id}" aria-label="${item.label} 표시" title="메뉴 표시">↶</button></span></li>`}
function render(){const g=groups.find(x=>x.id===activeGroup);document.getElementById('groupTitle').textContent=custom?`${g.label} 메뉴 편집`:g.label;document.getElementById('groupHint').textContent=custom?'드래그로 순서 변경 · 사용하지 않는 메뉴 숨김':g.hint;document.getElementById('sectionName').textContent=g.label;document.getElementById('groupMode').textContent=custom?'표시':'메뉴';const hidden=prefs.hidden.map(itemById).filter(i=>i&&i.group===g.id);document.getElementById('groupMenu').innerHTML=ordered(g).filter(i=>!prefs.hidden.includes(i[0])).map(i=>row({id:i[0],label:i[1],page:i[2],sub:i[3],group:g.id})).join('');document.getElementById('hiddenMenu').innerHTML=hidden.map(hiddenRow).join('')||'<li style="padding:8px 12px;color:#7b8490;font-size:10px">숨긴 메뉴 없음</li>';document.getElementById('hiddenCount').textContent=hidden.length;document.querySelector('.explorer').classList.toggle('editing',custom);document.getElementById('customTools').classList.toggle('on',custom);wireRows();renderRail()}
function openItem(item,updateHash=true){if(!item)return;activePage=item.id;activeGroup=item.group;const frame=document.getElementById('previewFrame');if(frame.getAttribute('src')!==item.page)frame.src=item.page;if(updateHash)history.replaceState(null,'',`#${item.page}`);if(matchMedia('(max-width:800px)').matches)document.getElementById('body').classList.add('side-closed');render()}
function wireRows(){document.querySelectorAll('[data-page]').forEach(r=>r.onclick=e=>{if(e.target.closest('button'))return;openItem(itemById(r.dataset.page))});document.querySelectorAll('[data-hide]').forEach(b=>b.onclick=e=>{e.stopPropagation();const id=b.dataset.hide;prefs.hidden=prefs.hidden.includes(id)?prefs.hidden:[...prefs.hidden,id];save();render()});document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=e=>{e.stopPropagation();prefs.hidden=prefs.hidden.filter(id=>id!==b.dataset.restore);save();render()});wireDragRows()}
function listIds(){const g=groups.find(x=>x.id===activeGroup);return ordered(g).map(i=>i[0]).filter(id=>!prefs.hidden.includes(id))}
function saveList(ids){const hidden=ordered(groups.find(x=>x.id===activeGroup)).map(i=>i[0]).filter(id=>prefs.hidden.includes(id));prefs.orders={...(prefs.orders||{}),[activeGroup]:[...ids,...hidden]};save();render()}
function moveBy(id,delta){const ids=listIds(),from=ids.indexOf(id),to=Math.max(0,Math.min(ids.length-1,from+delta));if(from<0||from===to)return;ids.splice(from,1);ids.splice(to,0,id);saveList(ids)}
function reorder(dragId,targetId,after){const ids=listIds(),from=ids.indexOf(dragId);if(from<0||dragId===targetId)return;ids.splice(from,1);let to=ids.indexOf(targetId);if(after)to+=1;ids.splice(to,0,dragId);saveList(ids)}
function clearDragMarkers(){document.querySelectorAll('.dragging,.drop-before,.drop-after').forEach(el=>el.classList.remove('dragging','drop-before','drop-after'))}
function wireDragRows(){document.querySelectorAll('.drag-handle').forEach(handle=>{handle.onpointerdown=e=>{if(e.button!==0)return;e.preventDefault();const dragId=handle.dataset.dragId;handle.setPointerCapture(e.pointerId);handle.closest('.menu-row').classList.add('dragging');handle.onpointermove=moveEvent=>{const target=document.elementFromPoint(moveEvent.clientX,moveEvent.clientY)?.closest('.menu-row[data-drop-id]');document.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after'));if(!target||target.dataset.dropId===dragId)return;const after=moveEvent.clientY>target.getBoundingClientRect().top+target.getBoundingClientRect().height/2;target.classList.add(after?'drop-after':'drop-before')};handle.onpointerup=()=>{const target=document.querySelector('.menu-row.drop-before,.menu-row.drop-after');const after=target?.classList.contains('drop-after')??false;if(target)reorder(dragId,target.dataset.dropId,after);handle.onpointermove=null;handle.onpointerup=null;clearDragMarkers()}};handle.onkeydown=e=>{if(e.altKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){e.preventDefault();moveBy(handle.dataset.dragId,e.key==='ArrowUp'?-1:1)}}})}
function toggleSide(){document.getElementById('body').classList.toggle('side-closed')}
const moreMenu=document.getElementById('moreMenu'),previewFrame=document.getElementById('previewFrame');document.getElementById('more').onclick=e=>{e.stopPropagation();moreMenu.hidden=!moreMenu.hidden};document.getElementById('startCustomize').onclick=()=>{custom=true;moreMenu.hidden=true;render()};document.getElementById('hideNavigation').onclick=()=>{custom=false;moreMenu.hidden=true;document.getElementById('body').classList.add('side-closed');render()};document.getElementById('resetMenu').onclick=()=>{prefs=structuredClone(defaults);save();moreMenu.hidden=true;render()};document.getElementById('done').onclick=()=>{custom=false;render()};document.getElementById('reset').onclick=()=>{prefs=structuredClone(defaults);save();render()};document.addEventListener('click',e=>{if(!e.target.closest('.more-menu')&&!e.target.closest('#more'))moreMenu.hidden=true});document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='b'){e.preventDefault();toggleSide();renderRail()}});previewFrame.addEventListener('load',()=>{const page=previewFrame.contentWindow?.location.pathname.split('/').pop(),item=allItems().find(candidate=>candidate.page===page);if(item&&(item.id!==activePage||item.group!==activeGroup)){activePage=item.id;activeGroup=item.group;history.replaceState(null,'',`#${item.page}`);render()}});window.addEventListener('hashchange',()=>{const page=decodeURIComponent(location.hash.slice(1)),item=allItems().find(candidate=>candidate.page===page);if(item)openItem(item,false)});const hashPage=decodeURIComponent(location.hash.slice(1)),initial=allItems().find(item=>item.page===hashPage);if(initial){activePage=initial.id;activeGroup=initial.group;previewFrame.src=initial.page}if(matchMedia('(max-width:800px)').matches)document.getElementById('body').classList.add('side-closed');render();
</script>
</body>
</html>
