<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FDAI - Agent Orb (design draft)</title>
    <!--
      FDAI agent-orb design draft ("Her"-style presence for 15 agents).

      Concept: hybrid E -> B.
        E) At rest, the orb is ONE continuous luminous ribbon - a clean
           figure-eight (lemniscate, echoing Her's OS1 glyph) gently perturbed
           by 15 harmonics, one per pantheon agent. Fifteen become one line.
        B) On attention (hover / click / an agent acting), the ribbon UNFOLDS
           into 15 orbiting motes so the individual agents are legible, then
           folds back.

      Truthful, not decorative: an agent that "acts" brightens its own harmonic
      (ribbon bulges toward it) and its own mote (flares + trails). A warm gold
      presence over the cool nebula - Her's warmth, our cosmos.

      Dependency-free: raw-WebGL nebula backdrop + a Canvas2D orb. Synthetic,
      English-only. prefers-reduced-motion aware.
      Run: python3 -m http.server 8899  ->  /agent-orb.html
    -->
    <style>
      html, body { margin: 0; height: 100%; background: #04060d; color: #f3ecdf;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif; overflow: hidden; }
      canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
      #nebula { z-index: 0; }
      #orb { z-index: 1; }

      #caption {
        position: fixed; left: 50%; bottom: 22%; transform: translateX(-50%); z-index: 2;
        text-align: center; font-weight: 200; font-size: clamp(16px, 2vw, 22px);
        letter-spacing: 0.04em; color: rgba(247, 240, 226, 0.9);
        text-shadow: 0 2px 30px rgba(0,0,0,0.7); opacity: 0; transition: opacity 700ms ease;
        pointer-events: none;
      }
      #caption.on { opacity: 1; }

      /* 15 agent chips - click to make one act; they glow when active. */
      #chips {
        position: fixed; left: 0; right: 0; bottom: 5%; z-index: 3;
        display: flex; flex-wrap: wrap; gap: 8px 10px; justify-content: center;
        padding: 0 6vw; pointer-events: auto;
      }
      .chip {
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(243, 236, 223, 0.42); cursor: pointer; user-select: none;
        padding: 4px 2px; transition: color 400ms ease, text-shadow 400ms ease;
      }
      .chip:hover { color: rgba(243, 236, 223, 0.8); }
      .chip.act { color: #ffe6b0; text-shadow: 0 0 14px rgba(255, 200, 120, 0.8); }

      #hint {
        position: fixed; top: 22px; left: 0; right: 0; z-index: 3; text-align: center;
        font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
        color: rgba(243, 236, 223, 0.35); font-weight: 200; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="nebula" aria-hidden="true"></canvas>
    <canvas id="orb"></canvas>
    <div id="hint">hover to unfold - click a name to let one speak</div>
    <div id="caption"></div>
    <div id="chips"></div>

    <script>
      // ---------------- Nebula backdrop (dimmed) ----------------
      (function () {
        const canvas = document.getElementById("nebula");
        const gl = canvas.getContext("webgl", { antialias: false, alpha: false });
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const vert = `attribute vec2 a; void main(){ gl_Position=vec4(a,0.0,1.0); }`;
        const frag = `
          precision highp float; uniform vec2 u_res; uniform float u_time;
          float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
          vec2 hash2(vec2 p){ return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453); }
          float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
            float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
            return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
          float fbm(vec2 p){ float v=0.,amp=0.5; for(int i=0;i<6;i++){ v+=amp*noise(p); p*=2.02; amp*=0.5;} return v; }
          vec3 starLayer(vec2 uv,float scale,float density,float seed){
            vec2 g=uv*scale+seed; vec2 id=floor(g); vec2 f=fract(g); vec3 acc=vec3(0.);
            for(int y=-1;y<=1;y++){ for(int x=-1;x<=1;x++){
              vec2 o=vec2(float(x),float(y)); vec2 cid=id+o; float present=hash(cid+seed*3.7);
              if(present>1.0-density){ vec2 pos=hash2(cid+1.3); float b=hash(cid+2.1);
                float ph=hash(cid+3.4)*6.2831; float sp=0.4+hash(cid+4.7)*3.2; float temp=hash(cid+5.9);
                float tw=0.45+0.55*sin(u_time*sp+ph); vec2 d=f-(o+pos); float dist=length(d);
                float core=smoothstep(0.06*(0.5+b),0.0,dist); float halo=smoothstep(0.22*(0.4+b),0.0,dist)*0.25;
                vec3 warm=vec3(1.,0.82,0.62); vec3 cool=vec3(0.70,0.84,1.); vec3 sc=mix(warm,cool,temp);
                acc+=(core+halo)*tw*(0.35+b)*sc; } } } return acc; }
          void main(){
            vec2 uv=gl_FragCoord.xy/u_res.xy; vec2 p=(gl_FragCoord.xy-0.5*u_res.xy)/u_res.y; float t=u_time*0.01;
            vec2 q=vec2(fbm(p*2.6+t),fbm(p*2.6-t+5.2));
            vec2 r=vec2(fbm(p*2.6+q*1.8+t*1.3),fbm(p*2.6+q*1.8-t*0.7));
            float f=fbm(p*2.6+r*2.0);
            float mHa=fbm(p*2.2+r+vec2(3.1,t)); float mOiii=fbm(p*2.5+r+vec2(-4.0,-t*0.8));
            float mDust=fbm(p*1.8+q+vec2(8.0,t*0.5)); float mMag=fbm(p*2.7+r+vec2(-1.5,t*1.1));
            float mBlue=fbm(p*2.3+q+vec2(5.5,-t));
            vec3 space=vec3(0.010,0.015,0.038); vec3 hAlpha=vec3(0.88,0.16,0.28);
            vec3 oIII=vec3(0.08,0.78,0.72); vec3 dust=vec3(0.92,0.64,0.30);
            vec3 magenta=vec3(0.72,0.24,0.66); vec3 azure=vec3(0.00,0.47,0.83); vec3 cyan=vec3(0.34,0.92,1.00);
            vec3 col=space;
            col=mix(col,azure,smoothstep(0.45,0.90,mBlue)*0.5);
            col=mix(col,hAlpha,smoothstep(0.55,0.95,mHa)*0.42);
            col=mix(col,oIII,smoothstep(0.55,0.95,mOiii)*0.4);
            col=mix(col,dust,smoothstep(0.62,0.97,mDust)*0.34);
            col=mix(col,magenta,smoothstep(0.60,0.95,mMag)*0.26);
            col=mix(col,cyan,pow(smoothstep(0.70,1.0,f),2.0)*0.34);
            col*=0.55+0.85*f;
            col+=starLayer(uv*vec2(u_res.x/u_res.y,1.0),120.0,0.10,11.0);
            col+=starLayer(uv*vec2(u_res.x/u_res.y,1.0),70.0,0.07,47.0);
            col+=starLayer(uv*vec2(u_res.x/u_res.y,1.0),38.0,0.05,91.0)*1.4;
            float vig=smoothstep(1.25,0.35,length(uv-0.5)*1.4); col*=mix(0.5,1.0,vig);
            // Dimmed so the warm orb reads clearly on top.
            col *= 0.5;
            col=col/(col+0.6); col=pow(col,vec3(0.9));
            gl_FragColor=vec4(col,1.0);
          }`;
        function compile(t,s){ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh);
          if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh)); return sh; }
        const prog=gl.createProgram(); gl.attachShader(prog,compile(gl.VERTEX_SHADER,vert));
        gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,frag)); gl.linkProgram(prog); gl.useProgram(prog);
        const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b);
        gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
        const loc=gl.getAttribLocation(prog,"a"); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
        const uRes=gl.getUniformLocation(prog,"u_res"), uTime=gl.getUniformLocation(prog,"u_time");
        function rz(){ const dpr=Math.min(devicePixelRatio||1,2); canvas.width=innerWidth*dpr|0; canvas.height=innerHeight*dpr|0; gl.viewport(0,0,canvas.width,canvas.height); }
        addEventListener("resize",rz); rz(); const s=performance.now();
        function fr(n){ gl.uniform2f(uRes,canvas.width,canvas.height); gl.uniform1f(uTime,(n-s)/1000); gl.drawArrays(gl.TRIANGLES,0,3); if(!reduceMotion) requestAnimationFrame(fr); }
        if(reduceMotion){ gl.uniform2f(uRes,canvas.width,canvas.height); gl.uniform1f(uTime,6.0); gl.drawArrays(gl.TRIANGLES,0,3);} else requestAnimationFrame(fr);
      })();

      // ---------------- Agent orb (Canvas 2D) ----------------
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const cv = document.getElementById("orb");
      const ctx = cv.getContext("2d");

      // The 15 pantheon agents, with the role verb they "speak" and a tier that
      // nudges orbit radius (senses inner, specialists outer). Harmonic index
      // hk gives each its own ripple on the single ribbon.
      const AGENTS = [
        { id: "Odin",     verb: "is weighing the whole picture", tier: 0, hk: 1 },
        { id: "Forseti",  verb: "is deliberating",               tier: 1, hk: 2 },
        { id: "Thor",     verb: "is ready to act",               tier: 1, hk: 3 },
        { id: "Var",      verb: "is holding for approval",       tier: 1, hk: 2 },
        { id: "Huginn",   verb: "is listening",                  tier: 2, hk: 4 },
        { id: "Heimdall", verb: "is watching",                   tier: 2, hk: 4 },
        { id: "Vidar",    verb: "stands by to recover",          tier: 3, hk: 5 },
        { id: "Bragi",    verb: "is translating",                tier: 3, hk: 3 },
        { id: "Saga",     verb: "is remembering",                tier: 3, hk: 5 },
        { id: "Mimir",    verb: "is consulting the rules",       tier: 4, hk: 6 },
        { id: "Norns",    verb: "is learning",                   tier: 4, hk: 6 },
        { id: "Muninn",   verb: "is recalling",                  tier: 4, hk: 7 },
        { id: "Njord",    verb: "is weighing cost",              tier: 5, hk: 7 },
        { id: "Freyr",    verb: "is checking capacity",          tier: 5, hk: 8 },
        { id: "Loki",     verb: "is probing for weakness",       tier: 5, hk: 8 },
      ];
      const N = AGENTS.length;
      // per-agent runtime state
      const st = AGENTS.map((a, i) => ({
        act: 0,                       // 0..1 activation (eased)
        hue: 44 - 10 + (i / (N - 1)) * 20, // gold -> amber-rose, one warm family
        phase: (i / N) * Math.PI * 2,
        orbSpeed: 0.05 + (i % 5) * 0.011 + (i % 3) * 0.004, // incommensurate-ish
        orbR: 0.62 + a.tier * 0.055,  // tier -> radius
        radBreath: 0.5 + Math.random(),
      }));

      // (Base form is a circle now - computed inline in drawRing / drawMotes.)

      let unfold = 0, unfoldTarget = 0, rot = 0; // fold state + rotation angle
      // intermittent lightning: a strike flashes on, then vanishes; dark gaps between.
      let strike = null;          // { segs, born, life }
      let nextStrikeAt = 0;
      let hovering = false;

      function resize() {
        const dpr = Math.min(devicePixelRatio || 1, 2);
        cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      addEventListener("resize", resize); resize();

      let t0 = performance.now(), tPrev = t0;
      function frame(now) {
        const dt = Math.min((now - tPrev) / 1000, 0.05); tPrev = now;
        const t = (now - t0) / 1000;
        const W = innerWidth, H = innerHeight;
        const cx = W / 2, cy = H * 0.46;
        const R = Math.min(W, H) * 0.19;

        // ease global + per-agent activation
        unfoldTarget = hovering ? 1 : (anyActive() ? 0.6 : 0);
        unfold += (unfoldTarget - unfold) * (1 - Math.exp(-dt * 3));
        for (const s of st) s.act += ((s.target || 0) - s.act) * (1 - Math.exp(-dt * 2.5));

        // --- heartbeat: a double-thump (lub-dub) gives the presence impact ---
        const period = 1.15;
        const hp = (((t % period) + period) % period) / period;
        const lub = Math.exp(-(((hp - 0.08) / 0.045) ** 2));
        const dub = Math.exp(-(((hp - 0.22) / 0.05) ** 2)) * 0.6;
        const hb = Math.min(1, lub + dub);            // 0..1 heartbeat envelope
        const beat = 0.5 + 0.35 * hb;                 // just a gentle overall brighten
        const breath = 1 + 0.015 * Math.sin(t * 0.9); // barely breathes, no impact swell
        rot += dt * (0.09 + 0.025 * Math.sin(t * 0.25));

        ctx.clearRect(0, 0, W, H);
        ctx.globalCompositeOperation = "lighter";

        drawCore(cx, cy, R * breath, beat);
        drawDreamOrb(cx, cy, R * breath, t, beat, unfold);
        maybeStrike(now, cx, cy, R * breath);
        drawStrike(now);

        ctx.globalCompositeOperation = "source-over";
        if (!reduceMotion) requestAnimationFrame(frame);
      }

      function anyActive() { return st.some((s) => (s.target || 0) > 0.01 || s.act > 0.02); }

      // ----- soft central presence glow (big, dreamy, no hard edge) -----
      function drawCore(cx, cy, R, beat) {
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 1.7);
        g.addColorStop(0.0, `hsla(44, 96%, 74%, ${0.20 + beat * 0.07})`);
        g.addColorStop(0.35, `hsla(38, 92%, 60%, ${0.08 + beat * 0.03})`);
        g.addColorStop(0.7, "hsla(30, 85%, 52%, 0.03)");
        g.addColorStop(1.0, "hsla(30, 85%, 52%, 0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(cx, cy, R * 1.7, 0, Math.PI * 2); ctx.fill();
      }

      // ----- dreamy soft presence: 15 soft light-lobes forming a rotating halo -----
      // No stroked outline (so no visible dents) - just overlapping soft glows,
      // blurred and additively blended into a flowing aura. Two concentric
      // layers give it volume (a soft sphere, not a flat ring).
      function drawDreamOrb(cx, cy, R, t, beat, unfoldV) {
        const prevFilter = ctx.filter;
        ctx.filter = "blur(9px)";
        // a soft bubble rim gives the haze a sense of a sphere (no hard edge)
        const rim = ctx.createRadialGradient(cx, cy, R * 0.7, cx, cy, R * 1.2);
        rim.addColorStop(0.0, "hsla(42, 95%, 66%, 0)");
        rim.addColorStop(0.55, `hsla(42, 96%, 70%, ${0.07 + beat * 0.03})`);
        rim.addColorStop(1.0, "hsla(42, 95%, 66%, 0)");
        ctx.fillStyle = rim;
        ctx.beginPath(); ctx.arc(cx, cy, R * 1.2, 0, Math.PI * 2); ctx.fill();
        // two concentric layers of soft light-lobes give it volume
        for (const layer of [{ rf: 1.0, af: 1.0, bf: 1.0 }, { rf: 0.6, af: 0.55, bf: 0.75 }]) {
          for (let k = 0; k < N; k++) {
            const a = st[k];
            const ang = (k / N) * Math.PI * 2 + rot * (1 + ((k % 5) - 2) * 0.03);
            // gentle radius breathing per agent (no hard edge -> no dents)
            const wob = 0.045 * Math.sin(AGENTS[k].hk + a.phase + t * 0.5) + a.act * 0.05;
            const ringR = R * (1 + wob);
            const tierR = R * (0.5 + AGENTS[k].tier * 0.12);
            const rr = (ringR + (tierR - ringR) * unfoldV) * layer.rf;
            const x = cx + Math.cos(ang) * rr;
            const y = cy + Math.sin(ang) * rr * 0.92;
            const flare = a.act;
            const blob = R * (0.26 + flare * 0.14) * layer.bf;
            const alpha = (0.06 + flare * 0.24) * layer.af;
            const g = ctx.createRadialGradient(x, y, 0, x, y, blob);
            g.addColorStop(0.0, `hsla(${a.hue}, 96%, ${64 + flare * 20}%, ${alpha})`);
            g.addColorStop(1.0, `hsla(${a.hue}, 96%, 60%, 0)`);
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(x, y, blob, 0, Math.PI * 2); ctx.fill();
          }
        }
        ctx.filter = prevFilter;
      }

      // (The 15 agents are drawn as soft light-lobes inside drawDreamOrb.)

      // ----- real lightning: branching bolts that flash on, then vanish -----
      function boltPath(x1, y1, x2, y2, jitter, gen) {
        if (gen <= 0) return [[x1, y1], [x2, y2]];
        const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * jitter;
        const my = (y1 + y2) / 2 + (Math.random() - 0.5) * jitter;
        return boltPath(x1, y1, mx, my, jitter * 0.5, gen - 1)
          .slice(0, -1)
          .concat(boltPath(mx, my, x2, y2, jitter * 0.5, gen - 1));
      }
      // grow one channel + a few forks (real-lightning branching)
      function growBolt(x1, y1, x2, y2, jitter, gen, depth, segs) {
        const pts = boltPath(x1, y1, x2, y2, jitter, gen);
        segs.push({ pts, depth });
        if (depth >= 2) return;
        const branches = depth === 0 ? 1 + ((Math.random() * 2) | 0) : (Math.random() < 0.5 ? 1 : 0);
        for (let b = 0; b < branches; b++) {
          const vi = 1 + ((Math.random() * (pts.length - 2)) | 0);
          const bx = pts[vi][0], by = pts[vi][1];
          const baseAng = Math.atan2(y2 - y1, x2 - x1);
          const ang = baseAng + (Math.random() - 0.5) * 1.5;
          const len = Math.hypot(x2 - bx, y2 - by) * (0.35 + Math.random() * 0.45);
          growBolt(bx, by, bx + Math.cos(ang) * len, by + Math.sin(ang) * len,
            jitter * 0.55, Math.max(2, gen - 1), depth + 1, segs);
        }
      }
      function makeStrike(cx, cy, R) {
        const segs = [];
        const arms = 1 + ((Math.random() * 8) | 0);          // 1..8 arms per strike
        for (let i = 0; i < arms; i++) {
          const ang = Math.random() * Math.PI * 2;
          const len = R * (0.55 + Math.random() * 0.5);
          growBolt(cx, cy, cx + Math.cos(ang) * len, cy + Math.sin(ang) * len * 0.92,
            R * 0.2, 4, 0, segs);
        }
        return segs;
      }
      function maybeStrike(now, cx, cy, R) {
        if (now >= nextStrikeAt) {
          strike = { segs: makeStrike(cx, cy, R), born: now, life: 130 + Math.random() * 150 };
          nextStrikeAt = now + 650 + Math.random() * 2600;  // dark gap before the next strike
        }
      }
      function drawStrike(now) {
        if (!strike) return;
        const age = now - strike.born;
        if (age > strike.life) { strike = null; return; }
        const k = age / strike.life;
        // a couple of sharp flashes within the strike, fading out (appears / vanishes)
        const env = (1 - k) * (0.35 + 0.65 * Math.abs(Math.sin(k * Math.PI * 2.5)));
        const a = 0.3 * env;                                  // barely visible, not emphasized
        const prev = ctx.filter; ctx.filter = "blur(0.7px)";
        for (const s of strike.segs) {
          const w = s.depth === 0 ? 0.8 : s.depth === 1 ? 0.55 : 0.4;  // very thin (< 1px core)
          ctx.beginPath(); ctx.moveTo(s.pts[0][0], s.pts[0][1]);
          for (let j = 1; j < s.pts.length; j++) ctx.lineTo(s.pts[j][0], s.pts[j][1]);
          ctx.lineCap = "round"; ctx.lineJoin = "round";
          ctx.strokeStyle = `hsla(203, 100%, 74%, ${a})`;        // bright blue, faint
          ctx.lineWidth = w; ctx.stroke();
          ctx.strokeStyle = `hsla(195, 100%, 96%, ${a * 0.5})`;  // white-hot core
          ctx.lineWidth = Math.max(0.3, w * 0.45); ctx.stroke();
        }
        ctx.filter = prev;
      }

      requestAnimationFrame(frame);
      if (reduceMotion) { const n = performance.now(); frame(n + 16); }

      // ---------------- interaction ----------------
      const captionEl = document.getElementById("caption");
      const chipsEl = document.getElementById("chips");
      let capTimer;
      function speak(i) {
        st[i].target = 1;
        chips[i].classList.add("act");
        captionEl.classList.remove("on");
        clearTimeout(capTimer);
        capTimer = setTimeout(() => {
          captionEl.textContent = `${AGENTS[i].id} ${AGENTS[i].verb}.`;
          captionEl.classList.add("on");
        }, 260);
        clearTimeout(st[i]._off);
        st[i]._off = setTimeout(() => { st[i].target = 0; chips[i].classList.remove("act"); }, 2600);
      }

      const chips = AGENTS.map((a, i) => {
        const el = document.createElement("div");
        el.className = "chip"; el.textContent = a.id;
        el.addEventListener("click", () => speak(i));
        chipsEl.appendChild(el);
        return el;
      });

      cv.addEventListener("pointerenter", () => { hovering = true; });
      cv.addEventListener("pointerleave", () => { hovering = false; });

      // Ambient life: let one agent speak now and then, so it feels alive.
      if (!reduceMotion) {
        setInterval(() => {
          if (Math.random() < 0.5) speak((Math.random() * N) | 0);
        }, 4600);
      }
    </script>
  </body>
</html>
