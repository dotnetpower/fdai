# Upstream built-in ObjectType: Process.
#
# A `Process` is the runtime instance and state of one Workflow run
# (see docs/roadmap/decisioning/process-automation.md). It is the fifth first-class
# ontology object type after Resource / Rule / Signal / Finding, and it
# is what makes a multi-step business process traversable in the graph
# without duplicating the append-only audit log.
#
# A Process references the Workflow it instantiates by name
# (`workflow_ref`); the Workflow catalog lives under
# `rule-catalog/workflows/` and cross-references its steps' ActionTypes
# at load, exactly as a Rule's `remediates` resolves to an ActionType.
# The Process itself carries only run state; the step definitions and
# their safety invariants live on the referenced ActionTypes.
schema_version: "1.0.0"
name: Process
version: "1.0.0"
key: id
description: Runtime instance and state of one Workflow run over a target Resource.
properties:
  id:
    type: string
    required: true
    description: Idempotent process id derived from (workflow_ref, target_resource_id, trigger_ts); retries MUST reuse it.
  workflow_ref:
    type: string
    required: true
    description: Name of the Workflow this process instantiates (rule-catalog/workflows/).
  workflow_version:
    type: string
    required: true
    description: Version of the Workflow declaration frozen for this run.
  status:
    type: string
    required: true
    description: One of pending | running | waiting | compensating | compensated | succeeded | failed | cancelled | timed_out.
  current_step:
    type: string
    required: false
    description: Step id currently in flight; empty when the process is terminal.
  target_resource_id:
    type: string
    required: true
    description: Primary Resource id the process operates on (the `targets` link endpoint).
  started_at:
    type: datetime
    required: true
    description: RFC 3339 UTC timestamp when the process run started.
  updated_at:
    type: datetime
    required: true
    description: RFC 3339 UTC timestamp of the latest committed transition.
  correlation_id:
    type: string
    required: true
    description: Correlation id shared by process events, audit rows, and projections.
  revision:
    type: integer
    required: true
    description: Optimistic concurrency revision from the Process runtime snapshot.
