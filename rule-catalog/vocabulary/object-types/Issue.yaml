# Upstream built-in ObjectType: Issue.
#
# An `Issue` is FDAI's internal mirror of a GitHub Issue created by Saga
# via the `governance.escalate-to-github-issue` action. Fingerprint-based
# dedup collapses repeated occurrences into one Issue + N comments. See
# agent-pantheon.md § 6.4.
schema_version: "1.0.0"
name: Issue
version: "1.0.0"
key: id
description: FDAI mirror of a GitHub issue created via escalate_to_github_issue; dedup by fingerprint.
lifecycle:
  owner: Saga
  creation:
    - code: agent_handoff
      when: An Agent cannot resolve a request within its owned scope and emits HandoffEscalation.
      result: Saga creates the Issue mirror and the backing GitHub issue.
      source_refs:
        - src/fdai/agents/saga.py#escalate_to_github_issue
        - rule-catalog/vocabulary/object-types/HandoffEscalation.yaml
    - code: bragi_unhandled_query
      when: Bragi abstains from a conversational turn with handoff_needed set to true.
      result: The runtime sends the handoff to Saga for Issue materialization.
      source_refs:
        - src/fdai/agents/_framework/runtime.py#_maybe_escalate_handoff
        - src/fdai/agents/saga.py#escalate_to_github_issue
  deduplication:
    strategy: deterministic fingerprint
    fields:
      - intent_category
      - resource_type
      - normalized_selector
      - primary_agent
      - failure_reason_code
    on_repeat: Append a correlation-scoped comment to the existing Issue instead of creating another Issue.
  closure:
    - code: resolving_capability_promoted
      when: A rule or capability that resolves the fingerprint is promoted and its regression window passes.
      result: Saga closes the Issue and records the promoting pull request.
      source_refs:
        - src/fdai/agents/saga.py#close_issue
        - docs/roadmap/agents/agent-pantheon.md#64-handoff-escalation-protocol
  authority_refs:
    - rule-catalog/vocabulary/object-types/Issue.yaml
    - src/fdai/agents/saga.py#escalate_to_github_issue
    - src/fdai/agents/_framework/runtime.py#_maybe_escalate_handoff
properties:
  id:
    type: string
    required: true
    description: Opaque local id (issue_id in payload).
  fingerprint:
    type: string
    required: true
    description: SHA1 of `intent_category + resource_type + normalized_selector + primary_agent + failure_reason_code`. Label hash never carries customer identifiers.
  github_number:
    type: integer
    required: false
    description: Number assigned by the GitHub App; empty during shadow-mode dry runs.
  status:
    type: string
    required: true
    description: One of `open`, `closed`.
  first_seen:
    type: string
    required: true
    description: ISO 8601 timestamp of first occurrence.
  last_seen:
    type: string
    required: true
    description: ISO 8601 timestamp of most recent occurrence.
  occurrence_count:
    type: integer
    required: true
    description: Monotonic occurrence count; incremented on every repeat.
  primary_agent:
    type: string
    required: false
    description: Name of the Agent whose abstain triggered the escalation.
  correlation_ids:
    type: array
    required: false
    description: Correlation ids of the recorded occurrences; each comment references one.
  closed_by_pr:
    type: string
    required: false
    description: PR url that promoted the resolving rule / capability (present only when status = closed).
