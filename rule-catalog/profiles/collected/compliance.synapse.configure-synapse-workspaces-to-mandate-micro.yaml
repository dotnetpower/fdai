schema_version: 1.0.0
id: compliance.synapse.configure-synapse-workspaces-to-mandate-micro
title: (Azure Initiative) Configure Synapse Workspaces to mandate Microsoft Entra-only
  identities for authentication
description: Require and configure Microsoft Entra-only authentication for Synapse
  Workspaces, disabling local authentication methods. This allows access exclusively
  via Microsoft Entra identities, enhancing security with modern authentication enhancements
  including MFA, SSO, and secret-less programmatic access with managed identities.
