schema_version: 1.0.0
id: compliance.regulatory-compliance.new-zealand-ism
title: (Azure Initiative) New Zealand ISM
description: NZISM v3.8. The New Zealand Information Security Manual (NZISM) details
  processes and controls essential for the protection of all New Zealand Government
  information and systems. This initiative includes policies that address a subset
  of NZISM controls. Additional policies will be added in upcoming releases. For full
  details on controls, please refer to https://www.nzism.gcsb.govt.nz/ism-document.
  This policy set includes definitions that have a Deny effect by default.
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://NewZealand_ISM
  review_cadence_days: 90
