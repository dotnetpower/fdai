schema_version: 1.0.0
id: compliance.regulatory-compliance.nist-sp-800-53-rev-5
title: (Azure Initiative) NIST SP 800-53 Rev. 5
description: National Institute of Standards and Technology (NIST) SP 800-53 Rev.
  5 provides a standardized approach for assessing, monitoring and authorizing cloud
  computing products and services to manage information security risk. These policies
  address a subset of NIST SP 800-53 R5 controls. Additional policies will be added
  in upcoming releases. For more information, visit https://aka.ms/nist800-53r5-initiative
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://NIST_SP_800-53_R5
  review_cadence_days: 90
