schema_version: 1.0.0
id: compliance.regulatory-compliance.sovereignty-baseline-confidenti
title: (Azure Initiative) Sovereignty Baseline - Confidential Policies
description: 'The Microsoft Cloud for Sovereignty recommends confidential policies
  to help organizations achieve their sovereignty goals by default denying the creation
  of resources outside of approved regions, denying resources that are not backed
  by Azure Confidential Computing, and denying data storage resources that are not
  using Customer-Managed Keys. More details can be found here: https://aka.ms/SovereigntyBaselinePolicies'
provenance:
  authored_by: azure-policy-initiative-collector
