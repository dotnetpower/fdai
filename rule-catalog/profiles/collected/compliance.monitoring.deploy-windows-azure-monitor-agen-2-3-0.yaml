schema_version: 1.0.0
id: compliance.monitoring.deploy-windows-azure-monitor-agen-2-3-0
title: (Azure Initiative) Deploy Windows Azure Monitor Agent with user-assigned managed
  identity-based auth and associate with Data Collection Rule
description: Monitor your Windows virtual machines and virtual machine scale sets
  by deploying the Azure Monitor Agent extension with user-assigned managed identity
  authentication and associating with specified Data Collection Rule. Azure Monitor
  Agent Deployment will occur on machines with supported OS images (or machines matching
  the provided list of images) in supported regions.
