title: (Azure Initiative) Control the use of AVD for Cloud in Mission Platforms
description: This policy initiative applies exclusively to Mission Platform products
  and services; usage outside of these scopes is not supported. This policy set deploys
  the required policy guardrails governing the use of Azure Virtual Desktops within
  the Environment. See the list of policies of the services that are included.
