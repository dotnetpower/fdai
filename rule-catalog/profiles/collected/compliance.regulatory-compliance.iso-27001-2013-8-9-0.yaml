schema_version: 1.0.0
id: compliance.regulatory-compliance.iso-27001-2013-8-9-0
title: (Azure Initiative) ISO 27001:2013
description: The International Organization for Standardization (ISO) 27001 standard
  provides requirements for establishing, implementing, maintaining, and continuously
  improving an Information Security Management System (ISMS). These policies address
  a subset of ISO 27001:2013 controls. Additional policies will be added in upcoming
  releases. For more information, visit https://aka.ms/iso27001-init
