schema_version: 1.0.0
id: compliance.kubernetes.kubernetes-cluster-pod-security-r-2-5-0
title: (Azure Initiative) Kubernetes cluster pod security restricted standards for
  Linux-based workloads
description: This initiative includes the policies for the Kubernetes cluster pod
  security restricted standards. This policy is generally available for Kubernetes
