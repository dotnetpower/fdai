schema_version: 1.0.0
id: compliance.virtualenclaves.preview-control-the-use-of-postgresql
title: '(Azure Initiative) [Preview]: Control the use of PostgreSql in a Virtual Enclave'
description: This initiative deploys Azure policies for PostgreSql ensuring boundary
  protection of this resource while it operates within the logically separated structure
  of Azure Virtual Enclaves. https://aka.ms/VirtualEnclaves
