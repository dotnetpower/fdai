schema_version: 1.0.0
id: compliance.kubernetes.preview-preview-use-image-integrity-to-ens
title: '(Azure Initiative) [Preview]: [Preview]: Use Image Integrity to ensure only
  trusted images are deployed'
description: Use Image Integrity to ensure AKS clusters deploy only trusted images
  by enabling the Image Integrity and Azure Policy Add-Ons on AKS clusters. Image
  Integrity Add-On and Azure Policy Add-On are both pre-requisites to using Image
  Integrity to verify if image is signed upon deployment. For more info, visit https://aka.ms/aks/image-integrity.
