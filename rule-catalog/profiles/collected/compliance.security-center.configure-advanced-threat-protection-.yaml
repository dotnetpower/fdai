id: compliance.security-center.configure-advanced-threat-protection-
title: (Azure Initiative) Configure Advanced Threat Protection to be enabled on open-source
  relational databases
description: Enable Advanced Threat Protection on your non-Basic tier open-source
  relational databases to detect anomalous activities indicating unusual and potentially
  harmful attempts to access or exploit databases. See https://aka.ms/AzDforOpenSourceDBsDocu.
