schema_version: 1.0.0
id: compliance.mission.control-the-use-of-azure-sql-in-miss-1-0-0
title: (Azure Initiative) Control the use of Azure SQL in Mission Platforms
description: This policy set applies exclusively to Mission Platform products and
  services; usage outside of these scopes is not supported. It deploys coordinated
  Azure SQL controls to enforce private networking, outbound restrictions, and customer-managed
  encryption for mission workloads (see https://learn.microsoft.com/azure/azure-sql/database/security-overview).
