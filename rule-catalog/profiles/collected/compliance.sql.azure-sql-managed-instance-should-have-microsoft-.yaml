schema_version: 1.0.0
id: compliance.sql.azure-sql-managed-instance-should-have-microsoft-
title: (Azure Initiative) Azure SQL Managed Instance should have Microsoft Entra-only
  authentication
description: Require Microsoft Entra-only authentication for Azure SQL Managed instance,
  disabling local authentication methods. This allows access exclusively via Microsoft
  Entra identities, enhancing security with modern authentication enhancements including
  MFA, SSO, and secret-less programmatic access with managed identities.
provenance:
