schema_version: 1.0.0
id: compliance.mission.control-the-use-of-app-service-for-cloud-in-m
title: (Azure Initiative) Control the use of App Service for Cloud in Mission Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This initiative deploys Azure policies
  for App Service ensuring boundary protection of this resource while it operates
  within the logically separated structure of Mission Platform.
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://AppServiceInitiative
  review_cadence_days: 90
