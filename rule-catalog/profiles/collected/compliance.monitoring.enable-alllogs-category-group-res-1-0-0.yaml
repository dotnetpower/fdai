schema_version: 1.0.0
id: compliance.monitoring.enable-alllogs-category-group-res-1-0-0
title: (Azure Initiative) Enable allLogs category group resource logging for supported
  resources to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This initiative deploys diagnostic setting using the allLogs category group
  to route logs to an Event Hub for all supported resources
provenance:
