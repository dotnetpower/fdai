schema_version: 1.0.0
id: compliance.regulatory-compliance.fedramp-moderate-17-19-0
title: (Azure Initiative) FedRAMP Moderate
description: FedRAMP is a U.S. government-wide program that provides a standardized
  approach to security assessment, authorization, and continuous monitoring for cloud-based
  products and services. FedRAMP defines a set of controls for Low, Moderate, or High
  security impact level systems based on NIST baseline controls. These policies address
  a subset of FedRAMP (Moderate) controls. Additional policies will be added in upcoming
  releases. For more information, visit https://www.fedramp.gov/documents-templates/
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://FedRAMP_M_audit
  review_cadence_days: 90
