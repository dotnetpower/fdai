schema_version: 1.0.0
id: compliance.monitoring.deprecated-legacy-enable-azure-mo-1-2-0
title: '(Azure Initiative) [Deprecated]: Legacy - Enable Azure Monitor for Virtual
  Machine Scale Sets'
description: 'Legacy - Enable Azure Monitor for the Virtual Machine Scale Sets in
  the specified scope (Management group, Subscription or resource group). Takes Log
  Analytics workspace as parameter. Use the new initiative named: Enable Azure Monitor
  for VMSS with Azure Monitoring Agent(AMA). Note: if your scale set upgradePolicy
  is set to Manual, you need to apply the extension to the all VMs in the set by calling
  upgrade on them. In CLI this would be az vmss update-instances.'
