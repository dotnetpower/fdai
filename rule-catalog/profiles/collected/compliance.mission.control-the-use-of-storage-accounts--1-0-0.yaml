schema_version: 1.0.0
id: compliance.mission.control-the-use-of-storage-accounts--1-0-0
title: (Azure Initiative) Control the use of Storage Accounts for Cloud in Mission
  Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This initiative deploys Azure policies
  for Storage Accounts ensuring boundary protection of this resource while it operates
  within the logically separated enclaves.
