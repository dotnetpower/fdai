description: The Microsoft cloud security benchmark initiative represents the policies
  and controls implementing security recommendations defined in Microsoft cloud security
  benchmark, see https://aka.ms/azsecbm. This also serves as the Microsoft Defender
  for Cloud default policy initiative. You can directly assign this initiative, or
  manage its policies and compliance results within Microsoft Defender for Cloud.
