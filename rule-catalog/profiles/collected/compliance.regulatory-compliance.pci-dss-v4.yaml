schema_version: 1.0.0
id: compliance.regulatory-compliance.pci-dss-v4
title: (Azure Initiative) PCI DSS v4
description: The Payment Card Industry (PCI) Data Security Standards (DSS) is a global
  information security standard designed to prevent fraud through increased control
  of credit card data. Compliance with PCI DSS is required for any organization that
  stores, processes, or transmits payment and cardholder data. These policies address
  a subset of PCI-DSS v4 controls. For more information, visit https://docs.microsoft.com/azure/governance/policy/samples/pci-dss-3-2-1
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://PCI_DSS_V4.0
  review_cadence_days: 90
