title: (Azure Initiative) Configure SQL VMs and Arc-enabled SQL Servers to install
  Microsoft Defender for SQL and AMA with a LA workspace
description: Microsoft Defender for SQL collects events from the agents and uses them
  to provide security alerts and tailored hardening tasks (recommendations). Creates
  a resource group and a Data Collection Rule and Log Analytics workspace in the same
  region as the machine.
