schema_version: 1.0.0
id: compliance.regulatory-compliance.cis-microsoft-azure-f-8-15-0
title: (Azure Initiative) CIS Microsoft Azure Foundations Benchmark v1.3.0
description: The Center for Internet Security (CIS) is a nonprofit entity whose mission
  is to 'identify, develop, validate, promote, and sustain best practice solutions
  for cyberdefense.' CIS benchmarks are configuration baselines and best practices
  for securely configuring a system. These policies address a subset of CIS Microsoft
  Azure Foundations Benchmark v1.3.0 controls. For more information, visit https://aka.ms/cisazure130-initiative
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://CISv1_3_0
  review_cadence_days: 90
