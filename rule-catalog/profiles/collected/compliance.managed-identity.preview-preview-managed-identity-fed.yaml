  mode: shadow
- id: azure-builtin.azure.managedidentity.userassignedidentities.federatedidentitycredentials.preview-preview-managed-identity-federat
  mode: shadow
- id: azure-builtin.azure.managedidentity.userassignedidentities.federatedidentitycredentials.preview-prev.fic_limittogithubiss
  mode: shadow
