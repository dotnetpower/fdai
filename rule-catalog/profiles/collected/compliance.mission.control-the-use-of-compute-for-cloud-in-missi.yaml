id: compliance.mission.control-the-use-of-compute-for-cloud-in-missi
title: (Azure Initiative) Control the use of Compute for Cloud in Mission Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This policy set deploys the required
  policy guardrails governing the use of Azure Virtual Machines within the Environment.
  See the list of policies of the services that are included.
