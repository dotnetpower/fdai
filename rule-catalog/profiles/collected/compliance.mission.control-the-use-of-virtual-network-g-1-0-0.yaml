schema_version: 1.0.0
id: compliance.mission.control-the-use-of-virtual-network-g-1-0-0
title: (Azure Initiative) Control the use of Virtual Network Guardrails for Cloud
  in Mission Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This policy set deploys the required
  policy guardrails governing the use of Azure Virtual Networks within the Environment.
  See the list of policies of the services that are included.
