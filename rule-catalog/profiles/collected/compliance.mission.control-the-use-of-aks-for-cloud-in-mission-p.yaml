schema_version: 1.0.0
id: compliance.mission.control-the-use-of-aks-for-cloud-in-mission-p
title: (Azure Initiative) Control the use of AKS for Cloud in Mission Platforms
description: This policy initiative applies exclusively to Mission Platform products
  and services; usage outside of these scopes is not supported. This initiative deploys
  Azure policies for AKS ensuring boundary protection of this resource while it operates
  within the logically separated structure of Mission Platform.
