schema_version: 1.0.0
id: compliance.mission.control-the-use-of-postgresql-in-mis-1-0-0
title: (Azure Initiative) Control the use of PostgreSQL in Mission Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This initiative enforces PostgreSQL
  boundary protections to maintain security and compliance requirements. For more
  information, visit https://aka.ms/mission-platforms
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://PostgreSqlInitiative
  review_cadence_days: 90
