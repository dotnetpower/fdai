schema_version: 1.0.0
id: compliance.regulatory-compliance.soc-2-type-2-1-12-0
title: (Azure Initiative) SOC 2 Type 2
description: 'A System and Organization Controls (SOC) 2 is a report based on the
  Trust Service Principles and Criteria established by the American Institute of Certified
  Public Accountants (AICPA). The Report evaluates an organization''s information
  system relevant to the following principles: security, availability, processing
  integrity, confidentiality and privacy. These policies address a subset of SOC 2
  Type 2 controls. For more information, visit https://docs.microsoft.com/azure/compliance/offerings/offering-soc-2'
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://SOC_2
  review_cadence_days: 90
