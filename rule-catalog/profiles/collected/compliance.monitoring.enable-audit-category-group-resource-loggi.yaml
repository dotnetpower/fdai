schema_version: 1.0.0
id: compliance.monitoring.enable-audit-category-group-resource-loggi
title: (Azure Initiative) Enable audit category group resource logging for supported
  resources to Event Hub
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This initiative deploys diagnostic setting using the audit category group
  to route logs to Event Hub for all supported resources
