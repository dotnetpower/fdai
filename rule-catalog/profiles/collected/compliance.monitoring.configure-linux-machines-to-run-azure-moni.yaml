schema_version: 1.0.0
id: compliance.monitoring.configure-linux-machines-to-run-azure-moni
title: (Azure Initiative) Configure Linux machines to run Azure Monitor Agent and
  associate them to a Data Collection Rule
description: Monitor and secure your Linux virtual machines, virtual machine scale
  sets, and Arc machines by deploying the Azure Monitor Agent extension and associating
  the machines with a specified Data Collection Rule. Deployment will occur on machines
  with supported OS images (or machines matching the provided list of images) in supported
  regions.
