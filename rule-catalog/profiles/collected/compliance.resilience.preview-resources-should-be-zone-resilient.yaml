schema_version: 1.0.0
id: compliance.resilience.preview-resources-should-be-zone-resilient
title: '(Azure Initiative) [Preview]: Resources should be Zone Resilient'
description: Some resource types can be deployed Zone Redundant (e.g. SQL Databases);
  some can be deploy Zone Aligned (e.g. Virtual Machines); and some can be deployed
  either Zone Aligned or Zone Redundant (e.g. Virtual Machine Scale Sets). Being zone
  aligned does not guarantee resilience, but it is the foundation on which a resilient
  solution can be built (e.g. three Virtual Machine Scale Sets zone aligned to three
  different zones in the same region with a load balancer). See https://aka.ms/AZResilience
  for more info.
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
