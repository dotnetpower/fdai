schema_version: 1.0.0
id: compliance.regulatory-compliance.acat-for-microsoft-365-certific
title: (Azure Initiative) ACAT for Microsoft 365 Certification
description: App Compliance Automation Tool for Microsoft 365 (ACAT) simplifies the
  process to achieve Microsoft 365 Certification, see https://aka.ms/acat. This certification
  ensures that apps have strong security and compliance practices in place to protect
  customer data, security, and privacy. This initiative includes policies that address
  a subset of the Microsoft 365 Certification controls. Additional policies will be
  added in upcoming releases.
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://ACAT_M365_Cert
  review_cadence_days: 90
