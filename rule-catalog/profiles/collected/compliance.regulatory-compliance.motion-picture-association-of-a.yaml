schema_version: 1.0.0
id: compliance.regulatory-compliance.motion-picture-association-of-a
title: (Azure Initiative) Motion Picture Association of America (MPAA)
description: This initiative includes audit and virtual machine extension deployment
  policies that address a subset of Motion Picture Association of America (MPAA) security
  and guidelines controls. Additional policies will be added in upcoming releases.
  For more information, visit https://aka.ms/mpaa-init.
