schema_version: 1.0.0
id: compliance.regulatory-compliance.swift-csp-cscf-v2022
title: (Azure Initiative) SWIFT CSP-CSCF v2022
description: SWIFT's Customer Security Programme (CSP) helps financial institutions
  ensure their defences against cyberattacks are up to date and effective, to protect
  the integrity of the wider financial network. Users compare the security measures
  they have implemented with those detailed in the Customer Security Controls Framework
  (CSCF). These policies address a subset of SWIFT controls. For more information,
  visit https://docs.microsoft.com/azure/governance/policy/samples/swift-cscf-v2021
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://SWIFT_CSP-CSCF_v2022
  review_cadence_days: 90
