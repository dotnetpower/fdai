title: (Azure Initiative) Synapse Workspaces should have Microsoft Entra-only authentication
description: Require Microsoft Entra-only authentication for Synapse Workspaces, disabling
  local authentication methods. This allows access exclusively via Microsoft Entra
  identities, enhancing security with modern authentication enhancements including
  MFA, SSO, and secret-less programmatic access with managed identities.
