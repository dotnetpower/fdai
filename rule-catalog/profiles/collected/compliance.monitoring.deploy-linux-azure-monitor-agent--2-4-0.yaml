schema_version: 1.0.0
id: compliance.monitoring.deploy-linux-azure-monitor-agent--2-4-0
title: (Azure Initiative) Deploy Linux Azure Monitor Agent with user-assigned managed
  identity-based auth and associate with Data Collection Rule
description: Monitor your Linux virtual machines and virtual machine scale sets by
  deploying the Azure Monitor Agent extension with user-assigned managed identity
  authentication and associating with specified Data Collection Rule. Azure Monitor
  Agent Deployment will occur on machines with supported OS images (or machines matching
  the provided list of images) in supported regions.
