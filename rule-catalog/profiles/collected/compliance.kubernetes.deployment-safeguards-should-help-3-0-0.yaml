schema_version: 1.0.0
id: compliance.kubernetes.deployment-safeguards-should-help-3-0-0
title: (Azure Initiative) Deployment safeguards should help guide developers towards
  AKS recommended best practices
description: 'A collection of Kubernetes best practices that are recommended by Azure
  Kubernetes Service (AKS). For the best experience, use deployment safeguards to
  assign this policy initiative: https://aka.ms/aks/deployment-safeguards. Azure Policy
  Add-On for AKS is a pre-requisite for applying these best practices to your clusters.
  For instructions on enabling the Azure Policy Add-On, go to aka.ms/akspolicydoc'
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://AKS_Safeguards
  review_cadence_days: 90
