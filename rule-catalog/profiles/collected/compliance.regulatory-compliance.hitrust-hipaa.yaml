schema_version: 1.0.0
id: compliance.regulatory-compliance.hitrust-hipaa
title: (Azure Initiative) HITRUST/HIPAA
description: Health Information Trust Alliance (HITRUST) helps organizations from
  all sectors-but especially healthcare-effectively manage data, information risk,
  and compliance. HITRUST certification means that the organization has undergone
  a thorough assessment of the information security program. These policies address
  a subset of HITRUST controls. For more information, visit https://docs.microsoft.com/azure/governance/policy/samples/hipaa-hitrust-9-2
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://HIPAA_HITRUST_audit
  review_cadence_days: 90
