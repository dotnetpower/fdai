schema_version: 1.0.0
id: compliance.mission.control-the-use-of-cosmosdb-in-missi-1-0-0
title: (Azure Initiative) Control the use of CosmosDB in Mission Platforms
description: This policy applies exclusively to Mission Platform products and services;
  usage outside of these scopes is not supported. This initiative ensures Cosmos DB
  resources operate securely within logically separated Mission Platform environments
  by enforcing boundary protection and access controls.
