schema_version: 1.0.0
id: compliance.regulatory-compliance.nist-sp-800-171-rev--15-22-0
title: (Azure Initiative) NIST SP 800-171 Rev. 2
description: The US National Institute of Standards and Technology (NIST) promotes
  and maintains measurement standards and guidelines to help protect the information
  and information systems of federal agencies. In response to Executive Order 13556
  on managing controlled unclassified information (CUI), it published NIST SP 800-171.
  These policies address a subset of NIST SP 800-171 Rev. 2 controls. For more information,
  visit https://docs.microsoft.com/azure/compliance/offerings/offering-nist-800-171
provenance:
  authored_by: azure-policy-initiative-collector
  based_on:
  - azure-policy://NIST_SP_800-171_R2
  review_cadence_days: 90
