# Example source manifest - points at this repo's own P1 catalog tree
# so the collector CLI can be exercised end-to-end without any external
# network. Real OSS sources (gatekeeper-library, checkov, ...) ship one
# manifest per source under `rule-catalog/sources/<id>/manifest.yaml`
# with the same shape but `fetch.kind: git`.

schema_version: "1.0.0"
id: fdai-p1-seed
name: FDAI P1 seed catalog (self-hosted)
url_prefix: https://github.com/dotnetpower/fdai/tree/main/rule-catalog/catalog
license: Apache-2.0
redistribution: embeddable
fetch:
  kind: local
  path: rule-catalog/catalog
parser: rule-yaml
cadence: on-demand
