schema_version: 1.0.0
name: remediate.enable-diagnostic-settings
version: 1.0.0
operation: enable
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
rollback_contract: pr_revert
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 100
  min_accuracy: 0.97
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
- kind: link_exists
  link_type: emits_to
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Attach a diagnostic-settings resource routing logs and metrics of the target
  to a log-workspace. Reversible via PR revert since the binding is an IaC-declared resource.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_auto
    min_role: contributor
  t1:
    max_autonomy: shadow_only
    min_role: contributor
  t2:
    max_autonomy: shadow_only
    min_role: approver
