schema_version: 1.0.0
name: remediate.assign-identity
version: 1.0.0
operation: attach
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
- GraphTraversalRequired
rollback_contract: pr_revert
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.97
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: dependent_resource_degraded
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Attach a system-assigned or a specified user-assigned managed-identity to a compute
  resource so it no longer relies on key-based auth. Rollback via PR revert since the assignment
  is a declarative resource property.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: contributor
  t1:
    max_autonomy: shadow_only
    min_role: contributor
  t2:
    max_autonomy: shadow_only
    min_role: approver
