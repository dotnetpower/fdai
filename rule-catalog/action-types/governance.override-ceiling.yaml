schema_version: 1.0.0
name: governance.override-ceiling
version: 1.0.0
operation: update
interfaces:
- ControlPlane
rollback_contract: pr_revert
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 7
  min_samples: 20
  min_accuracy: 1.0
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Operator-side override on the RiskGate ceiling for a scoped target. Never raises
  autonomy above the shipped ActionType default (execution-model.md 2.7).
category: governance
trigger_kind:
  kind: operator_request
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: owner
  t1:
    max_autonomy: shadow_only
    min_role: owner
  t2:
    max_autonomy: shadow_only
    min_role: owner
argument_schema:
  type: object
  additionalProperties: false
  required:
  - action_type_id
  - scope_ref
  - justification
  properties:
    action_type_id:
      type: string
      pattern: ^[a-z][a-z0-9_\.\-]{0,79}$
    axis:
      type: string
      enum:
      - ceiling
      - role
      - env
      - static_blast
      - live_blast
      description: Which RiskGate axis this override adjusts.
    target_level:
      type: string
      enum:
      - enforce_hil
      - shadow_only
      description: Target level; MUST NOT be enforce_auto (never raises autonomy).
    scope:
      type: string
      enum:
      - resource
      - resource-group
    scope_ref:
      type: string
      minLength: 1
    expires_at:
      type: string
      format: date-time
    justification:
      type: string
      minLength: 20
      maxLength: 500
