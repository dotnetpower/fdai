schema_version: 1.0.0
name: remediate.remove-orphan-resource
version: 1.0.0
operation: delete
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
- GraphTraversalRequired
- AsymmetricRollback
rollback_contract: pitr
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 30
  min_samples: 100
  min_accuracy: 0.99
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: link_absent
  link_type: attached_to
- kind: link_absent
  link_type: depends_on
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: dependent_resource_degraded
- kind: provider_api_error_streak
  count: 2
- kind: time_box_exceeded_seconds
  seconds: 600
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Delete a resource proven orphaned (unattached disk, unassociated public IP, load-balancer
  with no backend). Fires only when both `attached_to` and `depends_on` are absent in the
  graph. Rollback uses the provider PITR / soft-delete window; if the window has expired the
  risk-gate MUST route to HIL.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: approver
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
