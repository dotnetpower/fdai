schema_version: 1.0.0
name: ops.scale-in
version: 1.0.0
operation: scale
interfaces:
- ControlPlane
rollback_contract: state_forward_only
irreversible: true
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Decrease replica or instance count. Requires an active live probe (live_probe_ref
  binds after Month 1) so the risk-gate confirms the target is quiet before scaling in.
category: ops
trigger_kind:
  kind: both
execution_path: direct_api
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: owner
argument_schema:
  type: object
  additionalProperties: false
  required:
  - target_resource_ref
  - reason
  properties:
    target_resource_ref:
      type: string
      minLength: 1
    replica_count:
      type: integer
      minimum: 0
      maximum: 1000
    reason:
      type: string
      minLength: 10
      maxLength: 200
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
