schema_version: 1.0.0
name: remediate.restrict-network-access
version: 1.0.0
operation: update
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
- GraphTraversalRequired
- AsymmetricRollback
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 21
  min_samples: 40
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: dependent_resource_degraded
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 600
blast_radius:
  computation: graph_derived
  max_affected_resources: 15
  traversal_depth: 2
  traversal_links:
  - depends_on
  - attached_to
description: Tighten network access on a target - remove wide inbound NSG rules (SSH/RDP from
  any), require a private-endpoint on a data service, disable public network access at the
  account level. Asymmetric rollback because widening back to any-source is a separate governance-gated
  action.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: approver
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
