schema_version: 1.0.0
name: remediate.rotate-secret
version: 1.0.0
operation: rotate
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
- GraphTraversalRequired
- CrossResource
rollback_contract: snapshot_restore
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 30
  min_samples: 20
  min_accuracy: 0.99
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
- kind: link_exists
  link_type: depends_on
stop_conditions:
- kind: dependent_resource_degraded
- kind: provider_api_error_streak
  count: 2
- kind: error_rate_above
  threshold: 0.01
  window_seconds: 300
- kind: time_box_exceeded_seconds
  seconds: 600
blast_radius:
  computation: graph_derived
  max_affected_resources: 20
  traversal_depth: 2
  traversal_links:
  - depends_on
description: Rotate a secret / certificate held in a secret-store. Cross-resource because
  every `depends_on` consumer (ContainerApp, function, VM) MUST pick up the new version; the
  executor coordinates locks per consumer. Rollback pins the prior version stored by the secret-store.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: approver
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
