schema_version: 1.0.0
name: remediate.enable-tde
version: 1.0.0
operation: enable
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 600
- kind: resource_property_equals
  property: tde_enabled
  value: false
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 900
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Turn on transparent data encryption on a `sql-database` or `postgresql-server`.
  Reverses through a paired disable ActionType (subject to policy - most tenants deny disabling
  TDE).
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: contributor
  t1:
    max_autonomy: shadow_only
    min_role: contributor
  t2:
    max_autonomy: shadow_only
    min_role: approver
