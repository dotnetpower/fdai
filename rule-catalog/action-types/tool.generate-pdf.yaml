schema_version: 1.0.0
name: tool.generate-pdf
version: 1.0.0
operation: create
interfaces:
- IdempotentByKey
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions: []
stop_conditions:
- kind: time_box_exceeded_seconds
  seconds: 120
- kind: provider_api_error_streak
  count: 3
blast_radius:
  computation: static_enum
  static_bucket: resource
description: 'Render a PDF document (resilience summary, cost report, change audit)
  from a report template. tool_call path: the executor invokes a registered
  generate-pdf function via the ToolExecutor Protocol rather than mutating a
  substrate. Rollback is state_forward_only - delete the produced artifact.'
category: tool
trigger_kind:
  kind: both
execution_path: tool_call
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: owner
argument_schema:
  type: object
  additionalProperties: false
  required:
  - document_ref
  - report_kind
  - reason
  properties:
    document_ref:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
    report_kind:
      type: string
      enum:
      - resilience_summary
      - cost_report
      - change_audit
    window_days:
      type: integer
      minimum: 1
      maximum: 365
    reason:
      type: string
      x-fdai-audit-safe: true
      minLength: 10
      maxLength: 200
