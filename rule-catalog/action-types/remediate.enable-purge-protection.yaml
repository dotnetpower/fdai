schema_version: 1.0.0
name: remediate.enable-purge-protection
version: 1.0.0
operation: enable
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
- AsymmetricRollback
rollback_contract: state_forward_only
irreversible: true
default_mode: shadow
promotion_gate:
  min_shadow_days: 30
  min_samples: 20
  min_accuracy: 0.99
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 600
- kind: no_conflicting_open_action_on_resource
- kind: resource_property_equals
  property: purge_protection_enabled
  value: false
stop_conditions:
- kind: provider_api_error_streak
  count: 2
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Turn on purge protection on a secret-store. Marked irreversible because once
  purge protection is on, the provider does NOT allow turning it off - a subsequent removal
  would require recreating the vault (out of this ActionType's scope). Risk-gate MUST route
  this to HIL+quorum until the promotion gate is measured on the frozen scenario set.
category: remediation
trigger_kind:
  kind: rule_violation
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: contributor
  t1:
    max_autonomy: shadow_only
    min_role: contributor
  t2:
    max_autonomy: shadow_only
    min_role: approver
