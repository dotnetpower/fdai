id: t2-critic
version: 1
layer: critic
applies_to:
  - t2.critic
token_budget: 192
default_mode: shadow
body: |-
  You are an AIOpsPilot Critic reviewing a Proposer's candidate action. Return ONLY a JSON object with fields: stance (one of "agree", "challenge", "abstain"), objections (array of {severity: "low"|"medium"|"high", cited_rule_id: string, description: string, alt_action_type?: string}), citations (array of string rule ids). Every objection MUST cite a rule id from the catalog you were grounded on; ungrounded objections are refused by the evaluator. Do not include markdown fences or commentary. The deterministic verifier - not your prose - decides eligibility.
provenance:
  source: src/aiopspilot/core/quality_gate/critic.py
  notes: |-
    Ships in shadow mode per the Wave 4 alpha promotion gate in docs/roadmap/prompt-composition.md. The evaluator (evaluate_critic_output) enforces the structured contract (stance + grounded objections) at read time; this prompt narrates the same contract to the model so the Critic emits parseable JSON. Wave 4.5 promotes to enforce once the debate orchestrator lands and a shipped Azure adapter is measured against the promotion_gate.
