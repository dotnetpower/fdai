schema_version: 1.0.0
id: kube-bench.k3s-cis-1.24.1-2-31.ensure-that-encryption-providers-are-appropriately-configured-manual
version: 1.0.0
source: kube_bench
severity: low
category: security
resource_type: kubernetes-cluster.control-plane
check_logic:
  kind: expression
  reference: kube-bench://k3s-cis-1.24/1.2.31
remediation:
  template_ref: remediation/kube-bench/k3s-cis-1.24/1.2.31.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 1.2.31
  kube_bench_ruleset: k3s-cis-1.24
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: 'ENCRYPTION_PROVIDER_CONFIG=$(journalctl -m -u k3s | grep ''Running
    kube-apiserver'' | tail -n1 | grep -- --encryption-provider-config | sed ''s%.*encryption-provider-config[=
    ]\([^ ]*\).*%\1%'')

    if test -e $ENCRYPTION_PROVIDER_CONFIG; then grep -o ''providers\"\:\[.*\]'' $ENCRYPTION_PROVIDER_CONFIG
    | grep -o "[A-Za-z]*" | head -2 | tail -1  | sed ''s/^/provider=/''; fi

    '
