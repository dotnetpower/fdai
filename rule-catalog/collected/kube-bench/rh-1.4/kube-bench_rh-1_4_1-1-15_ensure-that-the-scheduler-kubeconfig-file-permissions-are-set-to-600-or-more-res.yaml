parameters:
  kube_bench_id: 1.1.15
  kube_bench_ruleset: rh-1.4
  kube_bench_group_id: '1.1'
  kube_bench_scored: true
  kube_bench_audit: '# Get the node name where the pod is running

    NODE_NAME=$(oc get pod "$HOSTNAME" -o=jsonpath=''{.spec.nodeName}'')


    # Get the pod name in the openshift-kube-scheduler namespace

    POD_NAME=$(oc get pods -n openshift-kube-scheduler -l app=openshift-kube-scheduler
    --field-selector spec.nodeName="$NODE_NAME" -o jsonpath=''{.items[0].metadata.name}''
    2>/dev/null)


    if [ -z "$POD_NAME" ]; then

    echo "No matching pods found on the current node."

    else

    # Execute the stat command

    oc exec -n openshift-kube-scheduler "$POD_NAME" -- stat -c "$POD_NAME %n permissions=%a"
    /etc/kubernetes/static-pod-resources/configmaps/scheduler-kubeconfig/kubeconfig

    fi

    '
