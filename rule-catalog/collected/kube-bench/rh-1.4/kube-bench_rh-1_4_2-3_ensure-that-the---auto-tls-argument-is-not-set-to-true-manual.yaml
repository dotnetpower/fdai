  kube_bench_ruleset: rh-1.4
  kube_bench_group_id: '2'
  kube_bench_scored: true
  kube_bench_audit: '# Returns 0 if found, 1 if not found

    # Get the node name where the pod is running

    NODE_NAME=$(oc get pod "$HOSTNAME" -o=jsonpath=''{.spec.nodeName}'')

    # Get the pod name in the openshift-etcd namespace

    POD_NAME=$(oc get pods -n openshift-etcd -l app=etcd --field-selector spec.nodeName="$NODE_NAME"
    -o jsonpath=''{.items[0].metadata.name}'' 2>/dev/null)

    if [ -z "$POD_NAME" ]; then

    echo "No matching file found on the current node."

    else

    # Execute the stat command

    oc exec -n openshift-etcd -c etcd "$POD_NAME" -- ps -o command= -C etcd | grep
    -- --auto-tls=true 2>/dev/null ; echo exit_code=$?

    fi

    '
