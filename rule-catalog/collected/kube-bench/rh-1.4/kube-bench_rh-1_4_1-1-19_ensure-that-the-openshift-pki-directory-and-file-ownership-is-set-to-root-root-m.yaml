parameters:
  kube_bench_id: 1.1.19
  kube_bench_ruleset: rh-1.4
  kube_bench_group_id: '1.1'
  kube_bench_scored: true
  kube_bench_audit: '# Should return root:root for all files and directories

    # Get the node name where the pod is running

    NODE_NAME=$(oc get pod "$HOSTNAME" -o=jsonpath=''{.spec.nodeName}'')


    # Get the pod name in the openshift-kube-controller-manager namespace

    POD_NAME=$(oc get pods -n openshift-kube-apiserver -l app=openshift-kube-apiserver
    --field-selector spec.nodeName="$NODE_NAME" -o jsonpath=''{.items[0].metadata.name}''
    2>/dev/null)


    if [ -z "$POD_NAME" ]; then

    echo "No matching pods found on the current node."

    else

    # echo $i static-pod-certs

    oc exec -n openshift-kube-apiserver "$POD_NAME" -c kube-apiserver -- find /etc/kubernetes/static-pod-certs
    -type d -wholename ''*/secrets*'' -exec stat -c "$i %n %U:%G" {} \;

    oc exec -n openshift-kube-apiserver "$POD_NAME" -c kube-apiserver -- find /etc/kubernetes/static-pod-certs
    -type f -wholename ''*/secrets*'' -exec stat -c "$i %n %U:%G" {} \;

    # echo $i static-pod-resources

    oc exec -n openshift-kube-apiserver "$POD_NAME" -c kube-apiserver -- find /etc/kubernetes/static-pod-resources
    -type'
