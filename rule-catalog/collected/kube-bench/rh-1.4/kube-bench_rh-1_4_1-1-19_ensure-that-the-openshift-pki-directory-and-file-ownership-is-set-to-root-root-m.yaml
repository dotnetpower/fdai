id: kube-bench.rh-1.4.1-1-19.ensure-that-the-openshift-pki-directory-and-file-ownership-is-set-to-root-root-m
version: 1.0.0
source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.control-plane
check_logic:
  kind: expression
  reference: kube-bench://rh-1.4/1.1.19
