  kube_bench_audit: "# Get the node name where the pod is running\nNODE_NAME=$(oc\
    \ get pod \"$HOSTNAME\" -o=jsonpath='{.spec.nodeName}')\n\n# Get the pod name\
    \ in the openshift-etcd namespace\nPOD_NAME=$(oc get pods -n openshift-etcd -l\
