    \ 2>/dev/null)\n\nif [ -z \"$POD_NAME\" ]; then\n echo \"No matching pods found\
    \ on the current node.\"\nelse\n# Execute the stat command\noc rsh -n openshift-etcd\
    \ \"$POD_NAME\" stat -c \"$POD_NAME %n %U:%G\" /etc/kubernetes/manifests/etcd-pod.yaml\n\
    fi\n"
