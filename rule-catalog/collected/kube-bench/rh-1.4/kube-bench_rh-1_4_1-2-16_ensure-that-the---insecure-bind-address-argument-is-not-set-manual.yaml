parameters:
  kube_bench_id: 1.2.16
  kube_bench_ruleset: rh-1.4
  kube_bench_group_id: '1.2'
  kube_bench_scored: true
  kube_bench_audit: "# Get the insecure-bind-address value\ninsecure_bind_address=$(oc\
    \ get kubeapiservers.operator.openshift.io cluster -ojson \\\n  | jq -r '.spec.observedConfig.apiServerArguments[\"\
    insecure-bind-address\"][]?')\n\n# Get port from openshift-kube-apiserver\nkube_api_port=$(oc\
    \ -n openshift-kube-apiserver get endpoints -o jsonpath='{.items[*].subsets[*].ports[*].port}')\n\
    \n# Get port from openshift-apiserver\nopenshift_api_port=$(oc -n openshift-apiserver\
    \ get endpoints -o jsonpath='{.items[*].subsets[*].ports[*].port}')\n\n# Evaluate\
    \ logic\n[[ -z \"$insecure_bind_address\" ]] && \\\n[[ \"$kube_api_port\" == *\"\
    6443\"* ]] && \\\n[[ \"$openshift_api_port\" == *\"8443\"* ]] && echo \"pass\"\
    \ || echo \"fail\"\n"
