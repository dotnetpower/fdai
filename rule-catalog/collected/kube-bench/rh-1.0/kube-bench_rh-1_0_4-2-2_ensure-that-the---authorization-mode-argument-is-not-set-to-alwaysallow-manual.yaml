schema_version: 1.0.0
id: kube-bench.rh-1.0.4-2-2.ensure-that-the---authorization-mode-argument-is-not-set-to-alwaysallow-manual
version: 1.0.0
source: kube_bench
severity: low
category: security
resource_type: kubernetes-node-pool
check_logic:
  kind: expression
  reference: kube-bench://rh-1.0/4.2.2
remediation:
  template_ref: remediation/kube-bench/rh-1.0/4.2.2.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 4.2.2
  kube_bench_ruleset: rh-1.0
  kube_bench_group_id: '4.2'
  kube_bench_scored: false
  kube_bench_audit: 'POD=$(oc -n openshift-kube-apiserver get pod -l app=openshift-kube-apiserver
    -o jsonpath=''{.items[0].metadata.name}'')

    TOKEN=$(oc whoami -t)

    NODE_NAME=$(oc get pod $HOSTNAME -o=jsonpath=''{.spec.nodeName}'')

    oc exec -n openshift-kube-apiserver $POD -- curl -sS https://172.25.0.1/api/v1/nodes/$NODE_NAME/proxy/configz
    -k -H "Authorization:Bearer $TOKEN" | jq -r ''.kubeletconfig.authorization.mode''
    2> /dev/null

    '
