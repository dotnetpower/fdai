parameters:
  kube_bench_id: 1.2.21
  kube_bench_ruleset: rh-1.0
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: '# Verify endpoints

    oc -n openshift-kube-apiserver describe endpoints

    # Check config for ports, livenessProbe, readinessProbe, healthz

    oc -n openshift-kube-apiserver get cm kube-apiserver-pod -o json | jq -r ''.data."pod.yaml"''
    | jq ''.spec.containers''

    # Test to validate RBAC enabled on the apiserver endpoint; check with non-admin
    role

    oc project openshift-kube-apiserver POD=$(oc get pods -n openshift-kube-apiserver
    -l app=openshift-kube-apiserver -o jsonpath=''{.items[0].metadata.name}'') PORT=$(oc
    get pods -n openshift-kube-apiserver -l app=openshift-kube-apiserver -o jsonpath=''{.items[0].spec.containers[0].ports[0].hostPort}'')

    # Following should return 403 Forbidden

    oc rsh -n openshift-kube-apiserver ${POD} curl https://localhost:${PORT}/metrics
    -k

    # Create a service account to test RBAC

    oc create -n openshift-kube-apiserver sa permission-test-sa

    # Should return 403 Forbidden

    SA_TOKEN=$(oc sa -n openshift-kube-apiserver get-token permission-test-sa)

    oc rsh -n openshift-kube-apiserver ${POD} curl https://localho'
