    \ 2>/dev/null)\n\nif [ -z \"$POD_NAME\" ]; then\n echo \"No matching pods found\
    \ on the current node.\"\nelse\n# Execute the stat command\noc exec -n openshift-multus\
    \ \"$POD_NAME\"  -- /bin/bash -c \"stat -c \\\"$i %n permissions=%a\\\" /host/etc/cni/net.d/*.conf\"\
    ;  2>/dev/null\noc exec -n openshift-multus \"$POD_NAME\"  -- /bin/bash -c \"\
    stat -c \\\"$i %n permissions=%a\\\" /host/var/run/multus/cni/net.d/*.conf\";\
    \  2>/dev/null\nfi\n# For SDN pods\nPOD_NAME=$(oc get pods -n openshift-sdn -l\
    \ app=sdn --field-selector spec.nodeName=\"$NODE_NAME\" -o jsonpath='{.items[0].metadata.name}'\
    \ 2>/dev/null)\n\nif [ -z \"$POD_NAME\" ]; then\n echo \"No matching pods found\
    \ on the current node.\"\nelse\n# Execute the stat command\noc exec -n openshif"
