  kube_bench_audit: "# Get the node name where the pod is running\nNODE_NAME=$(oc\
    \ get pod \"$HOSTNAME\" -o=jsonpath='{.spec.nodeName}')\n# For CNI multus\n# Get\
    \ the pod name in the openshift-multus namespace\nPOD_NAME=$(oc get pods -n openshift-multus\
