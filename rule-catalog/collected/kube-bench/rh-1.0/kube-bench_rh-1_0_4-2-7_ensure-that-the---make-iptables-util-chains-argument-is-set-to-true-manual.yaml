  kube_bench_scored: false
  kube_bench_audit: "/bin/bash\nflag=make-iptables-util-chains\nopt=makeIPTablesUtilChains\n\
    # look at each machineconfigpool\nwhile read -r pool nodeconfig; do\n  # true\
    \ by default\n  value='true'\n  # first look for the flag\n  oc get machineconfig\
    \ $nodeconfig -o json | jq -r '.spec.config.systemd[][] | select(.name==\"kubelet.service\"\
    ) | .contents' | sed -n \"/^ExecStart=/,/^\\$/ { /^\\\\s*--$flag=false/ q 100\
    \ }\"\n  # if the above command exited with 100, the flag was false\n  [ $? ==\
    \ 100 ] && value='false'\n  # now look in the yaml KubeletConfig\n  yamlconfig=$(oc\
    \ get machineconfig $nodeconfig -o json | jq -r '.spec.config.storage.files[]\
    \ | select(.path==\"/etc/kubernetes/kubelet.conf\") | .contents.source ' | sed\
    \ 's/^data:,//' | while read; do echo -e ${REPLY//%/\\\\x}; done)\n  echo \"$yamlconfig\"\
    \ | sed -n \"/^$opt:\\\\s*false\\\\s*$/ q 100\"\n  [ $? == 100 ] && value='false'\n\
    \  echo \"Pool $pool has $flag ($opt) set to $value\"\ndone < <(oc get machineconfigpools\
    \ -o json | jq -r '.items[] | select(.status.machineCount>0) | .metadata.name\
    \ + \" \" + .spec.confi"
