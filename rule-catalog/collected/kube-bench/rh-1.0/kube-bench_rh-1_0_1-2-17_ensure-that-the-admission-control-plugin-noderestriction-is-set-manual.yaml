  kube_bench_ruleset: rh-1.0
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: '# For 4.5, review the control plane manifest https://github.com/openshift/origin/blob/release-4.5/vendor/k8s.io/kubernetes/cmd/kubeadm/app/phases/controlplane/manifests.go#L132

    #Verify the set of admission-plugins for OCP 4.6 and higher

    oc -n openshift-kube-apiserver get configmap config -o json | jq -r ''.data."config.yaml"''
    | jq ''.apiServerArguments."enable-admission-plugins"''

    output=$(oc -n openshift-kube-apiserver get configmap config -o json | jq -r ''.data."config.yaml"''
    | jq ''.apiServerArguments."enable-admission-plugins"'')

    [ "$output" == "null" ] && echo "ocp 4.5 has NodeRestriction compiled" || echo
    $output

    #Check that no overrides are configured

    oc get kubeapiservers.operator.openshift.io cluster -o json | jq -r ''.spec.unsupportedConfigOverrides''

    '
