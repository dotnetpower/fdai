parameters:
  kube_bench_id: 1.2.22
  kube_bench_ruleset: rh-1.0
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: '# Should return “/var/log/kube-apiserver/audit.log"

    output=$(oc get configmap config -n openshift-kube-apiserver -o jsonpath="{[''.data.config\.yaml'']}"
    | jq ''.auditConfig.auditFilePath'')

    [ "$output" != "" ] && [ "$output" != "null" ] && echo "$output" || true

    output=$(oc get configmap config -n openshift-kube-apiserver -o json | jq -r ''.data["config.yaml"]''
    | jq -r ''.apiServerArguments["audit-log-path"][]?'')

    [ "$output" != "" ] && [ "$output" != "null" ] && echo "$output" || true

    POD=$(oc get pods -n openshift-kube-apiserver -l app=openshift-kube-apiserver
    -o jsonpath=''{.items[0].metadata.name}'')

    oc rsh -n openshift-kube-apiserver -c kube-apiserver $POD ls /var/log/kube-apiserver/audit.log
    2>/dev/null

    # Should return 0

    echo exit_code=$?

    # Should return "/var/log/openshift-apiserver/audit.log"

    output=$(oc get configmap config -n openshift-apiserver -o jsonpath="{[''.data.config\.yaml'']}"
    | jq ''.auditConfig.auditFilePath'')

    [ "$output" != "" ] && [ "$output" != "null" ] && echo "$output" || true

    output=$(oc get c'
