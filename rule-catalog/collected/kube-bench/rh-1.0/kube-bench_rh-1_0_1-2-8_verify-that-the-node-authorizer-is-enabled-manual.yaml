id: kube-bench.rh-1.0.1-2-8.verify-that-the-node-authorizer-is-enabled-manual
version: 1.0.0
source: kube_bench
severity: low
category: security
resource_type: kubernetes-cluster.control-plane
check_logic:
  kind: expression
  reference: kube-bench://rh-1.0/1.2.8
remediation:
  template_ref: remediation/kube-bench/rh-1.0/1.2.8.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 1.2.8
  kube_bench_ruleset: rh-1.0
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: '# For OCP 4.5 and earlier verify that authorization-mode is not
    used

    oc get configmap config -n openshift-kube-apiserver -ojson | jq -r ''.data["config.yaml"]''
    | jq ''.apiServerArguments''

    oc get kubeapiservers.operator.openshift.io cluster -o json | jq ''.spec.observedConfig.apiServerArguments''

    # For OCP 4.5 and earlier verify that authorization-mode is not used

    NODE_NAME=$(oc get pod $HOSTNAME -o=jsonpath=''{.spec.nodeName}'')

    oc debug node/$NODE_NAME -- chroot /host cat /etc/kubernetes/kubelet.conf | grep
    authorization-mode 2> /dev/null

    oc debug node/$NODE_NAME -- chroot /host ps -aux | grep kubelet | grep authorization-mode
    2> /dev/null

    #Check that no overrides are configured

    oc get kubeapiservers.operator.openshift.io cluster -o json | jq -r ''.spec.unsupportedConfigOverrides''

    '
