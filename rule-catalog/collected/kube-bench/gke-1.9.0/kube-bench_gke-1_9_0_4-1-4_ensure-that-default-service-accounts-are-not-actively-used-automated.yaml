  kube_bench_scored: true
  kube_bench_audit: "echo \"\U0001F539 Default Service Accounts with automountServiceAccountToken\
    \ enabled:\"\ndefault_sa_count=$(kubectl get serviceaccounts --all-namespaces\
    \ -o json | jq '\n  [.items[] | select(.metadata.name == \"default\" and (.automountServiceAccountToken\
    \ != false))] | length')\nif [ \"$default_sa_count\" -gt 0 ]; then\n  echo \"\
    default_sa_not_auto_mounted\"\nfi\n\necho \"\\n\U0001F539 Pods using default ServiceAccount:\"\
    \npods_using_default_sa=$(kubectl get pods --all-namespaces -o json | jq '\n \
    \ [.items[] | select(.spec.serviceAccountName == \"default\")] | length')\nif\
    \ [ \"$pods_using_default_sa\" -gt 0 ]; then\n  echo \"default_sa_used_in_pods\"\
    \nfi\n"
