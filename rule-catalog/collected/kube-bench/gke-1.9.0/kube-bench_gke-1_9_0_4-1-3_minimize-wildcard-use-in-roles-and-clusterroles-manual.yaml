parameters:
  kube_bench_id: 4.1.3
  kube_bench_ruleset: gke-1.9.0
  kube_bench_group_id: '4.1'
  kube_bench_scored: true
  kube_bench_audit: "wildcards=$(kubectl get roles --all-namespaces -o json | jq '\n\
    \  .items[] | select(\n    .rules[]? | (.verbs[]? == \"*\" or .resources[]? ==\
    \ \"*\" or .apiGroups[]? == \"*\")\n  )' | wc -l)\n\nwildcards_clusterroles=$(kubectl\
    \ get clusterroles -o json | jq '\n  .items[] | select(\n    .rules[]? | (.verbs[]?\
    \ == \"*\" or .resources[]? == \"*\" or .apiGroups[]? == \"*\")\n  )' | wc -l)\n\
    \ntotal=$((wildcards + wildcards_clusterroles))\n\nif [ \"$total\" -gt 0 ]; then\n\
    \  echo \"wildcards_present\"\nfi\n"
