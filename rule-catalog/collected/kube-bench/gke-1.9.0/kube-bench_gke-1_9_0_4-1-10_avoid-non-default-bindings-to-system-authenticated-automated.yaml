source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.policies
check_logic:
  kind: expression
  reference: kube-bench://gke-1.9.0/4.1.10
remediation:
  template_ref: remediation/kube-bench/gke-1.9.0/4.1.10.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 4.1.10
  kube_bench_ruleset: gke-1.9.0
  kube_bench_group_id: '4.1'
  kube_bench_scored: true
  kube_bench_audit: "# Flags any non-default binding to the group \"system:authenticated\"\
    .\n# Allowed defaults (CRB): system:basic-user, system:discovery\n# Prints \"\
    NO_NON_DEFAULT_AUTH_BINDINGS\" when none are found.\n(\n  kubectl get clusterrolebindings\
    \ -o json | jq -r '\n    .items[]\n    | select((.metadata.name != \"system:basic-user\"\
    ) and (.metadata.name != \"system:discovery\"))\n    | select((.subjects | length)\
    \ > 0)\n    | select(any(.subjects[]?;\n        .kind==\"Group\" and .name==\"\
    system:authenticated\"\n      ))\n    | \"FOUND_AUTH:ClusterRoleBinding:\\(.metadata.name):ROLE=\\\
    (.roleRef.kind)/\\(.roleRef.name)\"\n  ';\n  kubectl get rolebindings -A -o json\
    \ | jq -r '\n    .items[]\n    | select((.subjects | length) > 0)\n    | select(any(.subjects[]?;\n\
    \        .kind==\"Group\" and .name==\"system:authenticated\"\n      ))\n    |\
    \ \"FOUND_AUTH:RoleBinding:\\(.metadata.namespace):\\(.metadata.name):ROLE=\\\
    (.roleRef.kind)/\\(.roleRef.name)\"\n  '\n) | (grep -q \"^FOUND_AUTH:\" && cat\
    \ || echo \"NO_NON_DEFAULT_AUTH_BINDINGS\")\n"
