parameters:
  kube_bench_id: 5.1.5
  kube_bench_ruleset: k3s-cis-1.9
  kube_bench_group_id: '5.1'
  kube_bench_scored: true
  kube_bench_audit: "kubectl get serviceaccounts --all-namespaces --field-selector\
    \ metadata.name=default \\\n-o custom-columns=N:.metadata.namespace,SA:.metadata.name,ASA:.automountServiceAccountToken\
    \ --no-headers \\\n| while read -r namespace serviceaccount automountserviceaccounttoken\n\
    do\n  if [ \"${automountserviceaccounttoken}\" = \"<none>\" ]; then\n    automountserviceaccounttoken=\"\
    notset\"\n  fi\n  if [ \"${namespace}\" != \"kube-system\" ] && [ \"${automountserviceaccounttoken}\"\
    \ != \"false\" ]; then\n    printf \"**namespace: %-20s service_account: %-10s\
    \ automountServiceAccountToken: %-6s is_compliant: false\\n\" \"${namespace}\"\
    \ \"${serviceaccount}\" \"${automountserviceaccounttoken}\"\n  else\n    printf\
    \ \"**namespace: %-20s service_account: %-10s automountServiceAccountToken: %-6s\
    \ is_compliant: true\\n\" \"${namespace}\" \"${serviceaccount}\" \"${automountserviceaccounttoken}\"\
    \n  fi\ndone\n"
