id: kube-bench.k3s-cis-1.9.5-1-5.ensure-that-default-service-accounts-are-not-actively-used.-automated
version: 1.0.0
source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.policies
check_logic:
  kind: expression
  reference: kube-bench://k3s-cis-1.9/5.1.5
remediation:
  template_ref: remediation/kube-bench/k3s-cis-1.9/5.1.5.md
