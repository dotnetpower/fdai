parameters:
  kube_bench_id: 4.1.8
  kube_bench_ruleset: gke-1.8.0
  kube_bench_group_id: '4.1'
  kube_bench_scored: true
  kube_bench_audit: "# Flags any ClusterRoleBinding/RoleBinding that targets the user\
    \ \"system:anonymous\".\n# Prints \"NO_ANONYMOUS_BINDINGS\" when none are found.\n\
    (\n  kubectl get clusterrolebindings -o json | jq -r '\n    .items[]\n    | select((.subjects\
    \ | length) > 0)\n    | select(any(.subjects[]?;\n        .kind==\"User\" and\
    \ .name==\"system:anonymous\"\n      ))\n    | \"FOUND_ANONYMOUS:ClusterRoleBinding:\\\
    (.metadata.name):ROLE=\\(.roleRef.kind)/\\(.roleRef.name)\"\n  ';\n  kubectl get\
    \ rolebindings -A -o json | jq -r '\n    .items[]\n    | select((.subjects | length)\
    \ > 0)\n    | select(any(.subjects[]?;\n        .kind==\"User\" and .name==\"\
    system:anonymous\"\n      ))\n    | \"FOUND_ANONYMOUS:RoleBinding:\\(.metadata.namespace):\\\
    (.metadata.name):ROLE=\\(.roleRef.kind)/\\(.roleRef.name)\"\n  '\n) | (grep -q\
    \ '^FOUND_ANONYMOUS:' && cat || echo 'NO_ANONYMOUS_BINDINGS')\n"
