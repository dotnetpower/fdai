  kube_bench_scored: true
  kube_bench_audit: "found=0\nfor csr in $(kubectl get csr -o name 2>/dev/null | sed\
    \ 's|^.*/||'); do\n  req=$(kubectl get csr \"$csr\" -o jsonpath='{.spec.request}'\
    \ 2>/dev/null)\n  [ -z \"$req\" ] && continue\n  if echo \"$req\" | base64 -d\
    \ 2>/dev/null | openssl req -noout -text 2>/dev/null | grep -q 'O = system:masters';\
    \ then\n    conds=$(kubectl get csr \"$csr\" -o json | jq -r '[.status.conditions[]?.type]\
    \ | join(\",\")')\n    echo \"FOUND_SYSTEM_MASTERS_CSR:${csr}:${conds:-NONE}\"\
    \n    found=1\n  fi\ndone\nif [ \"$found\" -eq 0 ]; then\n  echo \"NO_SYSTEM_MASTERS_CREDENTIALS_FOUND\"\
    \nfi\n"
