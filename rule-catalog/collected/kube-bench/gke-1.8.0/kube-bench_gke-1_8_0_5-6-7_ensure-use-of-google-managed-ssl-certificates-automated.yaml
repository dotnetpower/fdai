  kube_bench_audit: "svc_json=\"$(kubectl get svc -A -o json 2>/dev/null         \
    \       || echo '{\"items\":[],\"__err\":\"SVC_FORBIDDEN\"}')\"\ning_json=\"$(kubectl\
    \ get ingress -A -o json 2>/dev/null            || echo '{\"items\":[],\"__err\"\
    :\"INGRESS_FORBIDDEN\"}')\"\nmc_json =\"$(kubectl get managedcertificates -A -o\
    \ json 2>/dev/null || echo '{\"items\":[],\"__err\":\"MC_FORBIDDEN\"}')\"\n\n\
    printf '%s\\n%s\\n%s\\n' \"$svc_json\" \"$ing_json\" \"$mc_json\" \\\n| jq -rs\
    \ '\n  (.[0] // {}) as $svcsRaw |\n  (.[1] // {}) as $ingsRaw |\n  (.[2] // {})\
    \ as $mcsRaw |\n\n  # If any list failed, surface an error and DO NOT print the\
    \ success string\n  if ($svcsRaw.__err or $ingsRaw.__err or $mcsRaw.__err) then\n\
    \    \"ERROR_KUBECTL_LIST:\" +\n    ([\n      ($svcsRaw.__err // empty),\n   \
    \   ($ingsRaw.__err // empty),\n      ($mcsRaw.__err // empty)\n    ] | join(\"\
    ,\"))\n  else\n    ($svcsRaw.items // []) as $svcs |\n    ($ingsRaw.items // [])\
    \ as $ings |\n    ($mcsRaw.items // []) as $mcs |\n\n    def trim: gsub(\"^\\\\\
    s+|\\\\s+$\";\"\");\n    def hasmc($ns;$name): any($mcs[]?; .metadata.namespace==$ns\
    \ and ."
