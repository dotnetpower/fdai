id: kube-bench.gke-1.8.0.4-1-9.avoid-non-default-bindings-to-system-unauthenticated-automated
version: 1.0.0
source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.policies
check_logic:
  kind: expression
  reference: kube-bench://gke-1.8.0/4.1.9
remediation:
  template_ref: remediation/kube-bench/gke-1.8.0/4.1.9.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 4.1.9
  kube_bench_ruleset: gke-1.8.0
  kube_bench_group_id: '4.1'
  kube_bench_scored: true
  kube_bench_audit: "# Flags any non-default binding to the group \"system:unauthenticated\"\
    .\n# Prints \"NO_NON_DEFAULT_UNAUTH_BINDINGS\" when none are found.\n(\n  kubectl\
    \ get clusterrolebindings -o json | jq -r '\n    .items[]\n    | select(.metadata.name\
    \ != \"system:public-info-viewer\")\n    | select((.subjects | length) > 0)\n\
    \    | select(any(.subjects[]?;\n        .kind==\"Group\" and .name==\"system:unauthenticated\"\
    \n      ))\n    | \"FOUND_UNAUTH:ClusterRoleBinding:\\(.metadata.name):ROLE=\\\
    (.roleRef.kind)/\\(.roleRef.name)\"\n  ';\n  kubectl get rolebindings -A -o json\
    \ | jq -r '\n    .items[]\n    | select((.subjects | length) > 0)\n    | select(any(.subjects[]?;\n\
    \        .kind==\"Group\" and .name==\"system:unauthenticated\"\n      ))\n  \
    \  | \"FOUND_UNAUTH:RoleBinding:\\(.metadata.namespace):\\(.metadata.name):ROLE=\\\
    (.roleRef.kind)/\\(.roleRef.name)\"\n  '\n) | (grep -q \"^FOUND_UNAUTH:\" && cat\
    \ || echo \"NO_NON_DEFAULT_UNAUTH_BINDINGS\")\n"
