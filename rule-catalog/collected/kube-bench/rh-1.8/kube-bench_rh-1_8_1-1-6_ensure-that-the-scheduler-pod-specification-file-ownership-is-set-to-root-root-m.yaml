  kube_bench_audit: "# Get the node name where the pod is running\nNODE_NAME=$(oc\
    \ get pod \"$HOSTNAME\" -o=jsonpath='{.spec.nodeName}')\n\n# Get the pod name\
    \ in the openshift-kube-scheduler namespace\nPOD_NAME=$(oc get pods -n openshift-kube-scheduler\
    \ -l app=openshift-kube-scheduler --field-selector spec.nodeName=\"$NODE_NAME\"\
    \ -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)\n\nif [ -z \"$POD_NAME\"\
    \ ]; then\n echo \"No matching pods found on the current node.\"\nelse\n# Execute\
    \ the stat command\noc exec -n openshift-kube-scheduler \"$POD_NAME\" -- stat\
    \ -c \"$POD_NAME %n %U:%G\" /etc/kubernetes/static-pod-resources/kube-scheduler-pod.yaml\n\
    fi\n"
