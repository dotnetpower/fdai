parameters:
  kube_bench_id: 1.4.2
  kube_bench_ruleset: rh-1.8
  kube_bench_group_id: '1.4'
  kube_bench_scored: false
  kube_bench_audit: "echo \"Describing kube-scheduler endpoints...\"\noc -n openshift-kube-scheduler\
    \ describe endpoints\n\necho \"Checking pod configuration for kube-scheduler to\
    \ confirm no --bind-address or insecure arguments...\"\noc -n openshift-kube-scheduler\
    \ get cm kube-scheduler-pod -o json \\\n  | jq -r '.data[\"pod.yaml\"]' \\\n \
    \ | jq '.spec.containers[] | select(.name==\"kube-scheduler\") | .args'\n\necho\
    \ \"Testing access to metrics endpoint as unauthenticated user...\"\noc project\
    \ openshift-kube-scheduler\nexport POD=$(oc get pods -l app=openshift-kube-scheduler\
    \ -o jsonpath='{.items[0].metadata.name}')\nexport POD_IP=$(oc get pods -l app=openshift-kube-scheduler\
    \ -o jsonpath='{.items[0].status.podIP}')\nexport PORT=$(oc get pod $POD -o jsonpath='{.spec.containers[0].livenessProbe.httpGet.port}')\n\
    oc rsh $POD curl -k -s -o /dev/null -w \"%{http_code}\" https://$POD_IP:$PORT/metrics\n\
    \necho \"Testing access with unprivileged service account...\"\noc create sa permission-test-sa\n\
    export SA_TOKEN=$(oc create token permission-test-sa)\noc rsh $POD curl -k -s "
