parameters:
  kube_bench_id: 1.2.2
  kube_bench_ruleset: rh-1.8
  kube_bench_group_id: '1.2'
  kube_bench_scored: false
  kube_bench_audit: "CFG=$(oc -n openshift-kube-apiserver get cm config -o jsonpath='{.data.config\\\
    .yaml}')\n\n# Extract kubelet client cert/key paths (support both layouts)\nCERT_FILE=$(printf\
    \ '%s\\n' \"$CFG\" \\\n| grep -Eo '/etc/kubernetes/static-pod-(resources/kube-apiserver-certs|certs)/secrets/kubelet-client/tls\\\
    .crt' \\\n| head -n1)\n\nKEY_FILE=$(printf '%s\\n' \"$CFG\" \\\n| grep -Eo '/etc/kubernetes/static-pod-(resources/kube-apiserver-certs|certs)/secrets/kubelet-client/tls\\\
    .key' \\\n| head -n1)\n\n# 1) pass/fail on presence of both files\nif [ -n \"\
    $CERT_FILE\" ] && [ -n \"$KEY_FILE\" ]; then\n  echo \"pass\"\nelse\n  echo \"\
    fail\"\nfi\nKUBELET_HTTPS=$(printf '%s\\n' \"$CFG\" \\\n  | grep -Eo '(^|[[:space:]])kubelet-https:[[:space:]]*(true|false)'\
    \ \\\n  | awk -F: '{print $2}' \\\n  | tr -d '[:space:]' \\\n  | head -n1)\n\n\
    if [ \"$KUBELET_HTTPS\" = \"false\" ]; then\n  echo \"false\"\nelse\n echo \"\
    true\"\nfi\n\noc -n openshift-apiserver describe secret serving-cert | grep -E\
    \ 'tls\\.crt|tls\\.key|Type:'\n"
