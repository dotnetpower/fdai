schema_version: 1.0.0
id: kube-bench.rh-1.8.1-1-20.ensure-that-the-openshift-pki-certificate-file-permissions-are-set-to-600-or-mor
version: 1.0.0
source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.control-plane
check_logic:
  kind: expression
  reference: kube-bench://rh-1.8/1.1.20
remediation:
  template_ref: remediation/kube-bench/rh-1.8/1.1.20.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 1.1.20
  kube_bench_ruleset: rh-1.8
  kube_bench_group_id: '1.1'
  kube_bench_scored: true
  kube_bench_audit: '# Get the node name where the pod is running

    NODE_NAME=$(oc get pod "$HOSTNAME" -o=jsonpath=''{.spec.nodeName}'')


    # Get the pod name in the openshift-kube-apiserver namespace

    POD_NAME=$(oc get pods -n openshift-kube-apiserver -l app=openshift-kube-apiserver
    --field-selector spec.nodeName="$NODE_NAME" -o jsonpath=''{.items[0].metadata.name}''
    2>/dev/null)


    if [ -z "$POD_NAME" ]; then

    echo "No matching pods found on the current node."

    else

    # Execute the stat command

    oc exec -n openshift-kube-apiserver "$POD_NAME" -c kube-apiserver -- find /etc/kubernetes/static-pod-certs
    -type f -wholename ''*/secrets/*.crt'' -exec stat -c "$POD_NAME %n permissions=%a"
    {} \;

    fi

    '
