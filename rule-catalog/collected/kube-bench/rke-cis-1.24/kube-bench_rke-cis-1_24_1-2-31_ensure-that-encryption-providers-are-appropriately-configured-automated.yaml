schema_version: 1.0.0
id: kube-bench.rke-cis-1.24.1-2-31.ensure-that-encryption-providers-are-appropriately-configured-automated
version: 1.0.0
source: kube_bench
severity: medium
category: security
resource_type: kubernetes-cluster.control-plane
check_logic:
  kind: expression
  reference: kube-bench://rke-cis-1.24/1.2.31
remediation:
  template_ref: remediation/kube-bench/rke-cis-1.24/1.2.31.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 1.2.31
  kube_bench_ruleset: rke-cis-1.24
  kube_bench_group_id: '1.2'
  kube_bench_scored: true
  kube_bench_audit: 'ENCRYPTION_PROVIDER_CONFIG=$(ps -ef | grep $apiserverbin | grep
    -- --encryption-provider-config | sed ''s%.*encryption-provider-config[= ]\([^
    ]*\).*%\1%'')

    if test -e $ENCRYPTION_PROVIDER_CONFIG; then grep -A1 ''providers:'' $ENCRYPTION_PROVIDER_CONFIG
    | tail -n1 | grep -o "[A-Za-z]*" | sed ''s/^/provider=/''; fi

    '
