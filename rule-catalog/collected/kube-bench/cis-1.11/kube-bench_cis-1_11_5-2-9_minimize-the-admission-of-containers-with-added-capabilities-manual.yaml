schema_version: 1.0.0
id: kube-bench.cis-1.11.5-2-9.minimize-the-admission-of-containers-with-added-capabilities-manual
version: 1.0.0
source: kube_bench
severity: low
category: security
resource_type: kubernetes-cluster.policies
check_logic:
  kind: expression
  reference: kube-bench://cis-1.11/5.2.9
remediation:
  template_ref: remediation/kube-bench/cis-1.11/5.2.9.md
remediates: remediate.azure-policy-managed
parameters:
  kube_bench_id: 5.2.9
  kube_bench_ruleset: cis-1.11
  kube_bench_group_id: '5.2'
  kube_bench_scored: false
  kube_bench_audit: "kubectl get pods --all-namespaces -o custom-columns=POD_NAME:.metadata.name,POD_NAMESPACE:.metadata.namespace\
    \ --no-headers | while read -r pod_name pod_namespace\ndo\n  # Retrieve container(s)\
    \ for each Pod.\n  kubectl get pod \"${pod_name}\" --namespace \"${pod_namespace}\"\
    \ -o json | jq -c '.spec.containers[]' | while read -r container\n  do\n    #\
    \ Retrieve container's name\n    container_name=$(echo ${container} | jq -r '.name')\n\
    \    # Retrieve container's added capabilities\n    container_caps_add=$(echo\
    \ ${container} | jq -r '.securityContext.capabilities.add' | sed -e 's/null/notset/g')\n\
    \    # Set is_compliant to true by default.\n    is_compliant=true\n    caps_list=\"\
    \"\n    if [ \"${container_caps_add}\" != \"notset\" ]; then\n      # Loop through\
    \ all caps and append caps_list, then set is_compliant to false.\n      for cap\
    \ in $(echo \"${container_caps_add}\" | jq -r '.[]'); do\n      caps_list+=\"\
    ${cap},\"\n      is_compliant=false\n      done\n      # Remove trailing comma\
    \ for the last list member.\n      caps_list=${caps_list%,}\n   "
