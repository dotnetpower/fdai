# Upstream default LLM capability preferences.
#
# Family-only (never dated versions) - the bootstrap resolver picks the
# latest stable version at provisioning time and records it in
# resolved-models.json + audit. See docs/roadmap/architecture/llm-strategy.md § Capability
# Preferences Registry and docs/roadmap/deployment/dev-and-deploy-parity.md § W-B.
#
# Rules the schema enforces at load time:
#   - schema_version is semver.
#   - Every capability declares >= 1 preference of (publisher, family).
#   - capacity_tpm >= 1000.
#   - t2.reasoner.primary[0].publisher != t2.reasoner.secondary[0].publisher
#     UNLESS mixed_model_mode = "hil-only".
#
# Forks override this file (mode = azure-foundry | external | hil-only) with
# region / compliance / cost tuning. NEVER commit fork values here.

schema_version: "1.0.0"
mixed_model_mode: azure-foundry
models:
  t1.embedding:
    preferences:
      - {publisher: OpenAI, family: text-embedding-3-small}
      - {publisher: OpenAI, family: text-embedding-3-large}
    sku: Standard
    capacity_tpm: 100000

  t1.judge:
    # Latency-first mini stack. The resolver picks the first family the
    # target region catalog offers with sufficient quota - newer 5.x mini
    # models are meaningfully faster than gpt-4o-mini, so we prefer them
    # when available and fall back to 4.1-mini / 4o-mini for regions that
    # have not received the newer families yet.
    preferences:
      - {publisher: OpenAI, family: gpt-5.4-mini}
      - {publisher: OpenAI, family: gpt-5-mini}
      - {publisher: OpenAI, family: gpt-4.1-mini}
      - {publisher: OpenAI, family: gpt-4o-mini}
    sku: Standard
    capacity_tpm: 200000

  t2.reasoner.primary:
    preferences:
      - {publisher: OpenAI, family: gpt-4o}
      - {publisher: OpenAI, family: gpt-4.1}
      - {publisher: OpenAI, family: gpt-4-turbo}
    sku: Standard
    capacity_tpm: 20000
    # The Proposer's tool manifest may include web.search; it MUST resolve
    # to a function-calling-capable family or the tool breaks at runtime.
    # Web search stays a self-hosted WebSearchProvider behind this tool
    # manifest - never a model's native browsing (that would hide the
    # allowlist + evidence-store replay determinism the core controls).
    tool_calling_required: true

  t2.reasoner.secondary:
    preferences:
      - {publisher: Anthropic, family: claude-opus-4}
      - {publisher: MistralAI, family: mistral-large-2}
    sku: Standard
    capacity_tpm: 10000

  t2.reasoner.escalated:
    preferences:
      - {publisher: OpenAI, family: o1}
      - {publisher: Anthropic, family: claude-opus-4}
    sku: Standard
    capacity_tpm: 5000
    invocation: on_disagreement

  # Wave 4 beta-2: Critic role for the debate orchestrator. Distinct-
  # publisher preference (Anthropic first) so the Critic reviews the
  # Proposer's output with independent model weights, per
  # docs/roadmap/decisioning/prompt-composition.md § Debate orchestrator.
  # ``invocation: on_disagreement`` so the Critic only fires when the
  # T2 cross-check pair disagrees - keeps token cost bounded.
  t2.critic:
    preferences:
      - {publisher: Anthropic, family: claude-opus-4}
      - {publisher: OpenAI, family: gpt-4o}
    sku: Standard
    capacity_tpm: 5000
    invocation: on_disagreement

  # T2 root-cause reasoner (observability-and-detection.md § 4). Fires
  # only on a novel incident the deterministic tiers could not resolve
  # (``invocation: on_novel_case``), so it never runs on the T0/T1
  # majority - keeping token cost bounded. Its output is refused unless
  # it grounds on the supplied candidate citations; the deterministic
  # parse_rca_response + grounding gate, not the model prose, decide.
  t2.rca:
    preferences:
      - {publisher: OpenAI, family: gpt-4o}
      - {publisher: Anthropic, family: claude-opus-4}
    sku: Standard
    capacity_tpm: 5000
    invocation: on_novel_case

  # Rubric judge for the hallucination filter (docs/roadmap/
  # hallucination-rubric-gate.md). Scores a T2 candidate's reasoning
  # against fixed criteria. Distinct-publisher preference (Anthropic
  # first) so the rubric judge is mixed-model relative to
  # t2.reasoner.primary (OpenAI) - a model must not grade its own
  # answer. The QualityGate folds the minimum score into confidence
  # via min() (subtractive only). ``invocation: on_novel_case`` so it
  # runs only on the T2 minority that reaches the quality gate.
  t2.rubric.judge:
    preferences:
      - {publisher: Anthropic, family: claude-opus-4}
      - {publisher: OpenAI, family: gpt-4o}
    sku: Standard
    capacity_tpm: 5000
    invocation: on_novel_case
